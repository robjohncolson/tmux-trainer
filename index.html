const QUIZ_ANSWER_FEEDBACK={locked:false,timer:null,heldCallback:null,lockedAt:0};
function clearQuizAnswerFeedback(){
  if(QUIZ_ANSWER_FEEDBACK.timer){
    clearTimeout(QUIZ_ANSWER_FEEDBACK.timer);
    QUIZ_ANSWER_FEEDBACK.timer=null;
  }
  QUIZ_ANSWER_FEEDBACK.locked=false;
  QUIZ_ANSWER_FEEDBACK.heldCallback=null;
  QUIZ_ANSWER_FEEDBACK.held=false;
  document.querySelectorAll('.mc-grid.answer-pending,.hint-mc-grid.answer-pending').forEach(el=>el.classList.remove('answer-pending'));
  document.querySelectorAll('.mc-btn.correct,.mc-btn.wrong,.hint-mc-btn.correct,.hint-mc-btn.wrong').forEach(btn=>btn.classList.remove('correct','wrong'));
  const fb=document.getElementById('wrong-fb');if(fb)fb.remove();
  const reId=QUIZ_ANSWER_FEEDBACK.reshuffleEnemyId;
  QUIZ_ANSWER_FEEDBACK.reshuffleEnemyId=null;
  if(reId){const re=G.enemies.find(en=>en.id===reId);if(re&&re.question)reshuffleQuestionOptions(re);}
}
function reshuffleQuestionOptions(enemy){
  const q=enemy.question;
  if(!q)return;
  if(q.type==='identify'||q.type==='variable'||q.type==='application'){
    const correct=q.options[q.correctIdx];
    q.options=shuffleArr(q.options);
    q.correctIdx=q.options.indexOf(correct);
    q.correctKey=['a','b','c','d'][q.correctIdx];
  }else if(q.type==='relationship'){
    const correct=q.options[q.correctIdx];
    q.options=shuffleArr(q.options);
    q.correctIdx=q.options.indexOf(correct);
    q.correctKey=['a','b','c'][q.correctIdx];
  }else if(q.type==='fillblank'){
    const correct=q.choices[q.correctIdx];
    q.choices=shuffleArr(q.choices);
    q.correctIdx=q.choices.indexOf(correct);
  }else if(q.type==='subconcept'){
    const correct=q.options[q.correctIdx];
    q.options=shuffleArr(q.options);
    q.correctIdx=q.options.indexOf(correct);
    q.correctKey=(q.options.length<=2?['a','b']:['a','b','c'])[q.correctIdx];
  }
  // Bust the render cache so updateInput() repaints with new option order
  lastInputState='';
  updateInput();
}
function queueQuizChoiceResolution(enemy,key,isCorrect){
  if(QUIZ_ANSWER_FEEDBACK.locked||!enemy||G.screen!=='game')return;
  const btn=document.querySelector('[data-choice="'+key+'"]');
  const group=btn&&btn.parentElement;
  QUIZ_ANSWER_FEEDBACK.locked=true;
  QUIZ_ANSWER_FEEDBACK.lockedAt=Date.now();
  if(isCorrect)enemy.pendingCorrectHit=true;
  // Increment missCount BEFORE scheduling so delay uses updated value
  if(!isCorrect){enemy.missCount=(enemy.missCount||0)+1;QUIZ_ANSWER_FEEDBACK.reshuffleEnemyId=enemy.id;}
  const delay=isCorrect?220:0; // wrong answers auto-hold (no timer)
  if(group)group.classList.add('answer-pending');
  if(btn)btn.classList.add(isCorrect?'correct':'wrong');
  // Show correction feedback on wrong answer — auto-holds until dismissed
  if(!isCorrect&&enemy.question){
    const q=enemy.question;
    const chosenIdx=['a','b','c','d'].indexOf(key);
    const chosenText=(q.options||q.choices||[])[chosenIdx]||key.toUpperCase();
    const correctText=(q.options||q.choices||[])[q.correctIdx]||'';
    const explain=q.type==='relationship'&&q.explain?q.explain:(enemy.cmd&&enemy.cmd.explain?enemy.cmd.explain:'');
    const fb=document.createElement('div');fb.className='wrong-feedback';fb.id='wrong-fb';
    fb.innerHTML='<div class="wf-wrong">\u2717 '+chosenText+'</div><div class="wf-correct">\u2713 '+correctText+'</div>'+(explain?'<div class="wf-explain">'+explain+'</div>':'')+'<button class="btn" style="margin-top:8px;padding:6px 16px;font-size:10px;width:100%" id="wrong-fb-dismiss">GOT IT</button>';
    const body=document.getElementById('ip-body');
    if(body){body.appendChild(fb);body.scrollTop=body.scrollHeight}
  }
  const resolveFn=()=>{
    QUIZ_ANSWER_FEEDBACK.timer=null;
    QUIZ_ANSWER_FEEDBACK.locked=false;
    QUIZ_ANSWER_FEEDBACK.heldCallback=null;
    const liveEnemy=G.enemies.find(en=>en.id===enemy.id);
    if(!liveEnemy||G.screen!=='game'){
      if(liveEnemy)delete liveEnemy.pendingCorrectHit;
      clearQuizAnswerFeedback();
      return;
    }
    clearQuizAnswerFeedback();
    delete liveEnemy.pendingCorrectHit;
    if(isCorrect){handleHit(liveEnemy)}
    else{
      handleMiss(liveEnemy);
    }
  };
  QUIZ_ANSWER_FEEDBACK.heldCallback=resolveFn;
  if(delay>0){
    // Correct answers: auto-resolve after short flash
    QUIZ_ANSWER_FEEDBACK.timer=setTimeout(resolveFn,delay);
  }else{
    // Wrong answers: auto-hold until GOT IT button or space pressed
    QUIZ_ANSWER_FEEDBACK.held=true;
    const dismissBtn=document.getElementById('wrong-fb-dismiss');
    if(dismissBtn)dismissBtn.onclick=function(){QUIZ_ANSWER_FEEDBACK.held=false;resolveFn()};
  }
}

// Quiz mode handlers (called from onclick in MC buttons)
function handleQuizChoice(key){
  if(G.screen!=='game'||QUIZ_ANSWER_FEEDBACK.locked||EXPLAINER_STATE.open)return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  const qt=enemy&&enemy.question?enemy.question.type:null;
  if(!enemy||!enemy.question||!['identify','variable','application','relationship'].includes(qt))return;
  queueQuizChoiceResolution(enemy,key,key===enemy.question.correctKey);
}
function handleHintChoice(key){
  if(G.screen!=='game'||QUIZ_ANSWER_FEEDBACK.locked||EXPLAINER_STATE.open)return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='fillblank')return;
  const idx=['a','b','c'].indexOf(key);
  if(idx===-1)return;
  const chosen=enemy.question.choices[idx];
  queueQuizChoiceResolution(enemy,key,activeCartridge.validateBlank(chosen,enemy.question.answer));
}
function handlePrereqChoice(key){
  if(G.screen!=='game'||QUIZ_ANSWER_FEEDBACK.locked||EXPLAINER_STATE.open)return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='subconcept')return;
  const idx=['a','b','c'].indexOf(key);
  if(idx===-1)return;
  queueQuizChoiceResolution(enemy,key,key===enemy.question.correctKey);
}
const handleSubconceptChoice=handlePrereqChoice;

function updateQueue(){
  const bar=document.getElementById('queue-bar');
  if(G.waveComplete||G.waveCommands.length===0){bar.style.display='none';return}
  bar.style.display='block';
  let html='INCOMING: ';
  G.waveCommands.slice(G.spawnIdx).forEach(c=>{html+='<span class="q-dot" style="background:'+AMB.css.hot+'" title="'+c.action+'"></span>'});
  if(G.spawnIdx>=G.waveCommands.length)html+='<span style="opacity:.4">all spawned</span>';
  bar.innerHTML=html;
}

}

function toggleDomain(dom){
  SFX.click();
  const idx=G.domainFilter.indexOf(dom);
  if(idx>=0){
    // Don't allow deselecting the last domain
    if(G.domainFilter.length<=1)return;
    G.domainFilter.splice(idx,1);
  }else{
    G.domainFilter.push(dom);
  }
  // Update pill states
  document.querySelectorAll('.domain-pill[data-domain]').forEach(btn=>{
    btn.classList.toggle('active',G.domainFilter.includes(btn.dataset.domain));
  });
  updateDomainAllBtn();
}

function toggleAllDomains(){
  SFX.click();
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  const allSelected=G.domainFilter.length===allDomains.length;
  if(allSelected){
    // Can't deselect all — do nothing
    return;
  }
  G.domainFilter=[...allDomains];
  document.querySelectorAll('.domain-pill[data-domain]').forEach(btn=>btn.classList.add('active'));
  updateDomainAllBtn();
}

function updateDomainAllBtn(){
  const allBtn=document.getElementById('domain-all');
  if(!allBtn)return;
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  allBtn.classList.toggle('active',G.domainFilter.length===allDomains.length);
}

function setDifficulty(diff){
  SFX.click();
  G.difficulty=diff;
  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.textContent.trim().toLowerCase().startsWith(diff));
  });
}

function resetProgress(){
  if(!activeCartridge)return;
  if(confirm('Reset all progress for '+activeCartridge.name+'? This cannot be undone.')){
    localStorage.removeItem('td-srs-'+activeCartridge.id);
    clearRunState();
    // Increment resetRev so cloud merge discards old cards
    G.resetRev=(G.resetRev||0)+1;
    G.srs=initSRS(activeCartridge.commands);
    saveSRS(true); // pushes reset state + resetRev to cloud
    SFX.click();
    showTitleScreen('title');
  }
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function getUnlockedTiersForWave(n){
  return n>=7?['core','regular','power','support']:n>=4?['core','regular','support']:['core'];
}
function genWave(n){
  const tiers=getUnlockedTiersForWave(n);
  G.unlockedTiers=tiers;
  let pool=COMMANDS.filter(c=>tiers.includes(c.tier));
  // Filter by selected domains
  if(G.domainFilter&&G.domainFilter.length>0){
    const filtered=pool.filter(c=>G.domainFilter.includes(c.dom));
    if(filtered.length>0)pool=filtered;
  }
  return pickCommands(pool,G.srs,Math.min(4+n,16),n);
}
let bgmLaunchTimer=null;
function cancelQueuedBGMStart(){
  if(bgmLaunchTimer){clearTimeout(bgmLaunchTimer);bgmLaunchTimer=null}
}
function queueBGMStart(delay=180){
  cancelQueuedBGMStart();
  bgmLaunchTimer=setTimeout(()=>{
    bgmLaunchTimer=null;
    SFX.startBGM();
  },delay);
}
function showGameUI(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').style.display='flex';
  document.getElementById('tier-bar').style.display='none';
  clearQuizAnswerFeedback();

  document.getElementById('queue-bar').style.display='none';
  // Shift canvas up so cubes visible above question panel
  ipMinimized=false;
  canvas.style.transform='translateY(-20vh)';
  updateTierBar();
  updateHUD();
  updateInput();
  updateQueue();
}
function startGame(){
  cancelQueuedBGMStart();
  clearRunState();
  resetExplanationState();
  SFX.stopMusicPreview();
  SFX.stopBGM();
  SFX.click();
  queueBGMStart();
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  Object.assign(G,{screen:'game',wave:1,score:0,lives:BASE_LIVES,streak:0,maxStreak:0,
    srs:loadSRS(activeCartridge),enemies:[],selectedId:null,inputState:'idle',treeDepth:3,
    spawnIdx:0,waveComplete:false,totalCorrect:0,totalWrong:0,combo:1,
    unlockedTiers:['core'],attemptsOnCurrent:0,commandStartTime:0,typedBuffer:'',paused:false,sessionStartTime:Date.now()});
  G.missStarCounter=0;
  clearMandelbrot();clearBornStars();
  fallingStars.forEach(f=>{f.life=0;f.mesh.visible=false});
  applyTimeDecay(G.srs);
  SFX.setTreeDepth(G.treeDepth);
  // Load persisted melody
  const melKey=getMelodyStorageKey();
  if(melKey){try{const ml=JSON.parse(localStorage.getItem(melKey));if(Array.isArray(ml))SFX.setMelody(ml)}catch(e){}}
  G.waveCommands=genWave(1);
  lastSpawnTime=performance.now();
  lastInputState='';
  showGameUI();
}
function continueGame(){
  const snapshot=loadRunState();
  if(!snapshot){startGame();return}
  cancelQueuedBGMStart();
  resetExplanationState();
  SFX.stopMusicPreview();
  SFX.stopBGM();
  SFX.click();
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  const mergedSrs=loadSRS(activeCartridge);
  if(snapshot.srs&&typeof snapshot.srs==='object'){
    for(const id of Object.keys(mergedSrs)){
      if(!snapshot.srs[id])continue;
      const snap=sanitizeSrsCard(snapshot.srs[id]);
      const pers=mergedSrs[id];
      // Keep card with higher rev; on tie, higher lastUpdated; on tie, persistent wins
      const snapRev=snap.rev||0,persRev=pers.rev||0;

function buildKnowledgeMapHtml(weakCmds,maxWidth){
  const mw=maxWidth||'360px';

  const pkColor=pk=>pk>=0.8?'#44ff88':pk>=0.5?'#ffcc00':pk>=0.2?'#ff8c00':'#ff4422';
  const pkDots=(pk,n=5)=>{const filled=Math.round(pk*n);return Array.from({length:n},(_,i)=>'<span style="color:'+(i<filled?pkColor(pk):'#3d1f00')+'">\u25cf</span>').join('')};
  let mapHtml='<div style="width:100%;max-width:'+mw+';margin-bottom:12px"><div class="sl" style="text-align:center;color:#4488ff;margin-bottom:6px">KNOWLEDGE MAP</div>';
  let hasContent=false;
  weakCmds.forEach(c=>{
    if(!c)return;
    const card=G.srs[c.id];
    if(!card||!card.dagState)return;
    const nodes=Object.entries(card.dagState).filter(([,s])=>s.encounters>0).map(([nid,s])=>{
      const dag=PREREQ_DAG[nid];
      return dag?{id:nid,level:dag.level||1,q:dag.q||nid,pKnown:s.pKnown||0.1,encounters:s.encounters}:null;
    }).filter(Boolean).sort((a,b)=>a.level-b.level||a.pKnown-b.pKnown);
    if(nodes.length===0)return;
    hasContent=true;
    const cmdName=activeCartridge.formatPrompt(c);
    mapHtml+='<div style="margin-bottom:8px;padding:6px 8px;background:#1a0d0033;border:1px solid #ff8c0022;border-radius:4px">';
    mapHtml+='<div style="font-size:11px;font-weight:700;color:#ff8c00;margin-bottom:4px">'+cmdName+' '+pkDots(card.pKnown||0.1)+'</div>';
    nodes.forEach(n=>{
      const indent=Math.max(0,(n.level-1)*12);
      const levelColors=['#4488ff','#44bbcc','#44cc66','#cccccc','#cccccc'];
      const lc=levelColors[Math.min(n.level-1,4)];
      const label=n.q.length>40?n.q.slice(0,38)+'\u2026':n.q;
      mapHtml+='<div style="padding-left:'+indent+'px;margin:2px 0;font-size:10px;line-height:1.3;border-left:2px solid '+lc+'33;padding:1px 0 1px 6px">';

    });
    mapHtml+='</div>';
  });
  mapHtml+='</div>';
  return hasContent?mapHtml:'';
}

// ── Spawning ──
let lastSpawnTime=0;
function trySpawn(now){
  if(G.screen!=='game'||G.waveComplete||G.spawnIdx>=G.waveCommands.length)return;
  const delay=G.spawnIdx===0?1500:Math.max(SPAWN_DELAY_BASE-G.wave*150,2500);
  if(now-lastSpawnTime<delay)return;
  const cmd=G.waveCommands[G.spawnIdx];
  const enemy={id:++G.nextEnemyId,cmd,t:0,spawned:Date.now(),speedMult:1,missCount:0};
  // Generate question + cache label for quiz-mode cartridges
  if(activeCartridge&&activeCartridge.inputMode==='quiz'){
    if(activeCartridge.generateQuestion)enemy.question=activeCartridge.generateQuestion(cmd,COMMANDS);
    enemy.label=getEnemyLabel(cmd);
  }
  G.enemies.push(enemy);
  addEnemyMesh(enemy);
  G.spawnIdx++;lastSpawnTime=now;
  SFX.spawn();
}

// ── Movement — adaptive speed ──
function moveEnemies(){
  const avgMastery=getAverageMastery(G.srs);
  // Base speed depends on difficulty
  const diffBase=G.difficulty==='learn'?0.3:G.difficulty==='challenge'?0.6:0.4;
  const waveMult=diffBase+(G.wave-1)*0.08;
  // Higher mastery = faster enemies (1.0x at mastery 0, up to 1.5x at mastery 5)
  const masteryMult=1.0+(avgMastery/5)*0.5;
  // Streak slowmo: time slows during hot streaks (reward for flow state)
  const streakSlow=G.streak>=10?0.5:G.streak>=5?0.7:G.streak>=3?0.85:1.0;
  const explainerSlow=(EXPLAINER_STATE.open&&!QUIZ_ANSWER_FEEDBACK.locked)?0.35:1.0;
  const speed=MOVE_SPEED_BASE*waveMult*masteryMult*streakSlow*explainerSlow;
  G.enemies.forEach(e=>{
    if(e.pendingCorrectHit)return;
    e.t+=speed*(e.speedMult||1);
  });
}

// ── Breach ──
function checkBreach(){
  const reached=G.enemies.filter(e=>e.t>=1&&!e.pendingCorrectHit);
  if(reached.length===0)return;
  SFX.breach();G.treeDepth=Math.max(0,G.treeDepth-2);SFX.setTreeDepth(G.treeDepth);
  reached.forEach(e=>{
    const bPos=enemyMeshes[e.id]?.position||pathPts[pathPts.length-1];
    spawnExplosion(bPos,20,0xff2200);
    // Breach lightning — 2 red bolts upward
    for(let li=0;li<2;li++){
      spawnLightning(bPos,new THREE.Vector3(bPos.x+(Math.random()-0.5)*4,10+Math.random()*3,bPos.z+(Math.random()-0.5)*2),0xff4422,0.4);
    }
    removeEnemyMesh(e.id);
    G.srs[e.cmd.id]=srsMiss(G.srs[e.cmd.id],G.wave,null); // Breach: no BKT update (no student response to observe), SRS penalty only
    saveSRS(); // debounced per-answer save
  });
  G.enemies=G.enemies.filter(e=>e.t<1);
  G.lives-=reached.length;G.streak=0;SFX.setStreak(0);G.combo=1;
  if(G.lives<=0){G.lives=0;SFX.gameOver();showEndScreen(false)}
}

// ── Wave complete (delayed until score particles land) ──

// ── Auto-select ──
function autoSelect(){

// ═══════════════════════════════════════════════
//  HIT / MISS — shared logic (with anti-spam cooldown)
// ═══════════════════════════════════════════════
function findSubconceptIndex(enemy){
  if(!enemy.subconcept||!enemy.cmd||!enemy.cmd.subconcepts)return null;
  const idx=enemy.cmd.subconcepts.indexOf(enemy.subconcept);
  return idx>=0?idx:null;
}
let lastAnswerTime=0;
function handleHit(enemy){
  const now=Date.now();if(now-lastAnswerTime<300)return;lastAnswerTime=now;
  const responseTime=Date.now()-G.commandStartTime;
  const attempts=G.attemptsOnCurrent+1;
  let speedMult=1;
  if(responseTime<1500)speedMult=2;else if(responseTime<3000)speedMult=1.5;else if(responseTime<5000)speedMult=1.2;
  const totalMult=G.combo*speedMult;
  const childPenalty=enemy.isChild?0.5:1;
  const pts=Math.floor((100+Math.max(0,50-Math.floor(responseTime/200)))*totalMult*childPenalty);
  const intensity=Math.min(1,speedMult/2);
  SFX.hit(intensity);
  const eMesh=enemyMeshes[enemy.id];
  const ePos=eMesh?eMesh.position.clone():new THREE.Vector3();
  const particleCount=24+Math.floor(intensity*28);
  const award=createScoreAward(pts,particleCount,AMB.glow);
  // Defer mesh removal + explosion — start ROYGBIV death animation
  if(eMesh){startDeathAnimation(enemy,eMesh,pts,particleCount,award)}
  else{spawnExplosion(ePos,particleCount,AMB.glow,true,award?{awardId:award.id}:{})}
  spawnBeam(serverGrp.position.clone().add(new THREE.Vector3(0,3,0)),ePos);
  G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);
  SFX.setStreak(G.streak);
  if(G.streak===5||G.streak===10||G.streak===15)SFX.combo();
  // Streak lightning at 10+
  if(G.streak>=5){
    const scoreEl=document.getElementById('h-score');
    const sTarget=scoreEl?new THREE.Vector3(0,12,8):new THREE.Vector3(0,10,5);
    spawnLightning(ePos,sTarget,G.streak>=10?0xffcc00:0xff8c00,G.streak>=10?0.6:0.4);
  }
  G.combo=Math.min(G.combo+.25,3);G.totalCorrect++;
  SFX.killMelody();
  if(!(enemy.splitDepth>=1))G.treeDepth=Math.min(10,G.treeDepth+1);
  SFX.setTreeDepth(G.treeDepth);
  const baseChoices=enemy.question?(enemy.question.options||enemy.question.choices||[]).length:4;
  const hitQType=enemy.question?enemy.question.type:'identify';
  const hitBktWeight=(hitQType==='application'||hitQType==='relationship')?0.7:1.0;
  const bktCtx={wasCorrect:true,questionType:hitQType,remainingChoices:baseChoices,bktWeight:hitBktWeight,subconceptIndex:enemy.splitDepth>=1&&enemy.subconcept?findSubconceptIndex(enemy):null,dagNodeId:enemy.dagNodeId||null,wave:G.wave,responseTimeMs:responseTime,_cmd:enemy.cmd};
  G.srs[enemy.cmd.id]=srsHit(G.srs[enemy.cmd.id],G.wave,responseTime,attempts,bktCtx);
  saveSRS(); // debounced per-answer save
  // Mesh removal is handled by death animation (startDeathAnimation detaches from enemyMeshes)
  G.enemies=G.enemies.filter(en=>en.id!==enemy.id);
  resetExplanationState();
  // Don't null selectedId — autoSelect will pick the next target smoothly
  // so camera never has a frame with no target (prevents snap to default orbit)
  G.inputState='idle';G.attemptsOnCurrent=0;G.typedBuffer='';
  // Correct answers permanently sharpen the Mandelbrot boundary.
  mbrotScoreBoost();
  // Born star at streak milestones (5, 10, 15, 20, 25)
  if(G.streak>=5&&G.streak%5===0)spawnBornStar();
  flash('+'+pts+(speedMult>=1.5?' \u26a1':''),speedMult>=2?AMB.css.white:AMB.css.glow);
}

function handleMiss(enemy){
  const now=Date.now();if(now-lastAnswerTime<300)return;lastAnswerTime=now;
  SFX.miss();
  // Tree depth: only penalize for L0 misses — prereq exploration should be free
  const missDepth=enemy.splitDepth||0;
  if(missDepth===0){G.treeDepth=Math.max(0,G.treeDepth-1);SFX.setTreeDepth(G.treeDepth)}
  G.streak=0;SFX.setStreak(0);G.combo=1;G.totalWrong++;
  G.attemptsOnCurrent++;
  const baseChoices=enemy.question?(enemy.question.options||enemy.question.choices||[]).length:4;
  // Check canNodeSplit BEFORE bktUpdate (critical: encounters must be read before increment)
  const nodeId=enemy.dagNodeId||null;
  const card=G.srs[enemy.cmd.id]||{};
  const depth=enemy.splitDepth||0;
  const qType=enemy.question?enemy.question.type:'identify';
  // Application/relationship misses: skip DAG decomposition (student confused WHICH formula, not its internals)
  const skipDAG=qType==='application'||qType==='relationship';
  let nodeCanSplit=false;
  if(!skipDAG){
    if(nodeId&&depth>=1){
      nodeCanSplit=canNodeSplit(card,nodeId);
    }else if(depth===0){
      const cmdRef=COMMANDS.find(c=>c.id===enemy.cmd.id)||enemy.cmd;
      if(cmdRef.prereqs&&cmdRef.prereqs.length>0)nodeCanSplit=true;
    }
  }
  // BKT update — 0.7x weight for application/relationship (tests transfer, not recall)
  const bktWeight=skipDAG?0.7:1.0;
  const bktCtx={wasCorrect:false,questionType:qType,remainingChoices:baseChoices,bktWeight,subconceptIndex:enemy.splitDepth>=1&&enemy.subconcept?findSubconceptIndex(enemy):null,dagNodeId:nodeId,wave:G.wave,_cmd:enemy.cmd};
  G.srs[enemy.cmd.id]=srsMiss(G.srs[enemy.cmd.id],G.wave,bktCtx);
  saveSRS();
  G.typedBuffer='';

  // Falling star trigger — every 3 misses, star falls → Mandelbrot grows
  G.missStarCounter=(G.missStarCounter||0)+1;
  console.log('[STAR] miss #'+G.missStarCounter+' (depth '+missDepth+')');
  if(G.missStarCounter>=3){
    G.missStarCounter=0;
    const landPos=new THREE.Vector3(1,0.15,-1); // Mandelbrot center
    console.log('[STAR] Spawning falling star → Mandelbrot impact #'+(MBROT.impacts+1));
    spawnFallingStar(landPos);
  }

  const isQuizMode=activeCartridge&&activeCartridge.inputMode==='quiz';
  // Surge: inverted — deeper prereqs surge less to encourage exploration
  const surge=isQuizMode?(depth===0?0.15:depth===1?0.08:depth===2?0.04:0.02):0.06;
  enemy.t=Math.min(PATH_LENGTH_T+.02,(enemy.t||0)+surge);
  // DAG hydra split
  if(isQuizMode&&depth<5&&nodeCanSplit){
    const didSplit=spawnHydraChildren(enemy);
    if(didSplit){
      SFX.split();
      const msgs=['SPLIT! PREREQS INCOMING','DEEPER! BUILDER CONCEPTS','FOUNDATIONS EXPOSED','BACK TO BASICS','BACK TO BASICS'];
      const cols=['#4488ff','#44bbcc','#44cc66','#cccccc','#cccccc'];
      flash(msgs[Math.min(depth,4)],cols[Math.min(depth,4)]);
      return;
    }
  }
  // Fallback: speed up — gentler for prereq enemies to encourage exploration
  const speedPenalty=isQuizMode?(depth===0?1.85:depth===1?1.4:1.2):1.5;
  enemy.speedMult=Math.min((enemy.speedMult||1)*speedPenalty,4.5);
  const mc=enemy.missCount||0;
  // L0 main formulas: 2-miss cap → forced breach (punishes random guessing)
  // L1+ prereqs: 3-miss cap → forced breach (gentler, learning mode)
  const missCap=depth===0?2:3;
  if(isQuizMode&&mc>=missCap){
    enemy.t=1.01; // force immediate breach on next checkBreach
    flash('TOO MANY MISSES! LOST A LIFE \u26a0','#ff0000');
    SFX.miss();
  }else{
    flash(isQuizMode?'MISS! PUSHED FORWARD \u26a0':'MISS! \u26a1FASTER','#ff4422');
  }
  if(activeCartridge&&activeCartridge.inputMode==='prefix-key')G.inputState='await_prefix';
  setTimeout(focusTypedInput,50);
}

// ═══════════════════════════════════════════════
//  HYDRA SPLIT
// ═══════════════════════════════════════════════
function spawnHydraChildren(parentEnemy){
  const cmd=parentEnemy.cmd;
  const depth=(parentEnemy.splitDepth||0)+1;
  if(G.enemies.length>20)return false;
  // Ancestor spawn budget: max 4 living descendants per L0 ancestor
  const ancestorId=parentEnemy.ancestorId||parentEnemy.id;
  const descendantCount=G.enemies.filter(e=>e.ancestorId===ancestorId).length;
  if(descendantCount>=4)return false;
  const budget=4-descendantCount;

  const parentPos=enemyMeshes[parentEnemy.id]?.position.clone();
  // Determine which prereq nodes to spawn
  let prereqIds=[];
  const card=G.srs[cmd.id]||{};
  // Look up canonical command for prereqs (enemy.cmd may be JSON-parsed without prereqs)
  const cmdRef=COMMANDS.find(c=>c.id===cmd.id)||cmd;
  if(depth===1){
    // Splitting L0 → L1: use command's prereqs
    prereqIds=cmdRef.prereqs||[];
    if(prereqIds.length===0){
      // Fallback to old subconcepts if no prereqs
      const subs=cmdRef.subconcepts||cmd.subconcepts;
      if(!subs||subs.length===0)return false;
      const count=Math.min(2,subs.length,budget);
      const parentCard=G.srs[cmd.id]||{};
      const ranked=subs.map((sc,i)=>({sc,i,pk:(parentCard.subPKnown&&parentCard.subPKnown[i]!=null)?parentCard.subPKnown[i]:0.1})).sort((a,b)=>a.pk-b.pk);
      const picked=ranked.slice(0,count).map(r=>r.sc);
      // Old-style subconcept spawn
      const explColor=0x4488ff;
      spawnExplosion(parentPos||pathPts[0],15,explColor);
      removeEnemyMesh(parentEnemy.id);G.enemies=G.enemies.filter(e=>e.id!==parentEnemy.id);
      const inheritedSpeed=Math.max(parentEnemy.speedMult||1,1)*1.35;
      picked.forEach((sc,i)=>{
        if(parentEnemy.t>0.82)return;
        const childT=Math.min(.82,Math.max(0,parentEnemy.t+0.02*(i+1)));
        const options=shuffleArr([sc.correct,...sc.wrong]);
        const correctIdx=options.indexOf(sc.correct);
        const child={id:++G.nextEnemyId,cmd:cmd,t:childT,spawned:Date.now(),
          speedMult:inheritedSpeed,isChild:true,splitDepth:1,missCount:0,
          ancestorId:ancestorId,subconcept:sc,
          question:{type:'subconcept',text:sc.q,options:options,correctIdx:correctIdx,correctKey:['a','b','c'][correctIdx]},
          label:'\u26a1 Sub-concept'};
        G.enemies.push(child);addChildEnemyMesh(child,i);
      });
      if(G.selectedId===parentEnemy.id){resetExplanationState();G.selectedId=null;G.inputState='idle'}
      return true;
    }
  }else{
    // Splitting L1+ → L2+: use the DAG node's prereqs
    const nodeId=parentEnemy.dagNodeId;
    if(!nodeId)return false;
    const node=PREREQ_DAG[nodeId];
    if(!node||!node.prereqs||node.prereqs.length===0)return false;
    prereqIds=node.prereqs;
  }

  // Filter to only valid DAG nodes
  prereqIds=prereqIds.filter(id=>PREREQ_DAG[id]);
  if(prereqIds.length===0)return false;

  // Select weakest prereqs (max 2, bounded by budget)
  const count=Math.min(2,prereqIds.length,budget);
  const selected=selectWeakestPrereqs(card,prereqIds,count);

  // Abort split if parent is too close to breach (prevents ghost split: parent removed but no children)
  if(parentEnemy.t>0.80)return false;

  // Visual: depth-based colors
  const depthColors=[0x4488ff,0x4488ff,0x44bbcc,0x44cc66,0xcccccc,0xcccccc];
  const explColor=depthColors[Math.min(depth,5)];
  spawnExplosion(parentPos||pathPts[0],Math.max(6,15-depth*2),explColor);
  removeEnemyMesh(parentEnemy.id);G.enemies=G.enemies.filter(e=>e.id!==parentEnemy.id);

  // Speed multipliers by depth
  const speedMults=[1.35,1.35,1.25,1.15,1.10,1.10];
  const inheritedSpeed=Math.max(parentEnemy.speedMult||1,1)*speedMults[Math.min(depth,5)];

  // Spawn prereq enemies
  selected.forEach((nodeId,i)=>{
    const node=PREREQ_DAG[nodeId];
    const childT=Math.min(.82,Math.max(0,parentEnemy.t+0.02*(i+1)));
    // Build MC options: splitDepth 1-2 = 3 options, 3-4 = 2 options
    const useTwo=depth>=3;
    const wrongChoices=useTwo?[node.wrong[Math.floor(Math.random()*node.wrong.length)]]:node.wrong.slice();
    const options=shuffleArr([node.correct,...wrongChoices]);
    const correctIdx=options.indexOf(node.correct);
    const keys=useTwo?['a','b']:['a','b','c'];
    const labels=['\u26a1 Prereq','\u26a1 Prereq','\u26a1\u26a1 Builder','\u26a1\u26a1\u26a1 Foundation','Basic'];
    const child={
      id:++G.nextEnemyId,cmd:cmd,t:childT,spawned:Date.now(),
      speedMult:inheritedSpeed,isChild:true,splitDepth:depth,missCount:0,
      ancestorId:ancestorId,dagNodeId:nodeId,
      question:{type:'subconcept',text:node.q,options:options,correctIdx:correctIdx,correctKey:keys[correctIdx]},
      label:labels[Math.min(depth,4)]
    };
    G.enemies.push(child);addChildEnemyMesh(child,i);
  });
  if(G.selectedId===parentEnemy.id){resetExplanationState();G.selectedId=null;G.inputState='idle'}
  return true;
}
// Voluntary split — student requests decomposition via ? button (no penalty)
// Parent stays alive; always spawns exactly 3 children; fills from deeper levels if needed
function collectPrereqs(startIds,target,seen){
  // BFS collect prereq nodes until we have enough, walking one level at a time
  if(!seen)seen=new Set();
  const queue=[...startIds.filter(id=>PREREQ_DAG[id]&&!seen.has(id))];
  const result=[];
  while(result.length<target&&queue.length>0){
    const id=queue.shift();
    if(seen.has(id))continue;seen.add(id);
    if(PREREQ_DAG[id]){result.push(id);
      const children=(PREREQ_DAG[id].prereqs||[]).filter(cid=>PREREQ_DAG[cid]&&!seen.has(cid));
      children.forEach(cid=>queue.push(cid));
    }
  }
  return result.slice(0,target);
}
function voluntarySplit(){
  if(G.screen!=='game'||QUIZ_ANSWER_FEEDBACK.locked||EXPLAINER_STATE.open)return;
  const enemy=G.selectedId?G.enemies.find(e=>e.id===G.selectedId):null;
  if(!enemy)return;
  const cmd=enemy.cmd;
  const cmdRef=COMMANDS.find(c=>c.id===cmd.id)||cmd;
  const depth=(enemy.splitDepth||0)+1;
  if(depth>5)return;
  if(G.enemies.length>20)return;
  // Determine prereq nodes — start with direct prereqs
  let directIds=[];
  if(depth===1){
    directIds=cmdRef.prereqs||[];
  }else if(enemy.dagNodeId){
    const node=PREREQ_DAG[enemy.dagNodeId];
    if(node&&node.prereqs)directIds=node.prereqs;
  }
  directIds=directIds.filter(id=>PREREQ_DAG[id]);
  if(directIds.length===0){flash('No deeper concepts available','#888');return}
  // Always 3: fill from deeper levels if direct prereqs < 3
  const selected=collectPrereqs(directIds,3);
  if(selected.length===0)return;
  // Slight BKT signal: "student wasn't confident" — nudge pKnown down gently
  const card=G.srs[cmd.id];
  if(card){
    const nodeId=enemy.dagNodeId||null;
    if(nodeId){
      if(!card.dagState)card.dagState={};
      if(!card.dagState[nodeId])card.dagState[nodeId]={pKnown:getTransferSeed(nodeId,cmd.id),encounters:0,lastEncounterWave:0};
      const st=card.dagState[nodeId];
      st.encounters++;st.lastEncounterWave=G.wave;
      st.pKnown=clampProb(st.pKnown*0.85); // gentle 15% confidence reduction
    }else{
      card.pKnownDirect=clampProb((card.pKnownDirect||0.1)*0.9);
    }
    recomputeCompositePKnown(card,cmdRef);
    saveSRS();
  }
  // Parent stays alive — children spawn alongside
  const ancestorId=enemy.ancestorId||enemy.id;
  const parentPos=enemyMeshes[enemy.id]?.position.clone();
  const depthColors=[0x4488ff,0x4488ff,0x44bbcc,0x44cc66,0xcccccc,0xcccccc];
  spawnExplosion(parentPos||pathPts[0],8,depthColors[Math.min(depth,5)]);
  const inheritedSpeed=enemy.speedMult||1; // same speed, no multiplier
  selected.forEach((nodeId,i)=>{
    const node=PREREQ_DAG[nodeId];
    const childDepth=node.level||depth; // use node's actual level for visual treatment
    const childT=Math.min(.82,Math.max(0,(enemy.t||0)+0.03+0.03*i)); // spawn ahead of parent
    const useTwo=childDepth>=4;
    const wrongChoices=useTwo?[node.wrong[Math.floor(Math.random()*node.wrong.length)]]:node.wrong.slice();
    const options=shuffleArr([node.correct,...wrongChoices]);
    const correctIdx=options.indexOf(node.correct);
    const keys=useTwo?['a','b']:['a','b','c'];
    const labels=['\u26a1 Prereq','\u26a1 Prereq','\u26a1\u26a1 Builder','\u26a1\u26a1\u26a1 Foundation','Basic','Basic'];
    const child={id:++G.nextEnemyId,cmd:cmd,t:Math.max(0,childT),spawned:Date.now(),
      speedMult:inheritedSpeed,isChild:true,splitDepth:childDepth,missCount:0,
      ancestorId:ancestorId,dagNodeId:nodeId,
      question:{type:'subconcept',text:node.q,options:options,correctIdx:correctIdx,correctKey:keys[correctIdx]},
      label:labels[Math.min(childDepth,5)]};
    G.enemies.push(child);addChildEnemyMesh(child,i);
  });
  SFX.split();
  flash('BREAK IT DOWN \u2753','#44bbcc');
  // Select the child closest to breach (highest t)
  const children=G.enemies.slice(-selected.length);
  const lastSpawned=children.sort((a,b)=>b.t-a.t)[0];
  resetExplanationState();
  G.selectedId=lastSpawned?lastSpawned.id:null;
  G.inputState='quiz';G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
}

window.addEventListener('keydown',e=>{
  // ── Compose mode guard (top priority when composing) ──
  if(G.composing){
    e.preventDefault();
    const k=e.key;
    if(k==='Escape'){exitComposeMode(false);return}
    if(k==='Enter'){exitComposeMode(true);return}
    if(k==='Backspace'){if(MELODY_STATE.notes.length>0){MELODY_STATE.notes.pop();lastInputState=''}return}
    if(k===' '){previewMelodyLoop();return}
    handleComposeKey(k);
    return;
  }
  if(e.key==='Escape'&&MUSIC_EDITOR.open){
    e.preventDefault();
    closeMusicEditor();
    return;
  }
  if(e.key==='Escape'&&G.screen==='game'){
    e.preventDefault();
    G.paused=false;
    returnToTitleFromRun();
    return;
  }
  // N = next wave, S = save+exit (wave clear screen only)
  if((e.key==='n'||e.key==='N')&&G.screen==='game'&&G.waveComplete){e.preventDefault();document.getElementById('overlay').classList.add('hidden');document.getElementById('input-panel').style.display='flex';nextWave();return}
  if((e.key==='s'||e.key==='S')&&G.screen==='game'&&G.waveComplete){e.preventDefault();document.getElementById('overlay').classList.add('hidden');returnToTitleFromRun();return}
  // P to pause/unpause during gameplay
  if((e.key==='p'||e.key==='P')&&G.screen==='game'&&!G.waveComplete){
    e.preventDefault();
    G.paused=!G.paused;
    if(G.paused)showPauseScreen();
    else resumeFromPause();
    return;
  }
  // Spacebar: block native button activation unless focus is in an editable element
  if(e.key===' '){
    const tag=document.activeElement&&document.activeElement.tagName;
    if(tag!=='INPUT'&&tag!=='TEXTAREA'&&!(document.activeElement&&document.activeElement.isContentEditable)){
      e.preventDefault();
      // Space dismisses held wrong-answer feedback
      if(QUIZ_ANSWER_FEEDBACK.held&&QUIZ_ANSWER_FEEDBACK.heldCallback){
        QUIZ_ANSWER_FEEDBACK.held=false;
        QUIZ_ANSWER_FEEDBACK.heldCallback();
        return;
      }
      // Space dismisses explainer/video
      if(EXPLAINER_STATE.open){
        closeExplanation();
        return;
      }
      if(!MUSIC_EDITOR.open&&!G.paused&&G.screen==='game'&&G.waveComplete){
        const btn=document.querySelector('#input-panel .btn');
        if(btn){btn.click();return}
      }
    }
    return;
  }

  // Backtick shortcut to enter compose mode
  if(e.key==='`'&&G.screen==='game'&&!G.paused&&G.treeDepth>=7&&!G.waveComplete){
    e.preventDefault();
    enterComposeMode();
    return;
  }

  // ── Pause menu shortcuts (R=resume, M=music, Escape already handled above) ──
  if(G.paused&&G.screen==='game'){
    const k=e.key.toLowerCase();
    if(k==='r'){e.preventDefault();resumeFromPause();return}
    if(k==='m'){e.preventDefault();openMusicEditor('pause');return}
    return;
  }

  // ── Title screen shortcuts ──
  if(G.screen==='title'&&!MUSIC_EDITOR.open){
    const k=e.key.toLowerCase();
    const tab=G._menuTab||'play';
    // Tab switching: P=play, R=ranks, M=more
    if(k==='p'&&tab!=='play'){e.preventDefault();G._menuTab='play';showTitleScreen();return}
    if(k==='r'&&tab!=='leaderboard'){e.preventDefault();G._menuTab='leaderboard';showTitleScreen();return}
    if(k==='m'&&tab!=='settings'){e.preventDefault();G._menuTab='settings';showTitleScreen();return}
    if(tab==='play'&&activeCartridge){
      if(k==='c'&&loadRunState()){e.preventDefault();continueGame();return}
      if(k==='d'){e.preventDefault();startGame();return}
    }
    return;
  }

  if(MODKEYS.has(e.key))return;
  if(G.screen!=='game')return;
  if(QUIZ_ANSWER_FEEDBACK.locked)return;

  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;

  // Tab: deep concepts → only deep. subconcepts → only subconcepts. else → parents only.
  if(e.key==='Tab'&&enemy){
    e.preventDefault();
    const deep=G.enemies.filter(en=>en.splitDepth>=2);
    const subs=G.enemies.filter(en=>en.splitDepth===1);
    const pool=deep.length>0?deep.sort((a,b)=>b.t-a.t):subs.length>0?subs.sort((a,b)=>b.t-a.t):[...G.enemies].sort((a,b)=>b.t-a.t);
    const idx=pool.findIndex(en=>en.id===G.selectedId);
    resetExplanationState();
    G.selectedId=pool[(idx+1)%pool.length].id;
    const im2=activeCartridge?activeCartridge.inputMode:'prefix-key';
    G.inputState=im2==='prefix-key'?'await_prefix':im2==='quiz'?'quiz':'typing';
    G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    SFX.select();
    setTimeout(()=>{if(im2==='quiz')focusBlankInput();else focusTypedInput()},50);
    return;
  }
  // Alt+E: 3-state cycle (closed → text → video → close)
  if(e.key==='e'&&e.altKey){
    e.preventDefault();
    if(QUIZ_ANSWER_FEEDBACK.locked)return; // block during feedback
    if(EXPLAINER_STATE.videoUrl||EXPLAINER_STATE.videoLoading){
      // video or loading → close everything
      closeExplanation();
    }else if(EXPLAINER_STATE.open){
      // text → try video, or close if unavailable
      const avail=getAnimationAvailability(EXPLAINER_STATE.animationId);
      if(avail!=='unavailable')loadAnimation(EXPLAINER_STATE.animationId);
      else closeExplanation();
    }else{
      openExplanationForSelectedCommand();
    }
    return;
  }

  // ? key: voluntary DAG decomposition
  if(e.key==='?'){e.preventDefault();voluntarySplit();return}

  if(!enemy)return;

  const mode=activeCartridge?activeCartridge.inputMode:'prefix-key';

  if(mode==='quiz'){
    // Quiz mode keyboard handling
    if(EXPLAINER_STATE.open)return; // answers locked during learning mode
    const q=enemy.question;
    if(!q)return;

    if(q.type==='identify'||q.type==='variable'||q.type==='application'){
      const k=e.key.toLowerCase();
      if(['a','b','c','d'].includes(k)){
        e.preventDefault();
        handleQuizChoice(k);
      }
    }else if(q.type==='relationship'){
      const k=e.key.toLowerCase();
      if(['a','b','c'].includes(k)){
        e.preventDefault();
        handleQuizChoice(k);
      }
    }else if(q.type==='fillblank'){
      const k=e.key.toLowerCase();
      if(['a','b','c'].includes(k)){
        e.preventDefault();
        handleHintChoice(k);
      }
    }else if(q.type==='subconcept'){
      const k=e.key.toLowerCase();
      if(['a','b','c'].includes(k)){
        e.preventDefault();
        handleSubconceptChoice(k);
      }
    }
  }else if(mode==='prefix-key'){
    e.preventDefault();
    if(EXPLAINER_STATE.open)return;
    if(G.inputState==='await_prefix'){
      if(e.ctrlKey&&e.key==='b'){G.inputState='await_command';SFX.prefix()}
      return;
    }
    if(G.inputState==='await_command'){
      if(e.key===enemy.cmd.key){
        handleHit(enemy);
      }else{
        handleMiss(enemy);
      }
    }
  }else if(mode==='typed'){
    if(EXPLAINER_STATE.open)return;
    // If input exists but isn't focused, redirect focus and replay the keystroke
    const inp=document.getElementById('typed-input');
    if(inp&&document.activeElement!==inp){
      inp.focus();
      if(e.key.length===1&&!e.ctrlKey&&!e.altKey&&!e.metaKey){
        e.preventDefault();
        inp.value+=e.key;
        G.typedBuffer=inp.value;
      }
    }
    if(e.key==='Enter'){
      e.preventDefault();
      const val=inp?inp.value:G.typedBuffer;
      if(val.trim()==='')return;
      if(activeCartridge.validate(val,enemy.cmd.key,enemy.cmd).correct){
        handleHit(enemy);
      }else{
        handleMiss(enemy);
        if(inp)inp.value='';
      }
      return;
    }
    if(inp&&e.target===inp){
      requestAnimationFrame(()=>{
        if(document.getElementById('typed-input'))G.typedBuffer=document.getElementById('typed-input').value;
      });
    }
  }
});

  if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    if(pinchStartDist>0)camZoomMult=Math.max(0.4,Math.min(3.0,pinchStartZoom*(pinchStartDist/dist)));
  }else if(e.touches.length===1&&!isTwoFinger){
    // Single-finger drag: smooth orbit rotation
    const cx=e.touches[0].clientX;
    if(isDragging){
      const delta=(cx-lastDragX)/window.innerWidth*Math.PI*2; // full screen width = full rotation
      camOrbitAngle-=delta;
    }
    lastDragX=cx;
    isDragging=true;
  }
},{passive:true});
canvas.addEventListener('touchend',function(e){
  if(G.screen!=='game'||G.paused||QUIZ_ANSWER_FEEDBACK.locked)return;
  if(isTwoFinger){isTwoFinger=false;return}
  const touch=e.changedTouches[0];
  const dx=touch.clientX-touchStartX;
  const dy=touch.clientY-touchStartY;
  const dt=Date.now()-touchStartTime;
  isDragging=false;
  // Vertical swipe: show/hide question panel
  if(Math.abs(dy)>50&&Math.abs(dy)>Math.abs(dx)&&dt<500){
    const ip=document.getElementById('input-panel');
    if(dy>0&&!ipMinimized){
      // Swipe down: minimize panel, canvas back to normal
      ipMinimized=true;
      ip.style.transform='translateY(calc(100% - 28px))';
      ip.style.transition='transform 0.3s ease';
      canvas.style.transform='';
      canvas.style.transition='transform 0.3s ease';
    }else if(dy<0&&ipMinimized){
      // Swipe up: restore panel, shift canvas up so cubes stay visible
      ipMinimized=false;
      ip.style.transform='';
      ip.style.transition='transform 0.3s ease';
      canvas.style.transform='translateY(-20vh)';
      canvas.style.transition='transform 0.3s ease';
    }
    return;
  }
  // Horizontal drag already handled in touchmove (smooth orbit)
  // Double-tap: toggle cube-view
  if(Math.abs(dx)<18&&Math.abs(dy)<18&&dt<280){
    const now=Date.now();
    if(now-lastDoubleTap<350){
      lastDoubleTap=0;
      camMode=camMode==='follow'?'cube':'follow';
      return;
    }
    lastDoubleTap=now;
    // Single tap: select enemy near tap point
    const picked=pickEnemyAtScreenPoint(touch.clientX,touch.clientY);
    if(picked&&picked.id!==G.selectedId)selectEnemy(picked.id);
  }
},{passive:true});
// iOS AudioContext resume
document.addEventListener('touchstart',function resumeAudio(){try{const c=new(window.AudioContext||window.webkitAudioContext)();c.resume().then(()=>c.close())}catch(e){}document.removeEventListener('touchstart',resumeAudio)},{once:true,passive:true});
document.body.addEventListener('touchmove',function(e){if(e.target===document.body||e.target===canvas)e.preventDefault()},{passive:false});

// Mouse wheel zoom (desktop)
canvas.addEventListener('wheel',function(e){
  if(G.screen!=='game')return;
  e.preventDefault();
  camZoomMult=Math.max(0.3,Math.min(4.0,camZoomMult+e.deltaY*0.002));
},{passive:false});

// Desktop click-to-select
canvas.addEventListener('click',function(e){
  if(G.screen!=='game'||G.paused||QUIZ_ANSWER_FEEDBACK.locked)return;
  const picked=pickEnemyAtScreenPoint(e.clientX,e.clientY);
  if(picked&&picked.id!==G.selectedId)selectEnemy(picked.id);
});

window.addEventListener('beforeunload',()=>{
  if(G.screen==='game')syncRunCheckpoint();
});

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
let lastTime=0;
function animate(time){
  requestAnimationFrame(animate);
  const dt=time-lastTime;lastTime=time;
  const frameScale=Math.min(2.25,Math.max(.75,(dt||16.67)/16.67));

  // Camera: follow selected enemy with smooth lerp
  const selEnemy=G.selectedId?enemyMeshes[G.selectedId]:null;
  const selEnemyObj=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  // In follow mode, slowly decay orbit back to center. In cube mode, hold the angle.
  if(camMode==='follow')camOrbitAngle*=0.97;
  if(selEnemy&&G.screen==='game'&&camMode==='cube'){
    // Cube perspective: orbit at cube height, always looking ~15° above horizon
    const ep=selEnemy.position;
    const orbitR=3.0*camZoomMult;
    const tx=ep.x+Math.sin(camOrbitAngle)*orbitR;
    const ty=ep.y+1.2; // at cube height
    const tz=ep.z+Math.cos(camOrbitAngle)*orbitR;
    camera.position.x+=(tx-camera.position.x)*.12;
    camera.position.y+=(ty-camera.position.y)*.12;
    camera.position.z+=(tz-camera.position.z)*.12;
    // Look toward cube, slightly above grid (~3° above horizon)
    camera.lookAt(ep.x,ep.y+0.5,ep.z);
  }else if(selEnemy&&G.screen==='game'){
    // Follow mode: orbit around cube, slightly off-center
    const port=isPortrait();
    const pY=port?1.4:1,pZ=port?1.3:1;
    const dist=8*pZ*camZoomMult;
    const height=4*pY*camZoomMult;
    const ep=selEnemy.position;
    // Orbit offset from camOrbitAngle
    const tx=ep.x+Math.sin(camOrbitAngle)*dist*0.3;
    const tz=ep.z+Math.cos(camOrbitAngle)*dist*0.15+dist;
    const ty=height;
    camera.position.x+=(tx-camera.position.x)*.02;
    camera.position.y+=(ty-camera.position.y)*.02;
    camera.position.z+=(tz-camera.position.z)*.02;
    // Smooth lookAt — lerp the target so camera doesn't snap on target switch
    const lookBiasY=port?1.5:1.5;
    const wantLookX=ep.x*0.8,wantLookY=lookBiasY,wantLookZ=ep.z*0.7-1;
    camLookX+=(wantLookX-camLookX)*.02;
    camLookY+=(wantLookY-camLookY)*.02;
    camLookZ+=(wantLookZ-camLookZ)*.02;
    camera.lookAt(camLookX,camLookY,camLookZ);
  }else if(G.screen==='game'){
    // No selected mesh — hold current camera during gameplay (between kills, wave gaps, dying)
    camera.lookAt(camLookX,camLookY,camLookZ);
  }else{
    // Default orbit (title screen, no enemies)
    const orbY=isPortrait()?22:18;
    const orbZ=isPortrait()?18:14;
    camera.position.x+=(Math.sin(time*.0002)*.3-camera.position.x)*.05;
    camera.position.y+=(orbY+Math.sin(time*.0003)*.2-camera.position.y)*.05;
    camera.position.z+=(orbZ-camera.position.z)*.05;
    camera.lookAt(0,0,-1);
  }

  // Pinned label + 3D reticle (replaces old floating labels)
  updateSelectedLabel();
  updateSelectionReticle(time);
  updateMelodyBar();

  serverLight.intensity=1.5+Math.sin(time*.003)*.3;
  sTop.rotation.y=time*.001;
  ant.material.color.setHex(Math.sin(time*.005)>.3?AMB.glow:AMB.mid);

  spawnMark.material.opacity=.2+Math.sin(time*.004)*.2;
  spawnMark.rotation.y=time*.002;

  if(G.screen==='game'&&!G.paused){
    if(!G.composing){trySpawn(time);moveEnemies();checkBreach();checkWaveComplete();autoSelect();}
    updateEnemyMeshes();updateDyingEnemies(dt);updateHUD();updateInput();updateQueue();
    SFX.setKey(G.wave);
    // Evolve pad: only count main formula enemies (not sub/deep children)
    if(G.waveCommands.length>0){
      const mainEnemies=G.enemies.filter(e=>!e.splitDepth||e.splitDepth===0).length;
      const unspawned=G.waveCommands.length-G.spawnIdx;
      const mainRemaining=mainEnemies+unspawned;
    }
  }
  updateSelectedSpotlight(time);

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.ageMs=(p.ageMs||0)+dt;
    if(p.funnelToScore){
      if(p.ageMs<p.burstMs){
        p.vel.multiplyScalar(1.012);
        p.vel.y-=.0035*frameScale;
        // Fractal branching: 10% chance mid-burst, max depth 2, cap 120
        if(!p.branched&&(p.branchDepth||0)<2&&particles.length<120&&p.ageMs>p.burstMs*0.4&&Math.random()<0.10){
          p.branched=true;
          const bc=p.mesh.material.color.getHex();
          const bm=new THREE.Mesh(particleGeo,new THREE.MeshBasicMaterial({color:bc,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false}));
          bm.position.copy(p.mesh.position);
          bm.scale.setScalar(p.mesh.scale.x*0.7);
          const bv=p.vel.clone().applyAxisAngle(new THREE.Vector3(0,1,0),(Math.random()-0.5)*1.0);
          particles.push({mesh:bm,vel:bv,life:p.life*0.7,decay:p.decay*1.3,ageMs:p.ageMs,burstMs:p.burstMs,funnelToScore:true,awardId:null,trailTicker:0,swirl:p.swirl*(Math.random()>0.5?1:-1),twinkle:Math.random()*Math.PI*2,branchDepth:(p.branchDepth||0)+1,branched:false});
          scene.add(bm);
        }
      }else{
        const target=getScoreFunnelTarget(p.mesh.position);
        const toScore=target.clone().sub(p.mesh.position);
        const dist=toScore.length();
        if(dist>.001){
          const dir=toScore.normalize();
          const tangent=new THREE.Vector3(-dir.z,0,dir.x);
          if(tangent.lengthSq()<.0001)tangent.set(1,0,0);
          else tangent.normalize();
          // Tempo-driven funnel speed (halved base, scales with BPM)
          const tempoScale=(SFX.getMusicConfig?SFX.getMusicConfig().tempo||80:80)/160; // 80bpm = 0.5x, 120bpm = 0.75x
          const pull=dir.multiplyScalar((.08+Math.min(.13,dist*.012))*tempoScale);
          pull.addScaledVector(tangent,p.swirl*(1+Math.min(2.2,dist*.08)));
          pull.y+=Math.sin(p.ageMs*.018+p.twinkle)*.003;
          p.vel.lerp(pull,Math.min(.14*frameScale*tempoScale,.24));
        }
        p.vel.multiplyScalar(Math.pow(.955,frameScale));
        // Funnel-phase branching: 4% chance past 40% journey, visual only, skip on mobile
        if(!p.branched&&(p.branchDepth||0)<2&&particles.length<120&&!isReducedParticleMode()&&p.life/4.5<0.6&&Math.random()<0.04){
          p.branched=true;
          const bc=p.mesh.material.color.getHex();
          const bm=new THREE.Mesh(particleGeo,new THREE.MeshBasicMaterial({color:bc,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false}));
          bm.position.copy(p.mesh.position);
          bm.scale.setScalar(p.mesh.scale.x*0.6);
          const bv=p.vel.clone().applyAxisAngle(new THREE.Vector3(0,1,0),(Math.random()-0.5)*0.8);
          particles.push({mesh:bm,vel:bv,life:p.life*0.6,decay:p.decay*1.4,ageMs:p.ageMs,burstMs:0,funnelToScore:true,awardId:null,trailTicker:0,swirl:p.swirl*(Math.random()>0.5?1.2:-1.2),twinkle:Math.random()*Math.PI*2,branchDepth:(p.branchDepth||0)+1,branched:false});
          scene.add(bm);
        }
        p.trailTicker=(p.trailTicker||0)+dt;
        if(p.trailTicker>52&&p.life>.18){
          p.trailTicker=0;
          spawnTrailGhost(p.mesh.position,p.mesh.material.color.getHex(),Math.max(.12,p.mesh.scale.x*.72),p.awardId,p.vel.clone().multiplyScalar(.16));
        }
        if(dist<.72||(dist<1.1&&p.life<.32)){
          collectScoreAwardChunk(p.awardId,target,p.mesh.material.color.getHex());
          p.life=0;
        }else if(dist<1.1){
          p.life-=p.decay*frameScale*2.2;
        }
      }
    }else{
      p.vel.y-=.005*frameScale;
    }
    p.mesh.position.addScaledVector(p.vel,frameScale);
    p.life-=p.decay*frameScale*(p.funnelToScore&&p.ageMs>p.burstMs?.35:1);
    // Starlike twinkle: tempo-synced pulsing opacity + scale
    const tempoHz=(SFX.getMusicConfig?SFX.getMusicConfig().tempo||80:80)/60;
    const twinklePhase=p.ageMs*.001*tempoHz*Math.PI*4+p.twinkle;
    const twinkleOpacity=p.funnelToScore?(.55+Math.sin(twinklePhase)*.45):1;
    p.mesh.material.opacity=Math.max(0,p.life*twinkleOpacity);
    const twinkleScale=p.funnelToScore?(.6+Math.sin(twinklePhase*.7+1.2)*.4):1;
    const particleScale=(p.funnelToScore&&p.ageMs>p.burstMs?Math.max(.35,p.life*1.2):Math.max(.20,p.life))*twinkleScale;
    p.mesh.scale.setScalar(particleScale);
    // Spin plus symbols for star effect
    if(p.funnelToScore){p.mesh.rotation.z+=.04*frameScale*(1+Math.sin(p.twinkle)*.5)}
    if(p.life<=0){scene.remove(p.mesh);p.mesh.material.dispose();particles.splice(i,1)}
  }
  for(let i=trailGhosts.length-1;i>=0;i--){
    const ghost=trailGhosts[i];
    ghost.life-=ghost.decay*frameScale;
    ghost.mesh.position.addScaledVector(ghost.vel,frameScale);
    ghost.mesh.rotation.x+=ghost.spin*frameScale;
    ghost.mesh.rotation.y+=ghost.spin*.6*frameScale;
    ghost.mesh.scale.multiplyScalar(Math.pow(1.018,frameScale));
    ghost.mesh.material.opacity=Math.max(0,ghost.life*.45);
    if(ghost.life<=0){
      releaseTrailGhost(ghost);
      trailGhosts.splice(i,1);
    }
  }
  for(let i=beams.length-1;i>=0;i--){
    const b=beams[i];b.life-=b.decay;b.line.material.opacity=b.life;
    if(b.life<=0){scene.remove(b.line);b.line.material.dispose();b.line.geometry.dispose();beams.splice(i,1)}
  }

  // fBm amber sky + bloom render pipeline
  const timeSec=time*0.001;
  const td=G.treeDepth||0;
  skyMaterial.uniforms.time.value=timeSec;
  skyMaterial.uniforms.brightness.value=0.15+Math.min(td,10)*0.02;

  // Fractal trees (in game scene, grounded on terrain)
  const sk=SFX.getStreak();
  treeDisplayDepth+=(td-treeDisplayDepth)*0.05;
  const tempo=SFX.getMusicConfig?SFX.getMusicConfig().tempo||80:80;
  const omega=(tempo/60)*Math.PI*2*0.25; // quarter speed sway
  const swayAmp=0.03+sk*0.005;
  treeMeshes.forEach(t=>{
    const tc=t.config;
    const active=td>=tc.unlockAt;
    if(!active){t.mesh.visible=false;t.geo.setDrawRange(0,0);return;}
    const treeD=Math.max(1,Math.min(10,td-tc.unlockAt+2));
    const levels=treeD+1;
    const count=generateTree(0,0,tc.len,tc.angle,tc.ba,tc.ls,0,levels,timeSec,omega,swayAmp,t.posArr,t.colArr,0);
    t.geo.attributes.position.needsUpdate=true;
    t.geo.attributes.color.needsUpdate=true;
    t.geo.setDrawRange(0,count*2);
    t.mesh.visible=true;
  });

  // Fractal ferns
  fernMeshes.forEach(f=>{
    const fc=f.config;
    const active=td>=fc.unlockAt;
    if(!active){f.mesh.visible=false;f.geo.setDrawRange(0,0);return}
    const fernD=Math.min(5,Math.floor(td*0.6));
    const count=generateFern(0,0,fc.len,fc.angle,0,fernD+1,timeSec,omega,f.posArr,f.colArr,0);
    f.geo.attributes.position.needsUpdate=true;
    f.geo.attributes.color.needsUpdate=true;
    f.geo.setDrawRange(0,count*2);
    f.mesh.visible=true;
  });
  // Fractal stars (sky)
  starMeshes.forEach(s=>{
    const sc=s.config;
    const active=td>=sc.unlockAt;
    if(!active){s.mesh.visible=false;s.geo.setDrawRange(0,0);return}
    const starD=Math.min(3,Math.max(1,Math.floor((td-sc.unlockAt)*0.5)+1));
    const count=generateFractalStar(0,0,sc.len,0,starD,s.posArr,0,FRACTAL_STAR_MAX);
    s.geo.attributes.position.needsUpdate=true;
    s.geo.setDrawRange(0,count*2);
    // Twinkle: opacity pulse + slow rotation
    s.mesh.material.opacity=0.4+Math.sin(timeSec*2.5+sc.phase)*0.3;
    s.mesh.rotation.z=timeSec*0.3+sc.phase;
    s.mesh.visible=true;
  });
  // Lightning lifecycle
  lightningPool.forEach(b=>{
    if(b.life<=0){b.mesh.visible=false;return}
    b.life-=b.decay*frameScale;
    b.mat.opacity=Math.max(0,b.life);
    if(b.life<=0)b.mesh.visible=false;
  });

  // Falling stars lifecycle
  fallingStars.forEach(f=>{
    if(f.life<=0){f.mesh.visible=false;return}
    f.life-=f.decay*frameScale;
    f.mat.opacity=Math.max(0,f.life);
    const progress=1-f.life;
    const segsVisible=Math.max(1,Math.floor(progress*FALLING_STAR_SEGS));
    f.geo.setDrawRange(0,segsVisible*2);
    if(f.life<=0){
      f.mesh.visible=false;
      growMandelbrot();
    }
  });

  // Mandelbrot per-pixel — update terrain shader uniforms
  MBROT.intensity+=(MBROT.targetIntensity-MBROT.intensity)*0.06;
  MBROT.zoom+=(MBROT.targetZoom-MBROT.zoom)*0.04;
  terrMat.uniforms.mbrotIntensity.value=MBROT.intensity;
  terrMat.uniforms.mbrotIter.value=MBROT.iterations;
  terrMat.uniforms.mbrotZoom.value=MBROT.zoom;

  // Born stars animation
  bornStars.forEach(s=>{
    const age=(Date.now()-s.birthTime)/1000;
    const fadeIn=Math.min(1,age/2); // 2s fade-in
    s.mat.opacity=fadeIn*(0.4+Math.sin(timeSec*2.5+s.phase)*0.3);
    s.mesh.rotation.z=timeSec*0.3+s.phase;
    const depth=Math.min(3,Math.max(1,Math.floor(td*0.4)));
    const count=generateFractalStar(0,0,0.4,0,depth,s.posArr,0,FRACTAL_STAR_MAX);
    s.geo.attributes.position.needsUpdate=true;
    s.geo.setDrawRange(0,count*2);
  });

  // Health-driven visual atmosphere
  const norm=Math.min(td,10)/10;
  const tgtSat=0.65+norm*0.55; // 0.65 → 1.20 (more dramatic range)
  const tgtCon=0.85+norm*0.15; // 0.85 → 1.00
  const tgtVig=0.70-norm*0.55; // 0.70 → 0.15
  const vRate=0.04;
  vigSat+=(tgtSat-vigSat)*vRate;
  vigCon+=(tgtCon-vigCon)*vRate;
  vigInt+=(tgtVig-vigInt)*vRate;
  vigMaterial.uniforms.intensity.value=vigInt;
  // CSS filter (quantized to 2 decimal places to reduce DOM writes on mobile)
  const fStr='saturate('+vigSat.toFixed(2)+') contrast('+vigCon.toFixed(2)+')';
  if(fStr!==lastCssFilter){canvas.style.filter=fStr;lastCssFilter=fStr}

  renderer.autoClear=false;
  renderer.clear();
  renderer.render(skyScene,skyCamera);
  renderer.clearDepth();
  renderer.render(scene,camera);
  renderer.render(vigScene,vigCamera);
  renderer.autoClear=true;
}
requestAnimationFrame(animate);

// ═══════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════
function isPortrait(){return window.innerHeight>window.innerWidth}
function handleResize(){
  const w=window.innerWidth,h=window.visualViewport?window.visualViewport.height:window.innerHeight;
  camera.aspect=w/h;
  camera.fov=isPortrait()?65:50;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  skyMaterial.uniforms.resolution.value.set(w,h);
  vigMaterial.uniforms.resolution.value.set(w,h);
}
window.addEventListener('resize',handleResize);
window.addEventListener('orientationchange',()=>setTimeout(handleResize,150));
if(window.visualViewport)window.visualViewport.addEventListener('resize',handleResize);

  validateDAG();
  EXPLANATION_BANK=activeCartridge.buildExplanationBank(COMMANDS);
  showTitleScreen('boot');
}
