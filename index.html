    const cardPK=G.srs[e.cmd.id]?G.srs[e.cmd.id].pKnown:0.1;
    const dp=e.splitDepth||0;
    const promptText=e.label||(activeCartridge?activeCartridge.formatPrompt(e.cmd):e.cmd.action);
    const speedTag=e.speedMult>1?'\u26a1'+e.speedMult.toFixed(1)+'x':'';
    const contentKey=e.cmd.id+'|'+isSel+'|'+mastery+'|'+speedTag+'|'+dp+'|'+(cardPK<0.3?1:0);
    const textC=isSel?(dp>=2?'#c892ff':dp>=1?'#7eb9ff':'#d0d0d0'):(dp>=2?'#b67adf':dp>=1?'#78a7ea':'#c78234');
    let cached=labelCache.get(e.id);
    if(!cached){
      const div=document.createElement('div');
      div.onclick=()=>{
        if(QUIZ_ANSWER_FEEDBACK.locked)return;
        resetExplanationState();
        G.selectedId=e.id;
        const im=activeCartridge?activeCartridge.inputMode:'prefix-key';
        G.inputState=im==='prefix-key'?'await_prefix':im==='quiz'?'quiz':'typing';
        G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
        SFX.select();
        if(im==='quiz')setTimeout(focusBlankInput,50);
        else if(im==='typed')focusTypedInput();
      };
      labelsDiv.appendChild(div);
      cached={div,key:''};
      labelCache.set(e.id,cached);
    }
    cached.div.style.display='';
    cached.div.style.left=x+'px';
    cached.div.style.top=y+'px';
    cached.div.style.color=textC;
    if(cached.key!==contentKey){
      cached.key=contentKey;
      cached.div.className='enemy-label'+(isSel?' selected':'')+(cardPK<0.3?' bkt-uncertain':'');
      const speedHtml=speedTag?(' <span style="color:#ff4422;font-size:7px">'+speedTag+'</span>'):'';
      cached.div.innerHTML='<div class="enemy-label-shell"><div class="enemy-label-inner"><span class="dot" style="background:'+MASTERY_COLORS[mastery]+'"></span>'+promptText+speedHtml+'</div></div>'+(isSel?'<div class="sel-arrow">\u25bc</div>':'');
    }
    activeIds.add(e.id);
  });
  // Remove orphaned labels (dead enemies)
  for(const [id,cached] of labelCache){
    if(!activeIds.has(id)){
      cached.div.remove();
      labelCache.delete(id);
    }
  }
}
function clearLabelCache(){
  for(const [,cached] of labelCache)cached.div.remove();
  labelCache.clear();
}

function pickEnemyAtScreenPoint(clientX,clientY){
  const maxDistSq=Math.pow(isCompactMobileViewport()?72:52,2);
  let bestEnemy=null;
  let bestDistSq=maxDistSq;
  G.enemies.forEach(enemy=>{
    const mesh=enemyMeshes[enemy.id];
    if(!mesh)return;
    const projected=mesh.position.clone();
    projected.project(camera);
    if(projected.z>1||projected.z<-1)return;
    const x=(projected.x*.5+.5)*window.innerWidth;
    const y=(-(projected.y*.5)+.5)*window.innerHeight;
    const dx=x-clientX;
    const dy=y-clientY;
    const distSq=dx*dx+dy*dy;
    if(distSq>bestDistSq)return;
    if(bestEnemy&&distSq===bestDistSq&&enemy.t<=bestEnemy.t)return;
    bestEnemy=enemy;
    bestDistSq=distSq;
  });
  return bestEnemy;
}

const QUIZ_ANSWER_FEEDBACK={locked:false,timer:null,heldCallback:null};
function clearQuizAnswerFeedback(){
  if(QUIZ_ANSWER_FEEDBACK.timer){
    clearTimeout(QUIZ_ANSWER_FEEDBACK.timer);
    QUIZ_ANSWER_FEEDBACK.timer=null;
  }
  QUIZ_ANSWER_FEEDBACK.locked=false;
  QUIZ_ANSWER_FEEDBACK.heldCallback=null;
  QUIZ_ANSWER_FEEDBACK.held=false;
  document.querySelectorAll('.mc-grid.answer-pending,.hint-mc-grid.answer-pending').forEach(el=>el.classList.remove('answer-pending'));
  document.querySelectorAll('.mc-btn.correct,.mc-btn.wrong,.hint-mc-btn.correct,.hint-mc-btn.wrong').forEach(btn=>btn.classList.remove('correct','wrong'));
  const fb=document.getElementById('wrong-fb');if(fb)fb.remove();
}
function reshuffleQuestionOptions(enemy){
  const q=enemy.question;
  if(!q)return;
  if(q.type==='identify'){
    const correct=q.options[q.correctIdx];
    q.options=shuffleArr(q.options);
    q.correctIdx=q.options.indexOf(correct);
    q.correctKey=['a','b','c','d'][q.correctIdx];
  }else if(q.type==='fillblank'){
    q.choices=shuffleArr(q.choices);
    // No correctIdx/correctKey needed — validateBlank compares against q.answer
  }else if(q.type==='subconcept'){
    const correct=q.options[q.correctIdx];
    q.options=shuffleArr(q.options);
    q.correctIdx=q.options.indexOf(correct);
    q.correctKey=(q.options.length<=2?['a','b']:['a','b','c'])[q.correctIdx];
  }
  // Bust the render cache so updateInput() repaints with new option order
  lastInputState='';
  updateInput();
}
function queueQuizChoiceResolution(enemy,key,isCorrect){
  if(QUIZ_ANSWER_FEEDBACK.locked||!enemy||G.screen!=='game')return;
  const btn=document.querySelector('[data-choice="'+key+'"]');
  const group=btn&&btn.parentElement;
  QUIZ_ANSWER_FEEDBACK.locked=true;
  if(isCorrect)enemy.pendingCorrectHit=true;
  // Increment missCount BEFORE scheduling so delay uses updated value
  if(!isCorrect)enemy.missCount=(enemy.missCount||0)+1;
  const delay=isCorrect?220:0; // wrong answers auto-hold (no timer)
  if(group)group.classList.add('answer-pending');
  if(btn)btn.classList.add(isCorrect?'correct':'wrong');
  // Show correction feedback on wrong answer — auto-holds until dismissed
  if(!isCorrect&&enemy.question){
    const q=enemy.question;
    const chosenIdx=['a','b','c','d'].indexOf(key);
    const chosenText=(q.options||q.choices||[])[chosenIdx]||key.toUpperCase();
    const correctText=(q.options||q.choices||[])[q.correctIdx]||'';
    const explain=enemy.cmd&&enemy.cmd.explain?enemy.cmd.explain:'';
    const fb=document.createElement('div');fb.className='wrong-feedback';fb.id='wrong-fb';
    fb.innerHTML='<div class="wf-wrong">\u2717 '+chosenText+'</div><div class="wf-correct">\u2713 '+correctText+'</div>'+(explain?'<div class="wf-explain">'+explain+'</div>':'')+'<button class="btn" style="margin-top:8px;padding:6px 16px;font-size:10px;width:100%" id="wrong-fb-dismiss">GOT IT</button>';
    const body=document.getElementById('ip-body');
    if(body){body.appendChild(fb);body.scrollTop=body.scrollHeight}
  }
  const resolveFn=()=>{
    QUIZ_ANSWER_FEEDBACK.timer=null;
    QUIZ_ANSWER_FEEDBACK.locked=false;
    QUIZ_ANSWER_FEEDBACK.heldCallback=null;
    const liveEnemy=G.enemies.find(en=>en.id===enemy.id);
    if(!liveEnemy||G.screen!=='game'){
      if(liveEnemy)delete liveEnemy.pendingCorrectHit;
      clearQuizAnswerFeedback();
      return;
    }
    clearQuizAnswerFeedback();
    delete liveEnemy.pendingCorrectHit;
    if(isCorrect){handleHit(liveEnemy)}
    else{
      handleMiss(liveEnemy);
      // Reshuffle options after miss so player can't systematically try a→b→c→d
      const stillAlive=G.enemies.find(en=>en.id===enemy.id);
      if(stillAlive&&stillAlive.question)reshuffleQuestionOptions(stillAlive);
    }
  };
  QUIZ_ANSWER_FEEDBACK.heldCallback=resolveFn;
  if(delay>0){
    // Correct answers: auto-resolve after short flash
    QUIZ_ANSWER_FEEDBACK.timer=setTimeout(resolveFn,delay);
  }else{
    // Wrong answers: auto-hold until GOT IT button or space pressed
    QUIZ_ANSWER_FEEDBACK.held=true;
    const dismissBtn=document.getElementById('wrong-fb-dismiss');
    if(dismissBtn)dismissBtn.onclick=function(){QUIZ_ANSWER_FEEDBACK.held=false;resolveFn()};
  }
}

// Quiz mode handlers (called from onclick in MC buttons)
function handleQuizChoice(key){
  if(G.screen!=='game'||QUIZ_ANSWER_FEEDBACK.locked||EXPLAINER_STATE.open)return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='identify')return;
  queueQuizChoiceResolution(enemy,key,key===enemy.question.correctKey);
}
function handleHintChoice(key){
  if(G.screen!=='game'||QUIZ_ANSWER_FEEDBACK.locked||EXPLAINER_STATE.open)return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='fillblank')return;
  const idx=['a','b','c'].indexOf(key);
  if(idx===-1)return;
  const chosen=enemy.question.choices[idx];
  queueQuizChoiceResolution(enemy,key,activeCartridge.validateBlank(chosen,enemy.question.answer));
}
function handleSubconceptChoice(key){
  if(G.screen!=='game'||QUIZ_ANSWER_FEEDBACK.locked||EXPLAINER_STATE.open)return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='subconcept')return;
  const idx=['a','b','c'].indexOf(key);
  if(idx===-1)return;
  queueQuizChoiceResolution(enemy,key,key===enemy.question.correctKey);
}

  }
  // Initialize domainFilter to all domains if empty or stale

  const domainLabels={
    'descriptive':'Descriptive (U1-2)','probability':'Probability (U4)',
    'distributions':'Distributions (U4)','inference':'Inference (U5-6)',
    'inf-proportions':'Proportions (U5-6)','inf-means':'Means (U5-7)',
    'chi-square':'Chi-Square (U8)','regression':'Regression (U9)',
    'sessions':'Sessions','windows':'Windows','panes':'Panes',
    'copy':'Copy','general':'General'
  };

  const titleHS=parseInt(localStorage.getItem('td-highscore-'+activeCartridge.id)||'0',10);
  const emphasizeHighScore=context==='game';

function toggleDomain(dom){
  SFX.click();
  const idx=G.domainFilter.indexOf(dom);
  if(idx>=0){
    // Don't allow deselecting the last domain
    if(G.domainFilter.length<=1)return;
    G.domainFilter.splice(idx,1);
  }else{
    G.domainFilter.push(dom);
  }
  // Update pill states
  document.querySelectorAll('.domain-pill[data-domain]').forEach(btn=>{
    btn.classList.toggle('active',G.domainFilter.includes(btn.dataset.domain));
  });
  updateDomainAllBtn();
}

function toggleAllDomains(){
  SFX.click();
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  const allSelected=G.domainFilter.length===allDomains.length;
  if(allSelected){
    // Can't deselect all — do nothing
    return;
  }
  G.domainFilter=[...allDomains];
  document.querySelectorAll('.domain-pill[data-domain]').forEach(btn=>btn.classList.add('active'));
  updateDomainAllBtn();
}

function updateDomainAllBtn(){
  const allBtn=document.getElementById('domain-all');
  if(!allBtn)return;
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  allBtn.classList.toggle('active',G.domainFilter.length===allDomains.length);
}

function setDifficulty(diff){
  SFX.click();
  G.difficulty=diff;
  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.textContent.trim().toLowerCase().startsWith(diff));
  });
}

function resetProgress(){
  if(!activeCartridge)return;
  if(confirm('Reset all progress for '+activeCartridge.name+'? This cannot be undone.')){
    localStorage.removeItem('td-srs-'+activeCartridge.id);
    clearRunState();
    // Increment resetRev so cloud merge discards old cards
    G.resetRev=(G.resetRev||0)+1;
    G.srs=initSRS(activeCartridge.commands);
    saveSRS(true); // pushes reset state + resetRev to cloud
    SFX.click();
    showTitleScreen('title');
  }
}

//  GAME LOGIC

function getUnlockedTiersForWave(n){
  return n>=7?['core','regular','power','support']:n>=4?['core','regular','support']:['core'];
}
function genWave(n){
  const tiers=getUnlockedTiersForWave(n);
  G.unlockedTiers=tiers;
  let pool=COMMANDS.filter(c=>tiers.includes(c.tier));
  // Filter by selected domains
  if(G.domainFilter&&G.domainFilter.length>0){
    const filtered=pool.filter(c=>G.domainFilter.includes(c.dom));
    if(filtered.length>0)pool=filtered;
  }
  return pickCommands(pool,G.srs,Math.min(4+n,16),n);
}
let bgmLaunchTimer=null;
function cancelQueuedBGMStart(){
  if(bgmLaunchTimer){clearTimeout(bgmLaunchTimer);bgmLaunchTimer=null}
}
function queueBGMStart(delay=180){
  cancelQueuedBGMStart();
  bgmLaunchTimer=setTimeout(()=>{
    bgmLaunchTimer=null;
    SFX.startBGM();
  },delay);
}

function startGame(){
  cancelQueuedBGMStart();
  clearRunState();
  resetExplanationState();
  SFX.stopMusicPreview();
  SFX.stopBGM();
  SFX.click();
  queueBGMStart();
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  Object.assign(G,{screen:'game',wave:1,score:0,lives:BASE_LIVES,streak:0,maxStreak:0,
    srs:loadSRS(activeCartridge),enemies:[],selectedId:null,inputState:'idle',
    spawnIdx:0,waveComplete:false,totalCorrect:0,totalWrong:0,combo:1,
    unlockedTiers:['core'],attemptsOnCurrent:0,commandStartTime:0,typedBuffer:'',paused:false,sessionStartTime:Date.now()});
  applyTimeDecay(G.srs);
  G.waveCommands=genWave(1);
  lastSpawnTime=performance.now();
  lastInputState='';
  showGameUI();
}
function continueGame(){
  const snapshot=loadRunState();
  if(!snapshot){startGame();return}
  cancelQueuedBGMStart();
  resetExplanationState();
  SFX.stopMusicPreview();
  SFX.stopBGM();
  SFX.click();
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  const mergedSrs=loadSRS(activeCartridge);
  if(snapshot.srs&&typeof snapshot.srs==='object'){
    for(const id of Object.keys(mergedSrs)){
      if(!snapshot.srs[id])continue;
      const snap=sanitizeSrsCard(snapshot.srs[id]);
      const pers=mergedSrs[id];
      // Keep card with higher rev; on tie, higher lastUpdated; on tie, persistent wins
      const snapRev=snap.rev||0,persRev=pers.rev||0;
      if(snapRev>persRev)mergedSrs[id]=snap;
      else if(snapRev===persRev&&(snap.lastUpdated||0)>(pers.lastUpdated||0))mergedSrs[id]=snap;
      // else: persistent wins (default)
    }
  }
  const wave=Math.max(1,Math.min(12,Math.round(Number(snapshot.wave)||1)));
  const restoredDomains=(Array.isArray(snapshot.domainFilter)?snapshot.domainFilter:[]).filter(dom=>allDomains.includes(dom));
  const safeDomains=restoredDomains.length?restoredDomains:[...allDomains];
  const safeDifficulty=['learn','practice','challenge'].includes(snapshot.difficulty)?snapshot.difficulty:'learn';
  G.domainFilter=safeDomains.slice();
  G.difficulty=safeDifficulty;
  G.srs=mergedSrs;
  applyTimeDecay(G.srs);
  G.sessionStartTime=Date.now();
  const fallbackWaveCommands=genWave(wave);
  const restoredEnemies=Array.isArray(snapshot.enemies)?snapshot.enemies:[];
  const maxEnemyId=restoredEnemies.reduce((max,e)=>Math.max(max,Math.round(Number(e&&e.id)||0)),0);
  const restoredWaveCommands=Array.isArray(snapshot.waveCommands)&&snapshot.waveCommands.length?snapshot.waveCommands:fallbackWaveCommands;
  Object.assign(G,{screen:'game',wave:wave,score:Math.max(0,Math.round(Number(snapshot.score)||0)),
    lives:Math.max(0,Math.min(BASE_LIVES,Math.round(Number(snapshot.lives)||BASE_LIVES))),
    streak:Math.max(0,Math.round(Number(snapshot.streak)||0)),
    maxStreak:Math.max(0,Math.round(Number(snapshot.maxStreak)||0)),
    srs:mergedSrs,enemies:restoredEnemies,selectedId:snapshot.selectedId||null,
    inputState:snapshot.inputState||'idle',
    waveCommands:restoredWaveCommands,spawnIdx:Math.max(0,Math.min(Math.round(Number(snapshot.spawnIdx)||0),restoredWaveCommands.length)),
    waveComplete:!!snapshot.waveComplete,totalCorrect:Math.max(0,Math.round(Number(snapshot.totalCorrect)||0)),
    totalWrong:Math.max(0,Math.round(Number(snapshot.totalWrong)||0)),combo:Math.max(1,Number(snapshot.combo)||1),
    unlockedTiers:Array.isArray(snapshot.unlockedTiers)&&snapshot.unlockedTiers.length?snapshot.unlockedTiers.slice():getUnlockedTiersForWave(wave),
    nextEnemyId:Math.max(Math.round(Number(snapshot.nextEnemyId)||0),maxEnemyId),
    attemptsOnCurrent:Math.max(0,Math.round(Number(snapshot.attemptsOnCurrent)||0)),
    commandStartTime:Date.now(),typedBuffer:typeof snapshot.typedBuffer==='string'?snapshot.typedBuffer:'',
    domainFilter:safeDomains.slice(),difficulty:safeDifficulty,paused:false});
  if(!G.enemies.find(e=>e.id===G.selectedId)){G.selectedId=null}
  G.enemies.forEach((enemy,idx)=>{
    if((enemy.splitDepth||0)>=1)addChildEnemyMesh(enemy,idx);
    else addEnemyMesh(enemy);
  });
  lastSpawnTime=performance.now();
  lastInputState='';
  showGameUI();
  updateLabels();
  SFX.setKey(G.wave);
  queueBGMStart();
}
function nextWave(){
  SFX.click();
  resetExplanationState();
  const nw=G.wave+1;
  if(nw>12){SFX.stopBGM();SFX.victory();showEndScreen(true);return}
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  Object.assign(G,{wave:nw,enemies:[],selectedId:null,inputState:'idle',spawnIdx:0,
    waveComplete:false,attemptsOnCurrent:0,typedBuffer:''});
  G.waveCommands=genWave(nw);
  lastSpawnTime=performance.now();
  lastInputState='';
  updateTierBar();
  syncRunCheckpoint();
}
function showEndScreen(victory){
  G.screen=victory?'victory':'gameover';
  resetExplanationState();
  const recordState=syncRunCheckpoint();
  clearRunState();
  cancelQueuedBGMStart();
  // Clean up surviving enemies
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  G.enemies=[];G.selectedId=null;
  document.getElementById('hud').style.display='none';
  document.getElementById('tier-bar').style.display='none';
  document.getElementById('input-panel').style.display='none';
  document.getElementById('queue-bar').style.display='none';
  clearLabelCache();
  const ov=document.getElementById('overlay');ov.classList.remove('hidden');
  const acc=G.totalCorrect+G.totalWrong>0?Math.round(G.totalCorrect/(G.totalCorrect+G.totalWrong)*100):0;
  const seen=Object.entries(G.srs).filter(([,v])=>v.correct+v.wrong>0);
  const mc=[0,0,0,0,0,0];seen.forEach(([,v])=>mc[v.mastery]++);
  const weak=seen.sort(([,a],[,b])=>(a.mastery-b.mastery)||(b.wrong-a.wrong)).slice(0,4).filter(([,v])=>v.mastery<4).map(([id])=>COMMANDS.find(c=>c.id===id));
  const isPrefix=activeCartridge&&activeCartridge.inputMode==='prefix-key';
  // High score tracking
  const isNewHigh=recordState.isNewHigh;
  const highScore=recordState.highScore;

  let html='<h1 style="font-size:32px;color:'+(victory?AMB.css.hot:'#ff4422')+'">'+(victory?'SERVER SECURED':'SERVER BREACHED')+'</h1>';
  if(isNewHigh&&G.score>0)html+='<div style="color:#44ff88;font-size:14px;font-weight:700;letter-spacing:3px;margin-bottom:8px">\u2605 NEW HIGH SCORE! \u2605</div>';
  const sessionSec=G.sessionStartTime?Math.round((Date.now()-G.sessionStartTime)/1000):0;
  const sessionMin=Math.floor(sessionSec/60);
  const sessionSecRem=sessionSec%60;
  const sessionStr=sessionMin>0?sessionMin+'m '+sessionSecRem+'s':sessionSecRem+'s';
  const seenCards=Object.values(G.srs).filter(s=>s.totalAttempts>0&&s.avgTimeMs>0);
  const avgResp=seenCards.length>0?Math.round(seenCards.reduce((s,c)=>s+c.avgTimeMs,0)/seenCards.length/100)/10:0;
  html+='<div class="stats-grid">'+[['SCORE',G.score.toLocaleString()+(isNewHigh?' \u2605':'')],['HIGH SCORE',highScore.toLocaleString()],['WAVE',G.wave+'/12'],['ACCURACY',acc+'%'],['STREAK',G.maxStreak],['TIME',sessionStr],['AVG RESP',avgResp>0?avgResp+'s':'--']].map(([l,v])=>'<div class="stat-box"><div class="sl">'+l+'</div><div class="sv">'+v+'</div></div>').join('')+'</div>';
  if(seen.length>0){
    const avgPK=seen.length>0?(seen.reduce((s,[,v])=>s+(v.pKnown||0.1),0)/seen.length):0;
    html+='<div style="width:100%;max-width:360px;position:relative"><div class="sl" style="text-align:center;margin-bottom:4px">MASTERY</div><div class="mastery-bar" style="position:relative">'+mc.map((n,i)=>n>0?'<div style="flex:'+n+';background:'+MASTERY_COLORS[i]+';opacity:'+(0.5+i*0.1)+'"></div>':'').join('')+'<div style="position:absolute;left:'+(avgPK*100)+'%;top:0;bottom:0;width:2px;background:#fff;opacity:.7" title="BKT Confidence: '+(avgPK*100).toFixed(0)+'%"></div></div><div class="mastery-legend">'+MASTERY_LABELS.map((l,i)=>mc[i]>0?'<span style="color:'+MASTERY_COLORS[i]+'">'+'\u25a0 '+l+' ('+mc[i]+')</span>':'').join('')+'</div></div>';
  }
  if(weak.length>0){
    html+='<div style="width:100%;max-width:360px;margin-bottom:12px"><div class="sl" style="text-align:center;color:#ff6b35;margin-bottom:4px">FOCUS NEXT SESSION</div>'+weak.map(c=>{
      if(!c)return'';
      const answerDisplay=isPrefix?(activeCartridge.prefixLabel+' '+activeCartridge.formatAnswer(c)):activeCartridge.formatAnswer(c);
      const promptDisplay=activeCartridge.formatPrompt(c);
      return'<div class="weak-item"><span><span style="color:#ff6b35;font-weight:700">'+answerDisplay+'</span> \u2192 '+promptDisplay+'</span><span style="font-size:9px;color:'+MASTERY_COLORS[G.srs[c.id].mastery]+'">'+MASTERY_LABELS[G.srs[c.id].mastery]+(G.srs[c.id].avgTimeMs>0?' \u00b7 '+Math.round(G.srs[c.id].avgTimeMs/1000*10)/10+'s':'')+'</span></div>';
    }).join('')+'</div>';
  }
  html+='<button class="btn" onclick="startGame()">[ REDEPLOY ]</button>';
  html+='<div class="sub" style="margin-top:8px"><a href="#" onclick="event.preventDefault();showTitleScreen(\'game\')" style="color:#5a3800;text-decoration:none;font-size:10px;letter-spacing:2px">\u2190 BACK TO MENU</a></div>';
  ov.innerHTML=html;
}

// ── Spawning ──
let lastSpawnTime=0;
function trySpawn(now){
  if(G.screen!=='game'||G.waveComplete||G.spawnIdx>=G.waveCommands.length)return;
  const delay=G.spawnIdx===0?1500:Math.max(SPAWN_DELAY_BASE-G.wave*150,2500);
  if(now-lastSpawnTime<delay)return;
  const cmd=G.waveCommands[G.spawnIdx];
  const enemy={id:++G.nextEnemyId,cmd,t:0,spawned:Date.now(),speedMult:1,missCount:0};
  // Generate question + cache label for quiz-mode cartridges
  if(activeCartridge&&activeCartridge.inputMode==='quiz'){
    if(activeCartridge.generateQuestion)enemy.question=activeCartridge.generateQuestion(cmd,COMMANDS);
    enemy.label=getEnemyLabel(cmd);
  }
  G.enemies.push(enemy);
  addEnemyMesh(enemy);
  G.spawnIdx++;lastSpawnTime=now;
  SFX.spawn();
}

// ── Movement — adaptive speed ──
function moveEnemies(){
  const avgMastery=getAverageMastery(G.srs);
  // Base speed depends on difficulty
  const diffBase=G.difficulty==='learn'?0.3:G.difficulty==='challenge'?0.6:0.4;
  const waveMult=diffBase+(G.wave-1)*0.08;
  // Higher mastery = faster enemies (1.0x at mastery 0, up to 1.5x at mastery 5)
  const masteryMult=1.0+(avgMastery/5)*0.5;
  // Streak slowmo: time slows during hot streaks (reward for flow state)
  const streakSlow=G.streak>=10?0.5:G.streak>=5?0.7:G.streak>=3?0.85:1.0;
  const explainerSlow=(EXPLAINER_STATE.open&&!QUIZ_ANSWER_FEEDBACK.locked)?0.35:1.0;
  const speed=MOVE_SPEED_BASE*waveMult*masteryMult*streakSlow*explainerSlow;
  G.enemies.forEach(e=>{
    if(e.pendingCorrectHit)return;
    e.t+=speed*(e.speedMult||1);
  });
}

// ── Breach ──
function checkBreach(){
  const reached=G.enemies.filter(e=>e.t>=1&&!e.pendingCorrectHit);
  if(reached.length===0)return;
  SFX.breach();SFX.musicalBreach();
  reached.forEach(e=>{
    spawnExplosion(enemyMeshes[e.id]?.position||pathPts[pathPts.length-1],20,0xff2200);
    removeEnemyMesh(e.id);
    G.srs[e.cmd.id]=srsMiss(G.srs[e.cmd.id],G.wave,null); // Breach: no BKT update (no student response to observe), SRS penalty only
    saveSRS(); // debounced per-answer save
  });
  G.enemies=G.enemies.filter(e=>e.t<1);
  G.lives-=reached.length;G.streak=0;SFX.setStreak(0);G.combo=1;
  if(G.lives<=0){G.lives=0;SFX.gameOver();showEndScreen(false)}
}

// ── Wave complete ──
function checkWaveComplete(){
  if(G.spawnIdx>=G.waveCommands.length&&G.enemies.length===0&&!G.waveComplete&&G.waveCommands.length>0){
    G.waveComplete=true;SFX.waveClear();syncRunCheckpoint();
  }
}

// ── Auto-select ──
function autoSelect(){
  if(G.enemies.length>0&&(!G.selectedId||!G.enemies.find(e=>e.id===G.selectedId))){
    // Prioritize deepest split level, then closest to breach
    const deep=G.enemies.filter(en=>en.splitDepth>=2);
    const subs=G.enemies.filter(en=>en.splitDepth===1);
    const pool=deep.length>0?deep:subs.length>0?subs:G.enemies;
    const sorted=[...pool].sort((a,b)=>b.t-a.t);
    resetExplanationState();
    G.selectedId=sorted[0].id;
    const im=activeCartridge?activeCartridge.inputMode:'prefix-key';
    G.inputState=im==='prefix-key'?'await_prefix':im==='quiz'?'quiz':'typing';
    G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    if(im!=='quiz')focusTypedInput();else setTimeout(()=>focusBlankInput(),50);
  }else if(G.enemies.length===0){resetExplanationState();G.selectedId=null;G.inputState='idle'}
}

// ── Flash ──
function flash(msg,color){
  const d=document.createElement('div');d.className='flash-msg';d.style.color=color||AMB.css.white;
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(()=>d.remove(),900);
}

// ═══════════════════════════════════════════════
//  HIT / MISS — shared logic (with anti-spam cooldown)
// ═══════════════════════════════════════════════
function findSubconceptIndex(enemy){
  if(!enemy.subconcept||!enemy.cmd||!enemy.cmd.subconcepts)return null;
  const idx=enemy.cmd.subconcepts.indexOf(enemy.subconcept);
  return idx>=0?idx:null;
}
let lastAnswerTime=0;
function handleHit(enemy){
  const now=Date.now();if(now-lastAnswerTime<300)return;lastAnswerTime=now;
  const responseTime=Date.now()-G.commandStartTime;
  const attempts=G.attemptsOnCurrent+1;
  let speedMult=1;
  if(responseTime<1500)speedMult=2;else if(responseTime<3000)speedMult=1.5;else if(responseTime<5000)speedMult=1.2;
  const totalMult=G.combo*speedMult;
  const childPenalty=enemy.isChild?0.5:1;
  const pts=Math.floor((100+Math.max(0,50-Math.floor(responseTime/200)))*totalMult*childPenalty);
  const intensity=Math.min(1,speedMult/2);
  SFX.hit(intensity);
  const ePos=enemyMeshes[enemy.id]?.position.clone()||new THREE.Vector3();
  const particleCount=12+Math.floor(intensity*20);
  const award=createScoreAward(pts,particleCount,AMB.glow);
  spawnExplosion(ePos,particleCount,AMB.glow,true,award?{awardId:award.id}:{});
  spawnBeam(serverGrp.position.clone().add(new THREE.Vector3(0,3,0)),ePos);
  G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);
  SFX.setStreak(G.streak);
  if(G.streak===5||G.streak===10||G.streak===15)SFX.combo();
  G.combo=Math.min(G.combo+.25,3);G.totalCorrect++;
  SFX.musicalHit(); // health +1, kill melody
  const baseChoices=enemy.question?(enemy.question.options||enemy.question.choices||[]).length:4;
  const bktCtx={wasCorrect:true,questionType:enemy.question?enemy.question.type:'identify',remainingChoices:baseChoices,subconceptIndex:enemy.splitDepth>=1&&enemy.subconcept?findSubconceptIndex(enemy):null,responseTimeMs:responseTime};
  G.srs[enemy.cmd.id]=srsHit(G.srs[enemy.cmd.id],G.wave,responseTime,attempts,bktCtx);
  saveSRS(); // debounced per-answer save
  removeEnemyMesh(enemy.id);
  G.enemies=G.enemies.filter(en=>en.id!==enemy.id);
  resetExplanationState();
  G.selectedId=null;G.inputState='idle';G.attemptsOnCurrent=0;G.typedBuffer='';
  flash('+'+pts+(speedMult>=1.5?' \u26a1':''),speedMult>=2?AMB.css.white:AMB.css.glow);
}

function handleMiss(enemy){
  const now=Date.now();if(now-lastAnswerTime<300)return;lastAnswerTime=now;
  SFX.miss();SFX.musicalMiss();
  G.streak=0;SFX.setStreak(0);G.combo=1;G.totalWrong++;
  G.attemptsOnCurrent++;
  const baseChoices=enemy.question?(enemy.question.options||enemy.question.choices||[]).length:4;
  const bktCtx={wasCorrect:false,questionType:enemy.question?enemy.question.type:'identify',remainingChoices:baseChoices,subconceptIndex:enemy.splitDepth>=1&&enemy.subconcept?findSubconceptIndex(enemy):null};
  G.srs[enemy.cmd.id]=srsMiss(G.srs[enemy.cmd.id],G.wave,bktCtx);
  saveSRS(); // debounced per-answer save
  G.typedBuffer='';

  const isQuizMode=activeCartridge&&activeCartridge.inputMode==='quiz';
  const depth=enemy.splitDepth||0;
  const surge=isQuizMode?(depth===0?0.15:depth===1?0.22:0.30):0.06;
  enemy.t=Math.min(PATH_LENGTH_T+.02,(enemy.t||0)+surge);
  // Hydra split: depth 0 → subconcepts (depth 1), depth 1 → sub-subconcepts (depth 2)
  if(isQuizMode&&depth<2){
    const didSplit=spawnHydraChildren(enemy);
    if(didSplit){SFX.split();flash(depth===0?'SPLIT! SURGING \u26a1':'FRACTURE! SURGING \u26a1\u26a1',depth===0?'#4488ff':'#aa44ff');return}
  }
  // Fallback: speed up (depth 2 grandchildren, non-quiz, or split failed)
  enemy.speedMult=Math.min((enemy.speedMult||1)*(isQuizMode?1.85:1.5),4.5);
  // Attempt cap: after 3 misses on the same enemy, auto-surge near breach
  if(isQuizMode&&(enemy.missCount||0)>=3){
    enemy.t=Math.max(enemy.t,0.85);
    enemy.speedMult=Math.max(enemy.speedMult,3.0);
    flash('MAX MISS! BREACHING \u26a0','#ff0000');
    SFX.miss();
  }else{
    flash(isQuizMode?'MISS! PUSHED FORWARD \u26a0':'MISS! \u26a1FASTER','#ff4422');
  }
  if(activeCartridge&&activeCartridge.inputMode==='prefix-key')G.inputState='await_prefix';
  setTimeout(focusTypedInput,50);
}

// ═══════════════════════════════════════════════
//  HYDRA SPLIT
// ═══════════════════════════════════════════════
function spawnHydraChildren(parentEnemy){
  const cmd=parentEnemy.cmd;
  const depth=(parentEnemy.splitDepth||0)+1;
  if(G.enemies.length>20)return false;

  const parentPos=enemyMeshes[parentEnemy.id]?.position.clone();
  const explColor=depth>=2?0xaa44ff:0x4488ff;
  spawnExplosion(parentPos||pathPts[0],depth>=2?10:15,explColor);
  removeEnemyMesh(parentEnemy.id);
  G.enemies=G.enemies.filter(e=>e.id!==parentEnemy.id);

  if(depth===1){
    // Depth 1: subconcept children (blue)
    const subs=cmd.subconcepts;
    if(!subs||subs.length===0)return false;
    const count=Math.min(3,subs.length);
    const parentCard=G.srs[cmd.id]||{};
    const ranked=subs.map((sc,i)=>({sc,i,pk:(parentCard.subPKnown&&parentCard.subPKnown[i]!=null)?parentCard.subPKnown[i]:0.1})).sort((a,b)=>a.pk-b.pk);
    const picked=ranked.slice(0,count).map(r=>r.sc);
    const inheritedSpeed=Math.max(parentEnemy.speedMult||1,1)*1.35;
    picked.forEach((sc,i)=>{
      if(parentEnemy.t>0.82)return; // too close to breach — skip spawning children
      const childT=Math.min(.82,Math.max(0,parentEnemy.t+0.02*(i+1)));
      const options=shuffleArr([sc.correct,...sc.wrong]);
      const correctIdx=options.indexOf(sc.correct);
      const child={
        id:++G.nextEnemyId,cmd:cmd,t:childT,spawned:Date.now(),
        speedMult:inheritedSpeed,isChild:true,splitDepth:1,missCount:0,
        subconcept:sc,
        question:{type:'subconcept',text:sc.q,options:options,correctIdx:correctIdx,correctKey:['a','b','c'][correctIdx]},
        label:'\u26a1 Sub-concept'
      };
      G.enemies.push(child);
      addChildEnemyMesh(child,i);
    });
  }else if(depth===2){
    // Depth 2: sub-subconcept grandchildren (purple) — binary A/B choice
    // Auto-generated from the parent subconcept's correct answer
    const sc=parentEnemy.subconcept;
    if(!sc)return false;
    const count=2;
    const inheritedSpeed=Math.max(parentEnemy.speedMult||1,1.15)*1.6;
    for(let i=0;i<count;i++){
      if(parentEnemy.t>0.85)continue; // too close to breach — skip grandchild
      const childT=Math.min(.85,Math.max(0,parentEnemy.t+0.025*(i+1)));
      // Binary question: "Is this true about [topic]?"
      const wrongPick=sc.wrong[i%sc.wrong.length];
      const statements=shuffleArr([sc.correct,wrongPick]);
      const correctIdx=statements.indexOf(sc.correct);
      const child={
        id:++G.nextEnemyId,cmd:cmd,t:childT,spawned:Date.now(),
        speedMult:inheritedSpeed,isChild:true,splitDepth:2,missCount:0,
        subconcept:sc,
        question:{type:'subconcept',text:sc.q+' (True or false?)',options:statements,correctIdx:correctIdx,correctKey:['a','b'][correctIdx]},
        label:'\u26a1\u26a1 Deep concept'
      };
      G.enemies.push(child);
      addChildEnemyMesh(child,i);
    }
  }
  if(G.selectedId===parentEnemy.id){resetExplanationState();G.selectedId=null;G.inputState='idle'}
  return true;
}

// ═══════════════════════════════════════════════
//  INPUT HANDLER
// ═══════════════════════════════════════════════
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&MUSIC_EDITOR.open){
    e.preventDefault();
    closeMusicEditor();
    return;
  }
  if(e.key==='Escape'&&G.screen==='game'){
    e.preventDefault();
    G.paused=false;
    returnToTitleFromRun();
    return;
  }
  // P to pause/unpause during gameplay
  if((e.key==='p'||e.key==='P')&&G.screen==='game'&&!G.waveComplete){
    e.preventDefault();
    G.paused=!G.paused;
    if(G.paused)showPauseScreen();
    else resumeFromPause();
    return;
  }
  // Spacebar: block native button activation unless focus is in an editable element
  if(e.key===' '){
    const tag=document.activeElement&&document.activeElement.tagName;
    if(tag!=='INPUT'&&tag!=='TEXTAREA'&&!(document.activeElement&&document.activeElement.isContentEditable)){
      e.preventDefault();
      // Space dismisses held wrong-answer feedback
      if(QUIZ_ANSWER_FEEDBACK.held&&QUIZ_ANSWER_FEEDBACK.heldCallback){
        QUIZ_ANSWER_FEEDBACK.held=false;
        QUIZ_ANSWER_FEEDBACK.heldCallback();
        return;
      }
      // Space dismisses explainer/video
      if(EXPLAINER_STATE.open){
        closeExplanation();
        return;
      }
      if(!MUSIC_EDITOR.open&&!G.paused&&G.screen==='game'&&G.waveComplete){
        const btn=document.querySelector('#input-panel .btn');
        if(btn){btn.click();return}
      }
    }
    return;
  }

  // Block all input while paused
  if(G.paused)return;

  if(MODKEYS.has(e.key))return;
  if(G.screen!=='game')return;
  if(QUIZ_ANSWER_FEEDBACK.locked)return;

  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;

  // Tab: deep concepts → only deep. subconcepts → only subconcepts. else → parents only.
  if(e.key==='Tab'&&enemy){
    e.preventDefault();
    const deep=G.enemies.filter(en=>en.splitDepth>=2);
    const subs=G.enemies.filter(en=>en.splitDepth===1);
    const pool=deep.length>0?deep.sort((a,b)=>b.t-a.t):subs.length>0?subs.sort((a,b)=>b.t-a.t):[...G.enemies].sort((a,b)=>b.t-a.t);
    const idx=pool.findIndex(en=>en.id===G.selectedId);
    resetExplanationState();
    G.selectedId=pool[(idx+1)%pool.length].id;
    const im2=activeCartridge?activeCartridge.inputMode:'prefix-key';
    G.inputState=im2==='prefix-key'?'await_prefix':im2==='quiz'?'quiz':'typing';
    G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    SFX.select();
    setTimeout(()=>{if(im2==='quiz')focusBlankInput();else focusTypedInput()},50);
    return;
  }
  // Alt+E: 3-state cycle (closed → text → video → close)
  if(e.key==='e'&&e.altKey){
    e.preventDefault();
    if(QUIZ_ANSWER_FEEDBACK.locked)return; // block during feedback
    if(EXPLAINER_STATE.videoUrl||EXPLAINER_STATE.videoLoading){
      // video or loading → close everything
      closeExplanation();
    }else if(EXPLAINER_STATE.open){
      // text → try video, or close if unavailable
      const avail=getAnimationAvailability(EXPLAINER_STATE.animationId);
      if(avail!=='unavailable')loadAnimation(EXPLAINER_STATE.animationId);
      else closeExplanation();
    }else{
      openExplanationForSelectedCommand();
    }
    return;
  }

  if(!enemy)return;

  const mode=activeCartridge?activeCartridge.inputMode:'prefix-key';

  if(mode==='quiz'){
    // Quiz mode keyboard handling
    if(EXPLAINER_STATE.open)return; // answers locked during learning mode
    const q=enemy.question;
    if(!q)return;

    if(q.type==='identify'){
      const k=e.key.toLowerCase();
      if(['a','b','c','d'].includes(k)){
        e.preventDefault();
        handleQuizChoice(k);
      }
    }else if(q.type==='fillblank'){
      const k=e.key.toLowerCase();
      if(['a','b','c'].includes(k)){
        e.preventDefault();
        handleHintChoice(k);
      }
    }else if(q.type==='subconcept'){
      const k=e.key.toLowerCase();
      if(['a','b','c'].includes(k)){
        e.preventDefault();
        handleSubconceptChoice(k);
      }
    }
  }else if(mode==='prefix-key'){
    e.preventDefault();
    if(EXPLAINER_STATE.open)return;
    if(G.inputState==='await_prefix'){
      if(e.ctrlKey&&e.key==='b'){G.inputState='await_command';SFX.prefix()}
      return;
    }
    if(G.inputState==='await_command'){
      if(e.key===enemy.cmd.key){
        handleHit(enemy);
      }else{
        handleMiss(enemy);
      }
    }
  }else if(mode==='typed'){
    if(EXPLAINER_STATE.open)return;
    // If input exists but isn't focused, redirect focus and replay the keystroke
    const inp=document.getElementById('typed-input');
    if(inp&&document.activeElement!==inp){
      inp.focus();
      if(e.key.length===1&&!e.ctrlKey&&!e.altKey&&!e.metaKey){
        e.preventDefault();
        inp.value+=e.key;
        G.typedBuffer=inp.value;
      }
    }
    if(e.key==='Enter'){
      e.preventDefault();
      const val=inp?inp.value:G.typedBuffer;
      if(val.trim()==='')return;
      if(activeCartridge.validate(val,enemy.cmd.key,enemy.cmd).correct){
        handleHit(enemy);
      }else{
        handleMiss(enemy);
        if(inp)inp.value='';
      }
      return;
    }
    if(inp&&e.target===inp){
      requestAnimationFrame(()=>{
        if(document.getElementById('typed-input'))G.typedBuffer=document.getElementById('typed-input').value;
      });
    }
  }
});

//  TOUCH SUPPORT
// ═══════════════════════════════════════════════
document.addEventListener('touchmove',function(e){if(e.touches.length>1)e.preventDefault()},{passive:false});
let lastTouchEnd=0;
document.addEventListener('touchend',function(e){const now=Date.now();if(now-lastTouchEnd<300)e.preventDefault();lastTouchEnd=now},{passive:false});
// Swipe to cycle enemies
let touchStartX=0,touchStartY=0,touchStartTime=0;
canvas.addEventListener('touchstart',function(e){
  if(G.screen!=='game'||G.paused)return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchStartTime=Date.now();
},{passive:true});
canvas.addEventListener('touchend',function(e){
  if(G.screen!=='game'||G.paused||QUIZ_ANSWER_FEEDBACK.locked)return;
  const touch=e.changedTouches[0];
  const dx=touch.clientX-touchStartX;
  const dy=touch.clientY-touchStartY;
  const dt=Date.now()-touchStartTime;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)&&dt<400&&G.enemies.length>=2){
    const deep=G.enemies.filter(en=>en.splitDepth>=2);
    const subs=G.enemies.filter(en=>en.splitDepth===1);
    const pool=deep.length>0?deep.sort((a,b)=>b.t-a.t):subs.length>0?subs.sort((a,b)=>b.t-a.t):[...G.enemies].sort((a,b)=>b.t-a.t);
    const idx=pool.findIndex(en=>en.id===G.selectedId);
    const dir=dx>0?1:-1;
    resetExplanationState();
    G.selectedId=pool[((idx+dir)%pool.length+pool.length)%pool.length].id;
    const im=activeCartridge?activeCartridge.inputMode:'prefix-key';
    G.inputState=im==='prefix-key'?'await_prefix':im==='quiz'?'quiz':'typing';
    G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    SFX.select();lastInputState='';
    if(im==='quiz')setTimeout(()=>focusBlankInput(),50);
    else if(im==='typed')focusTypedInput();
    return;
  }
  if(Math.abs(dx)<18&&Math.abs(dy)<18&&dt<280){
    const tappedEnemy=pickEnemyAtScreenPoint(touch.clientX,touch.clientY);
    if(!tappedEnemy||tappedEnemy.id===G.selectedId)return;
    resetExplanationState();
    G.selectedId=tappedEnemy.id;
    const im=activeCartridge?activeCartridge.inputMode:'prefix-key';
    G.inputState=im==='prefix-key'?'await_prefix':im==='quiz'?'quiz':'typing';
    G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    SFX.select();lastInputState='';
    if(im==='quiz')setTimeout(()=>focusBlankInput(),50);
    else if(im==='typed')focusTypedInput();
  }
},{passive:true});
// iOS AudioContext resume
document.addEventListener('touchstart',function resumeAudio(){try{const c=new(window.AudioContext||window.webkitAudioContext)();c.resume().then(()=>c.close())}catch(e){}document.removeEventListener('touchstart',resumeAudio)},{once:true,passive:true});
document.body.addEventListener('touchmove',function(e){if(e.target===document.body||e.target===canvas)e.preventDefault()},{passive:false});

window.addEventListener('beforeunload',()=>{
  if(G.screen==='game')syncRunCheckpoint();
});

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
let lastTime=0;
function animate(time){
  requestAnimationFrame(animate);
  const dt=time-lastTime;lastTime=time;
  const frameScale=Math.min(2.25,Math.max(.75,(dt||16.67)/16.67));

  // Camera: follow selected enemy with smooth lerp
  const selEnemy=G.selectedId?enemyMeshes[G.selectedId]:null;
  const selEnemyObj=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(selEnemy&&G.screen==='game'){
    const sd=selEnemyObj?.splitDepth||0;
    const port=isPortrait();
    const pY=port?1.4:1,pZ=port?1.3:1,pT=port?.6:1;
    const zoomY=(sd>=2?4.5:sd>=1?6:7.5)*pY;
    const zoomZ=(sd>=2?5.5:sd>=1?7:8.5)*pZ;
    const trackX=(sd>=2?.7:sd>=1?.6:.5)*pT;
    const trackZ=(sd>=2?.6:sd>=1?.5:.4)*pT;
    const tx=selEnemy.position.x*trackX+Math.sin(time*.0002)*.1;
    const tz=selEnemy.position.z*trackZ+zoomZ;
    const ty=zoomY+Math.sin(time*.0003)*.1;
    camera.position.x+=(tx-camera.position.x)*.055;
    camera.position.y+=(ty-camera.position.y)*.055;
    camera.position.z+=(tz-camera.position.z)*.055;
    const lx=selEnemy.position.x*(trackX+.1);
    const lz=selEnemy.position.z*(trackZ+.1)-1;
    camera.lookAt(lx,0,lz);
  }else{
    // Default orbit
    const orbY=isPortrait()?22:18;
    const orbZ=isPortrait()?18:14;
    camera.position.x+=(Math.sin(time*.0002)*.3-camera.position.x)*.05;
    camera.position.y+=(orbY+Math.sin(time*.0003)*.2-camera.position.y)*.05;
    camera.position.z+=(orbZ-camera.position.z)*.05;
    camera.lookAt(0,0,-1);
  }

  serverLight.intensity=1.5+Math.sin(time*.003)*.3;
  sTop.rotation.y=time*.001;
  ant.material.color.setHex(Math.sin(time*.005)>.3?AMB.glow:AMB.mid);

  spawnMark.material.opacity=.2+Math.sin(time*.004)*.2;
  spawnMark.rotation.y=time*.002;

  if(G.screen==='game'&&!G.paused){
    trySpawn(time);moveEnemies();checkBreach();checkWaveComplete();autoSelect();
    updateEnemyMeshes();updateLabels();updateHUD();updateInput();updateQueue();
    SFX.setKey(G.wave);
    // Evolve pad: only count main formula enemies (not sub/deep children)
    if(G.waveCommands.length>0){
      const mainEnemies=G.enemies.filter(e=>!e.splitDepth||e.splitDepth===0).length;
      const unspawned=G.waveCommands.length-G.spawnIdx;
      const mainRemaining=mainEnemies+unspawned;
    }
  }
  updateSelectedSpotlight(time);

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.ageMs=(p.ageMs||0)+dt;
    if(p.funnelToScore){
      if(p.ageMs<p.burstMs){
        p.vel.multiplyScalar(1.012);
        p.vel.y-=.0035*frameScale;
      }else{
        const target=getScoreFunnelTarget(p.mesh.position);
        const toScore=target.clone().sub(p.mesh.position);
        const dist=toScore.length();
        if(dist>.001){
          const dir=toScore.normalize();
          const tangent=new THREE.Vector3(-dir.z,0,dir.x);
          if(tangent.lengthSq()<.0001)tangent.set(1,0,0);
          else tangent.normalize();
          const pull=dir.multiplyScalar(.16+Math.min(.26,dist*.025));
          pull.addScaledVector(tangent,p.swirl*(1+Math.min(2.2,dist*.08)));
          pull.y+=Math.sin(p.ageMs*.018+p.twinkle)*.003;
          p.vel.lerp(pull,Math.min(.28*frameScale,.48));
        }
        p.vel.multiplyScalar(Math.pow(.955,frameScale));
        p.trailTicker=(p.trailTicker||0)+dt;
        if(p.trailTicker>52&&p.life>.18){
          p.trailTicker=0;
          spawnTrailGhost(p.mesh.position,p.mesh.material.color.getHex(),Math.max(.12,p.mesh.scale.x*.72),p.awardId,p.vel.clone().multiplyScalar(.16));
        }
        if(dist<.72||(dist<1.1&&p.life<.32)){
          collectScoreAwardChunk(p.awardId,target,p.mesh.material.color.getHex());
          p.life=0;
        }else if(dist<1.1){
          p.life-=p.decay*frameScale*2.2;
        }
      }
    }else{
      p.vel.y-=.005*frameScale;
    }
    p.mesh.position.addScaledVector(p.vel,frameScale);
    p.life-=p.decay*frameScale*(p.funnelToScore&&p.ageMs>p.burstMs?.35:1);
    p.mesh.material.opacity=Math.max(0,p.life*(p.funnelToScore?1.08:1));
    const twinkleScale=p.funnelToScore?(.86+Math.sin(p.ageMs*.02+p.twinkle)*.16):1;
    const particleScale=(p.funnelToScore&&p.ageMs>p.burstMs?Math.max(.16,p.life*.82):Math.max(.18,p.life))*twinkleScale;
    p.mesh.scale.setScalar(particleScale);
    if(p.life<=0){scene.remove(p.mesh);p.mesh.material.dispose();particles.splice(i,1)}
  }
  for(let i=trailGhosts.length-1;i>=0;i--){
    const ghost=trailGhosts[i];
    ghost.life-=ghost.decay*frameScale;
    ghost.mesh.position.addScaledVector(ghost.vel,frameScale);
    ghost.mesh.rotation.x+=ghost.spin*frameScale;
    ghost.mesh.rotation.y+=ghost.spin*.6*frameScale;
    ghost.mesh.scale.multiplyScalar(Math.pow(1.018,frameScale));
    ghost.mesh.material.opacity=Math.max(0,ghost.life*.45);
    if(ghost.life<=0){
      releaseTrailGhost(ghost);
      trailGhosts.splice(i,1);
    }
  }
  for(let i=beams.length-1;i>=0;i--){
    const b=beams[i];b.life-=b.decay;b.line.material.opacity=b.life;
    if(b.life<=0){scene.remove(b.line);b.line.material.dispose();b.line.geometry.dispose();beams.splice(i,1)}
  }

  // Fractal trees background
  const mh=SFX.getMusicalHealth();
  const sk=SFX.getStreak();
  const targetDepth=mh; // 0-5
  treeDisplayDepth+=(targetDepth-treeDisplayDepth)*0.05; // smooth transition
  const displayLevels=Math.round(treeDisplayDepth);
  const timeSec=time*0.001;
  const tempo=SFX.getMusicConfig?SFX.getMusicConfig().tempo||80:80;
  const omega=(tempo/60)*Math.PI*2;
  const swayAmp=0.03+sk*0.005;
  treeMeshes.forEach(t=>{
    const tc=t.config;
    const levels=Math.max(0,Math.min(6,displayLevels+1));
    const count=generateTree(0,0,tc.len,tc.angle,tc.branchAngle,tc.lenScale,0,levels,timeSec,omega,swayAmp,t.posArr,t.colArr,0);
    t.geo.attributes.position.needsUpdate=true;
    t.geo.attributes.color.needsUpdate=true;
    t.geo.setDrawRange(0,count*2);
    t.mesh.visible=displayLevels>0;
  });
  renderer.render(scene,camera);
}
requestAnimationFrame(animate);

// ═══════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════
function isPortrait(){return window.innerHeight>window.innerWidth}
function handleResize(){
  const w=window.innerWidth,h=window.visualViewport?window.visualViewport.height:window.innerHeight;
  camera.aspect=w/h;
  camera.fov=isPortrait()?65:50;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize',handleResize);
window.addEventListener('orientationchange',()=>setTimeout(handleResize,150));
if(window.visualViewport)window.visualViewport.addEventListener('resize',handleResize);

COMMANDS=activeCartridge.commands;
showTitleScreen('boot');
