<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>AP Stats Formula Defense</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0500;font-family:'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace}
canvas{position:fixed;top:0;left:0;z-index:0;touch-action:none}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;padding:10px 16px;pointer-events:none}
.hud-item{text-align:center;pointer-events:none}
.hud-label{font-size:9px;letter-spacing:2px;color:#5a3800;font-weight:600}
.hud-val{font-size:18px;font-weight:700;color:#ff8c00;text-shadow:0 0 8px #ff8c0066}
#tier-bar{position:fixed;top:52px;left:0;right:0;z-index:10;text-align:center;pointer-events:none;font-size:10px}
#input-panel{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:6px 12px;text-align:center;background:rgba(13,5,0,0.35);pointer-events:none}
#input-panel *{pointer-events:auto}
.prompt-label{font-size:9px;letter-spacing:3px;color:#5a3800;font-weight:600}
.prompt-text{font-size:18px;font-weight:700;color:#ffcc66;margin:4px 0;text-shadow:0 0 10px #ff8c0044}
.input-boxes{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px}
.input-box{padding:6px 16px;border:1.5px solid #3d1f00;border-radius:4px;font-size:16px;font-weight:600;color:#5a3800;background:#0d0500;min-width:64px;text-align:center;transition:all .2s}
.input-box.active{border-color:#ff8c00;color:#ff8c00;box-shadow:0 0 10px #ff8c0044}
.input-box.done{border-color:#ff8c0088;color:#ff8c00;background:#ff8c0011}
.hint-text{font-size:12px;color:#996622;margin-top:2px;padding:2px 6px;background:#ff8c0011;border:1px solid #ff8c0033;border-radius:4px}
.input-help{font-size:10px;color:#3d1f00;margin-top:8px;opacity:0;transition:opacity .2s;line-height:1.4}
#input-panel:hover .input-help,#input-panel:focus-within .input-help{opacity:1}
.wave-clear{font-size:22px;font-weight:900;color:#ff8c00;letter-spacing:4px;text-shadow:0 0 14px #ff8c0066}
#labels{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;overflow:hidden}
.enemy-label{position:absolute;pointer-events:auto;cursor:pointer;text-align:center;transform:translate(-50%,-100%);transition:opacity .2s}
.enemy-label-inner{background:#0d0500dd;border:1px solid;border-radius:4px;padding:3px 6px;font-size:9px;font-weight:700;line-height:1.2;max-width:140px;word-break:break-word;white-space:normal}
.enemy-label .dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.sel-arrow{text-align:center;color:#ffcc66;font-size:9px;margin-top:1px;animation:blink 1s step-end infinite}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0500ee;transition:opacity .3s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:56px;font-weight:900;letter-spacing:14px;color:#ff8c00;text-shadow:0 0 20px #ff8c00,0 0 40px #ff8c0044;margin-bottom:4px}
#overlay h2{font-size:16px;font-weight:400;letter-spacing:8px;color:#cc6600;margin-bottom:20px}
#overlay .btn{font-family:inherit;font-size:15px;font-weight:700;color:#0d0500;background:#ff8c00;border:none;padding:12px 36px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;box-shadow:0 0 20px #ff8c0066;margin-top:16px}
#overlay .btn:hover{background:#ffaa22}
#overlay .desc{font-size:12px;line-height:1.7;color:#996622;max-width:380px;text-align:center;margin-bottom:12px}
#overlay .sub{font-size:11px;color:#5a3800;margin-top:12px;text-align:center}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;width:100%;max-width:320px}
.stat-box{background:#1a0800;border:1px solid #ff8c0022;border-radius:4px;padding:10px 6px;text-align:center}
.stat-box .sl{font-size:9px;letter-spacing:2px;color:#5a3800;font-weight:600;margin-bottom:3px}
.stat-box .sv{font-size:20px;font-weight:700;color:#ff8c00}
.mastery-bar{display:flex;height:14px;border-radius:3px;overflow:hidden;border:1px solid #ff8c0022;margin:4px 0}
.mastery-legend{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;font-size:9px;margin-bottom:10px}
.weak-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#996622;margin-bottom:3px;padding:3px 8px;background:#1a0800;border-radius:3px;border:1px solid #ffffff08}
#mute-btn{position:fixed;top:10px;right:12px;z-index:30;font-size:18px;background:transparent;border:1px solid #ff8c0033;border-radius:4px;color:#ff8c00;cursor:pointer;padding:3px 7px;opacity:.7}
#queue-bar{position:fixed;bottom:80px;left:0;right:0;z-index:9;text-align:center;pointer-events:none;font-size:9px;letter-spacing:2px;color:#5a3800}
.q-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin:0 2px;opacity:.7}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.latex-display{margin:2px 0;min-height:24px;display:flex;align-items:center;justify-content:center}
.latex-display .katex{font-size:1.15em;color:#ffcc66}
.mc-grid{display:flex;flex-wrap:wrap;gap:4px;max-width:600px;margin:4px auto 0;justify-content:center}
.mc-btn{font-family:inherit;font-size:11px;font-weight:600;color:#ff8c00;background:#1a0800;border:1.5px solid #3d1f00;border-radius:4px;padding:5px 8px;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:4px}
.mc-btn:hover{border-color:#ff8c00;background:#2d1200;box-shadow:0 0 8px #ff8c0033}
.mc-btn .mc-key{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:#ff8c00;color:#0d0500;font-weight:900;font-size:10px;flex-shrink:0}
.mc-btn.correct{border-color:#44ff88;background:#44ff8822;color:#44ff88}
.mc-btn.wrong{border-color:#ff4422;background:#ff442222;color:#ff4422}
.mc-btn .mc-text{line-height:1.1;font-size:11px}
.blank-input{font-family:inherit;font-size:15px;font-weight:700;color:#ff8c00;background:#0d0500;border:2px solid #ff8c00;border-radius:6px;padding:5px 12px;text-align:center;min-width:100px;max-width:200px;outline:none}
.blank-input:focus{box-shadow:0 0 12px #ff8c0044}
.hint-mc-grid{display:flex;gap:4px;justify-content:center;margin-top:4px}
.hint-mc-btn{font-family:inherit;font-size:12px;font-weight:600;color:#ff8c00;background:#1a0800;border:1.5px solid #3d1f00;border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s}
.hint-mc-btn:hover{border-color:#ff8c00;background:#2d1200}
.hint-mc-btn .mc-key{display:inline;font-weight:900;color:#ffcc66;margin-right:4px}
.q-type-badge{font-size:8px;letter-spacing:2px;color:#996622;background:#ff8c0011;border:1px solid #ff8c0022;border-radius:3px;padding:1px 4px;display:inline-block;margin-bottom:2px}
@keyframes float-up{0%{transform:translateY(0) translateX(-50%);opacity:1}100%{transform:translateY(-50px) translateX(-50%);opacity:0}}
.flash-msg{position:fixed;top:35%;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;z-index:15;pointer-events:none;animation:float-up .8s ease-out forwards;text-shadow:0 0 20px currentColor}
/* Typed input */
.typed-input{padding:8px 16px;border:1.5px solid #ff8c00;border-radius:4px;font-size:18px;font-weight:700;color:#ff8c00;background:#0d0500;min-width:280px;text-align:center;font-family:inherit;outline:none;box-shadow:0 0 10px #ff8c0044;caret-color:#ffcc66}
.typed-input::placeholder{color:#3d1f00}
/* Domain pills */
.domain-pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:420px;margin:10px auto}
.domain-pill{font-family:inherit;font-size:10px;font-weight:600;color:#5a3800;background:transparent;border:1.5px solid #3d1f00;border-radius:12px;padding:3px 10px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.domain-pill.active{color:#ff8c00;border-color:#ff8c00;background:#ff8c0018;box-shadow:0 0 6px #ff8c0022}
.domain-pill:hover{border-color:#ff8c00}
/* Difficulty radios */
.diff-group{display:flex;gap:8px;justify-content:center;margin:10px auto}
.diff-btn{font-family:inherit;font-size:11px;font-weight:600;color:#5a3800;background:transparent;border:1.5px solid #3d1f00;border-radius:6px;padding:6px 14px;cursor:pointer;transition:all .15s;text-align:center}
.diff-btn.active{color:#ff8c00;border-color:#ff8c00;background:#ff8c0018;box-shadow:0 0 8px #ff8c0022}
.diff-btn:hover{border-color:#ff8c00}
.diff-btn .diff-label{font-size:11px;font-weight:700;letter-spacing:1px}
.diff-btn .diff-desc{font-size:8px;color:#5a3800;margin-top:2px}
#overlay .btn.btn-secondary{color:#ff8c00;background:transparent;border:1.5px solid #ff8c0033;box-shadow:none}
#overlay .btn.btn-secondary:hover{background:#ff8c0018}
.menu-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.menu-actions .btn{margin-top:0}
.music-editor{width:min(960px,92vw);max-height:min(86vh,820px);overflow-y:auto;padding:22px 24px 24px;border-radius:16px;border:1px solid #ff8c0033;background:linear-gradient(180deg,#1a0800f5,#100600f7);box-shadow:0 22px 70px #00000099,0 0 30px #ff8c0018}
.music-editor-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
.title-shell{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:min(92vw,560px)}
.music-meta{display:flex;flex-direction:column;gap:6px}
.music-status{font-size:10px;letter-spacing:2px;color:#cc6600;min-height:12px}
.dvd-score-stage{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.dvd-score-badge{--dvd-w:280px;--dvd-h:92px;position:absolute;left:16px;top:92px;width:var(--dvd-w);min-height:var(--dvd-h);padding:12px 18px;border:1.5px solid #44ff8866;border-radius:14px;background:linear-gradient(135deg,#10210ff2,#0d0500f2 55%,#1d0b00f0);box-shadow:0 0 18px #44ff8833,0 0 34px #ff8c0022;animation:dvd-x 17s linear infinite alternate,dvd-y 11s linear infinite alternate}
.dvd-score-kicker{font-size:9px;letter-spacing:3px;color:#44ff88;margin-bottom:6px}
.dvd-score-value{font-size:28px;font-weight:900;letter-spacing:2px;color:#ffcc66;text-shadow:0 0 16px #ff8c0066}
.dvd-score-note{font-size:10px;letter-spacing:2px;color:#996622;margin-top:6px}
.wave-selector{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 18px}
.wave-btn{font-family:inherit;font-size:11px;font-weight:700;color:#5a3800;background:transparent;border:1.5px solid #3d1f00;border-radius:999px;padding:7px 12px;cursor:pointer;transition:all .15s}
.wave-btn.active,.wave-btn:hover{color:#ff8c00;border-color:#ff8c00;background:#ff8c0018}
.music-layout{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(260px,.85fr);gap:16px;align-items:start}
.music-card{background:#130700;border:1px solid #ff8c0022;border-radius:12px;padding:14px}
.music-card-title{font-size:10px;letter-spacing:2px;color:#5a3800;font-weight:700;margin-bottom:10px}
.music-card-subtitle{font-size:11px;color:#996622;line-height:1.5;margin-bottom:10px}
.chord-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.music-field{display:flex;flex-direction:column;gap:6px}
.music-field-label{font-size:10px;letter-spacing:1px;color:#996622;font-weight:700}
.music-select{width:100%;font-family:inherit;font-size:13px;color:#ffcc66;background:#0d0500;border:1.5px solid #3d1f00;border-radius:8px;padding:10px 12px;outline:none}
.music-select:focus{border-color:#ff8c00;box-shadow:0 0 0 1px #ff8c0033}
.bass-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.bass-step{display:flex;flex-direction:column;gap:5px}
.bass-step-num{font-size:10px;letter-spacing:1px;color:#996622;font-weight:700}
.tempo-shell{display:flex;align-items:center;gap:12px}
.tempo-shell input[type=range]{flex:1;accent-color:#ff8c00}
.tempo-value{font-size:18px;font-weight:700;color:#ffcc66;min-width:74px;text-align:right}
.editor-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.editor-actions .btn{margin-top:0;flex:1 1 180px}
.music-editor-note{font-size:11px;line-height:1.6;color:#996622;margin-top:12px}
@keyframes dvd-x{from{left:16px}to{left:calc(100% - var(--dvd-w) - 16px)}}
@keyframes dvd-y{from{top:92px}to{top:calc(100% - var(--dvd-h) - 24px)}}
@media(max-width:768px){
#hud{padding:max(6px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) 6px max(8px,env(safe-area-inset-left))}
#input-panel{padding:4px max(8px,env(safe-area-inset-right)) max(6px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hud-label{font-size:7px;letter-spacing:1px}
.hud-val{font-size:clamp(12px,3.5vw,16px)}
#h-mastery{font-size:clamp(9px,2.5vw,13px)!important}
#tier-bar{top:40px;font-size:8px}
#mute-btn{font-size:16px;padding:6px 8px;top:6px;right:6px}
.enemy-label-inner{font-size:clamp(10px,2.8vw,13px);padding:5px 8px;max-width:min(200px,60vw);min-height:36px;display:flex;align-items:center}
.sel-arrow{font-size:11px}
.mc-grid{flex-direction:column;gap:6px;max-width:100%;padding:0 4px}
.mc-btn{min-height:44px;padding:8px 10px;font-size:clamp(12px,3vw,14px);width:100%}
.mc-btn .mc-key{width:24px;height:24px;font-size:12px;border-radius:6px}
.mc-btn .mc-text{font-size:clamp(12px,3vw,14px);line-height:1.3}
.hint-mc-grid{flex-direction:column;gap:6px;padding:0 4px}
.hint-mc-btn{min-height:44px;padding:8px 12px;font-size:14px;width:100%;text-align:left}
.prompt-text{font-size:clamp(13px,3.5vw,18px)}
.prompt-label{font-size:8px;letter-spacing:2px}
.q-type-badge{font-size:7px}
.input-help{display:block;opacity:.72}
.hint-text{font-size:11px;margin-top:4px}
.latex-display .katex{font-size:clamp(0.8em,3vw,1.15em)}
.latex-display{overflow-x:auto;-webkit-overflow-scrolling:touch}
#queue-bar{bottom:auto;top:55px;font-size:8px}
#overlay h1{font-size:clamp(24px,8vw,56px);letter-spacing:clamp(4px,2vw,14px)}
#overlay h2{font-size:clamp(11px,3vw,16px);letter-spacing:clamp(3px,1.5vw,8px)}
#overlay .desc{font-size:clamp(10px,2.5vw,12px);max-width:90vw;padding:0 10px}
#overlay .btn{font-size:14px;padding:14px 28px;min-height:48px}
#overlay .sub{font-size:10px}
.menu-actions{width:100%;padding:0 10px}
.menu-actions .btn{width:100%}
.music-editor{width:min(94vw,720px);padding:18px 14px 16px;border-radius:14px}
.music-editor-top{flex-direction:column;align-items:stretch}
.title-shell{width:min(94vw,560px)}
.dvd-score-badge{--dvd-w:210px;--dvd-h:78px;top:108px;padding:10px 14px}
.dvd-score-value{font-size:20px}
.dvd-score-note{font-size:9px}
.wave-selector{gap:5px}
.wave-btn{flex:1 1 22%;min-height:42px;padding:9px 10px}
.music-layout{grid-template-columns:1fr}
.chord-grid{grid-template-columns:1fr}
.bass-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
.tempo-shell{flex-direction:column;align-items:stretch}
.tempo-value{text-align:left}
.editor-actions .btn{width:100%;flex-basis:100%}
.music-select{min-height:44px}
.stats-grid{gap:6px;max-width:90vw}
.stat-box{padding:8px 4px}
.stat-box .sv{font-size:clamp(16px,4vw,20px)}
.weak-item{font-size:10px;padding:4px 6px}
.domain-pills{max-width:95vw;gap:4px}
.domain-pill{font-size:9px;padding:4px 8px}
.diff-group{gap:5px;flex-wrap:wrap;max-width:95vw}
.diff-btn{padding:6px 10px;font-size:10px;flex:1;min-width:80px}
.flash-msg{font-size:clamp(20px,6vw,32px)}
.blank-input{min-width:auto;width:80%;max-width:200px;font-size:16px}
}
@media(max-width:400px){
.hud-val{font-size:clamp(10px,3vw,14px)}
.mc-btn{min-height:48px;font-size:13px}
#overlay h1{font-size:clamp(20px,7vw,32px)}
.diff-group{flex-direction:column;align-items:center}
.diff-btn{width:100%;max-width:200px}
.wave-btn{flex:1 1 30%}
.bass-grid{grid-template-columns:1fr}
}
@media(max-height:500px){
#input-panel{max-height:35vh}
.mc-grid{flex-direction:row;flex-wrap:wrap}
.mc-btn{width:auto;min-height:36px;flex:1 1 45%}
#hud{padding:4px 10px}
.hud-val{font-size:14px}
.prompt-text{font-size:14px}
}
</style>

<body>
<canvas id="game-canvas"></canvas>
<div id="hud" style="display:none">
  <div class="hud-item"><div class="hud-label">WAVE</div><div class="hud-val" id="h-wave">1/12</div></div>
  <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-val" id="h-score">0</div></div>
  <div class="hud-item"><div class="hud-label">LIVES</div><div class="hud-val" id="h-lives"></div></div>
  <div class="hud-item"><div class="hud-label">STREAK</div><div class="hud-val" id="h-streak">0</div></div>
  <div class="hud-item"><div class="hud-label">MASTERY</div><div class="hud-val" id="h-mastery" style="font-size:13px">0/39</div></div>
</div>
<div id="tier-bar" style="display:none"></div>
<div id="labels"></div>
<div id="input-panel" style="display:none"></div>
<div id="queue-bar" style="display:none"></div>
<div id="overlay"></div>
<button id="mute-btn" title="Mute">🔊</button>

<script>
// ═══════════════════════════════════════════════
//  AMBER PALETTE
// ═══════════════════════════════════════════════
const AMB={
  black:0x0d0500, darkest:0x1a0800, dark:0x2d1200, mid:0x5a2800,
  bright:0xcc6600, hot:0xff8c00, glow:0xffaa22, white:0xffcc66,
  css:{black:'#0d0500',dark:'#2d1200',mid:'#5a2800',bright:'#cc6600',hot:'#ff8c00',glow:'#ffaa22',white:'#ffcc66'}
};
const MASTERY_COLORS=['#ff4422','#ff6b35','#ffaa22','#66aaff','#44ff88','#44ff88'];
const MASTERY_LABELS=['New','Learning','Familiar','Practiced','Proficient','Mastered'];

// ═══════════════════════════════════════════════
//  SOUND ENGINE
// ═══════════════════════════════════════════════
const SFX=(()=>{
  // ── Persistent polyphonic synth engine ──
  // Pre-allocated voice pool: oscillators never stop, controlled via gain
  let ctx=null,muted=false,masterGain=null,bgmPlaying=false;
  let voices=[],noiseGate=null,noiseLP=null;
  let padBus=null,bassBus=null,sfxBus=null;
  let bgmSeqTimer=null,currentWaveIdx=0,previewTimer=null,previewConfig=null;
  const MUSIC_STORAGE_KEY='td-music-config-v1';

  // ── MUSIC CONFIG — edit these to customize each wave's sound ──
  // Each wave: {name, chords: [[root,3rd,5th],...], bass: [ratios, 0=rest], tempo: bpm}
  // Chords cycle on correct answers. Bass loops continuously.
  const DEFAULT_MUSIC_CONFIG=[
    {name:'Dire Straits "So Far Away"',     // W1
      chords:[[220,262,330],[196,247,294],[175,220,262],[165,208,247]],
      bass:[1,0,1,.75,0,1,1.5,.75], pad:[.55,.25,.45,.25,.55,.25,.85,.25], tempo:90},
    {name:'A-ha "Take On Me"',              // W2
      chords:[[220,277,330],[185,220,277],[147,185,220],[165,208,247]],

  // ── Voice helpers ──

  // Opens the filter and shifts voicing as the student progresses
  let lastProgress=-1;
  function setProgress(frac){
    if(!ctx||!bgmPlaying)return;
    const p=Math.max(0,Math.min(1,frac));
    // Only update if progress changed meaningfully (avoid per-frame noise)
    if(Math.abs(p-lastProgress)<.05)return;
    lastProgress=p;
    const t=ctx.currentTime;
    const cfg=getWaveConfig(currentWaveIdx);
    const ch=cfg.chords[currentProgIdx%cfg.chords.length];
    // Pad filter opens as progress increases (darker → brighter)
    const padF=600+p*1200; // 600Hz at start → 1800Hz when wave nearly clear

      const base=ch[i],target=ch[i]*(1+p*.5); // up to 50% frequency shift at 100%

  // ── BGM ──
  function startBGM(){

  // Generate a question for an enemy at spawn time
  generateQuestion(cmd, allCommands){
    let type;
    const diff=G.difficulty||'learn';
    if(diff==='learn'){
      type='identify';
    }else if(diff==='practice'){
      type=Math.random()<0.5?'identify':'fillblank';
    }else{
      // challenge: equal weight
      type=Math.random()<0.5?'identify':'fillblank';
    }
    if(type==='identify'){
      // Pick 3 distractors from other commands, prefer same domain
      const sameDom=allCommands.filter(c=>c.id!==cmd.id&&c.dom===cmd.dom);
      const diffDom=allCommands.filter(c=>c.id!==cmd.id&&c.dom!==cmd.dom);
      const pool=[...sameDom,...shuffleArr(diffDom)];
      // Strip parenthetical notation from answers so formulas don't give away the answer
      function stripNot(s){return s.replace(/\s*\([^)]*\)\s*$/,'').trim()}
      const picks=shuffleArr(pool).slice(0,3).map(c=>stripNot(c.action));
      while(picks.length<3){picks.push(stripNot(allCommands[Math.floor(Math.random()*allCommands.length)].action))}
      const correctLabel=stripNot(cmd.action);
      const options=shuffleArr([correctLabel,...picks]);
      const correctIdx=options.indexOf(correctLabel);
      return{type:'identify',latex:cmd.latex,options,correctIdx,correctKey:['a','b','c','d'][correctIdx]};
    }else{
      const blank=cmd.blanks[Math.floor(Math.random()*cmd.blanks.length)];
      const shuffledChoices=shuffleArr([...blank.choices]);
      return{type:'fillblank',latex:blank.latex,answer:blank.answer,choices:shuffledChoices,fullLatex:cmd.latex};
    }
  },

  formatPrompt(cmd){return cmd.action},
  formatAnswer(cmd){return cmd.latex?'(formula)':cmd.action},

  // Validate fill-blank answers
  validateBlank(input,answer){
    function norm(s){return s.trim().toLowerCase().replace(/\s+/g,'').replace(/\u03c3/g,'sigma').replace(/\u03bc/g,'mu').replace(/\u03b2/g,'beta').replace(/\u03c7/g,'chi').replace(/\\hat\{p\}/g,'phat').replace(/\\bar\{x\}/g,'xbar').replace(/p\u0302/g,'phat').replace(/x\u0304/g,'xbar')}
    const ni=norm(input),na=norm(answer);
    if(ni===na)return true;
    // Common aliases
    const aliases={'p0':'p0','p_0':'p0','phat':'phat','p-hat':'phat','phat1':'phat1','p-hat1':'phat1',
      'pc':'pc','p_c':'pc','phatc':'pc','mu0':'mu0','mu_0':'mu0','beta0':'beta0','beta_0':'beta0',
      'sx':'sx','s_x':'sx','sigma_x':'sigma_x','σx':'sigma_x','σ_x':'sigma_x','sy':'sy','s_y':'sy','s1^2':'s1^2','s1²':'s1^2','sigma1^2':'sigma1^2',
      'σ1^2':'sigma1^2','σ1²':'sigma1^2','n2':'n2','n_2':'n2','p(xi)':'p(xi)','p(x_i)':'p(xi)',
      'p(a∩b)':'p(a∩b)','p(anb)':'p(a∩b)','p(a and b)':'p(a∩b)','p(b)':'p(b)'};
    const ai=aliases[ni]||ni, aa=aliases[na]||na;
    return ai===aa;
  },
};

// Utility: shuffle an array (returns new array)
function shuffleArr(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function noteFreq(offset){return Number((220*Math.pow(2,offset/12)).toFixed(3))}
function triad(offset,quality){
  return[
    noteFreq(offset),
    noteFreq(offset+(quality==='maj'?4:3)),
    noteFreq(offset+7)
  ];
}
const CHORD_ROOTS=[
  {id:'C',label:'C',offset:-9},{id:'Db',label:'Db',offset:-8},{id:'D',label:'D',offset:-7},

];
const CHORD_OPTIONS=[];
const CHORD_OPTION_MAP={};
CHORD_ROOTS.forEach(root=>{
  [{suffix:'',name:'major',quality:'maj'},{suffix:'m',name:'minor',quality:'min'}].forEach(spec=>{
    const option={id:root.id+spec.suffix,label:root.label+' '+spec.name,freqs:triad(root.offset,spec.quality)};

// Calculate player's average mastery for adaptive speed
function getAverageMastery(srs){
  const entries=Object.values(srs).filter(s=>s.totalAttempts>0);
  if(entries.length===0)return 0;
  return entries.reduce((sum,s)=>sum+s.mastery,0)/entries.length;
}

// ═══════════════════════════════════════════════
//  SRS — Enhanced with time + attempts
// ═══════════════════════════════════════════════
function initSRS(cmds){const s={};(cmds||COMMANDS).forEach(c=>{s[c.id]={ease:2.5,interval:0,streak:0,correct:0,wrong:0,lastSeen:0,mastery:0,avgTimeMs:0,totalAttempts:0}});return s}
function srsHit(card,wave,timeMs,usedHint,attempts){
  const c={...card};c.correct++;c.streak++;c.lastSeen=wave;
  c.avgTimeMs=c.totalAttempts>0?(c.avgTimeMs*c.totalAttempts+timeMs)/(c.totalAttempts+1):timeMs;
  c.totalAttempts++;
  let q=5;
  if(timeMs>6000)q-=2;else if(timeMs>4000)q-=1.5;else if(timeMs>2500)q-=0.5;
  if(timeMs<1500)q=Math.min(5,q+0.5);
  if(usedHint)q-=2;
  if(attempts>1)q-=Math.min(2,attempts-1);
  q=Math.max(0,Math.min(5,q));
  c.ease=Math.max(1.3,card.ease+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  if(card.interval===0)c.interval=1;
  else if(card.interval===1)c.interval=3;
  else c.interval=Math.round(card.interval*c.ease);
  c.interval=Math.min(c.interval,20);
  const fastEnough=c.avgTimeMs<3000;
  const veryFast=c.avgTimeMs<1800;
  if(c.streak>=8&&c.ease>=2.2&&veryFast)c.mastery=5;
  else if(c.streak>=5&&c.ease>=2.0&&fastEnough)c.mastery=4;
  else if(c.streak>=3&&c.ease>=1.8)c.mastery=3;
  else if(c.streak>=2)c.mastery=2;
  else if(c.streak>=1)c.mastery=Math.max(c.mastery,1);
  return c;
}
function srsMiss(card,wave){
  const c={...card};c.wrong++;c.streak=0;c.lastSeen=wave;c.interval=0;
  c.ease=Math.max(1.3,card.ease-.2);c.mastery=Math.max(0,card.mastery-1);
  c.totalAttempts++;return c;
}
function pickCommands(pool,srs,count,wave){
  const due=[],overdue=[],fresh=[],notDue=[];
  pool.forEach(cmd=>{const s=srs[cmd.id],ws=wave-s.lastSeen;
    if(s.lastSeen===0&&s.correct===0)fresh.push(cmd);
    else if(ws>=s.interval+2)overdue.push(cmd);
    else if(ws>=s.interval)due.push(cmd);
    else notDue.push(cmd)});
  const picked=[],used=new Set();
  function add(c){if(used.has(c.id))return false;picked.push(c);used.add(c.id);return true}
  overdue.sort((a,b)=>srs[a.id].mastery-srs[b.id].mastery);overdue.forEach(c=>{if(picked.length<count)add(c)});
  due.sort((a,b)=>srs[a.id].mastery-srs[b.id].mastery);due.forEach(c=>{if(picked.length<count)add(c)});
  const maxNew=Math.min(3,Math.max(1,Math.floor(count*.3)));let na=0;
  for(const c of fresh){if(picked.length>=count||na>=maxNew)break;if(add(c))na++}
  notDue.sort((a,b)=>srs[a.id].mastery-srs[b.id].mastery);notDue.forEach(c=>{if(picked.length<count)add(c)});
  pool.forEach(c=>{if(picked.length<count)add(c)});
  for(let i=picked.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[picked[i],picked[j]]=[picked[j],picked[i]]}
  return picked.slice(0,count);
}

function syncHighScore(){
  if(!activeCartridge)return{prevHigh:0,highScore:0,isNewHigh:false};
  const hsKey='td-highscore-'+activeCartridge.id;
  const prevHigh=parseInt(localStorage.getItem(hsKey)||'0',10);
  const currentScore=Math.max(0,Math.floor(Number(G.score)||0));
  const highScore=Math.max(prevHigh,currentScore);
  const isNewHigh=currentScore>prevHigh;
  if(highScore!==prevHigh){
    try{localStorage.setItem(hsKey,highScore.toString())}catch(e){}
  }
  return{prevHigh,highScore,isNewHigh};
}
function syncRunCheckpoint(){
  saveSRS();
  const recordState=syncHighScore();
  if(G.screen==='game')saveRunState();
  return recordState;
}
function loadSRS(cartridge){
  const saved=localStorage.getItem('td-srs-'+cartridge.id);
  const fresh=initSRS(cartridge.commands);
  if(!saved)return fresh;
  try{
    const parsed=JSON.parse(saved);
    for(const id of Object.keys(fresh)){
      if(parsed[id])fresh[id]={...fresh[id],...parsed[id]};
    }
    return fresh;
  }catch(e){return fresh}
}
function getCartridgeProgress(cartridgeId){
  const saved=localStorage.getItem('td-srs-'+cartridgeId);
  if(!saved)return{total:0,seen:0,mastered:0};
  try{
    const srs=JSON.parse(saved);
    const entries=Object.values(srs);
    return{
      total:entries.length,
      seen:entries.filter(s=>s.totalAttempts>0).length,
      mastered:entries.filter(s=>s.mastery>=4).length,
    };
  }catch(e){return{total:0,seen:0,mastered:0}}
}
function returnToTitleFromRun(){
  if(G.screen!=='game'&&G.screen!=='victory'&&G.screen!=='gameover')return;
  syncRunCheckpoint();
  showTitleScreen('game');
}

const enemyMeshes={};
const eMat=new THREE.MeshPhongMaterial({color:AMB.hot,emissive:AMB.bright,emissiveIntensity:.2,flatShading:true});
const eGeo=new THREE.BoxGeometry(.45,.45,.45);
const childGeo=new THREE.BoxGeometry(.30,.30,.30);
const childMat=new THREE.MeshPhongMaterial({color:0x4488ff,emissive:0x2255aa,emissiveIntensity:.3,flatShading:true});
const grandGeo=new THREE.BoxGeometry(.20,.20,.20);
const grandMat=new THREE.MeshPhongMaterial({color:0xaa44ff,emissive:0x6622aa,emissiveIntensity:.35,flatShading:true});

function addEnemyMesh(enemy){
  const m=new THREE.Mesh(eGeo,eMat.clone());
  const p=pathCurve.getPointAt(0);
  m.position.copy(p);m.position.y=.6;
  scene.add(m);
  enemyMeshes[enemy.id]=m;
}
function removeEnemyMesh(id){
  const m=enemyMeshes[id];if(!m)return;
  scene.remove(m);m.geometry.dispose();m.material.dispose();
  delete enemyMeshes[id];
}
function addChildEnemyMesh(enemy,offsetIdx){
  const geo=enemy.splitDepth>=2?grandGeo:childGeo;
  const mat=enemy.splitDepth>=2?grandMat:childMat;
  const m=new THREE.Mesh(geo,mat.clone());
  const t=Math.min(enemy.t,1);
  const p=pathCurve.getPointAt(t);
  const offsets=enemy.splitDepth>=2?[-.25,.25]:[-.4,0,.4];
  m.position.set(p.x+offsets[offsetIdx%offsets.length],p.y+.4,p.z);
  scene.add(m);
  enemyMeshes[enemy.id]=m;
}
function updateEnemyMeshes(){
  G.enemies.forEach(e=>{
    const m=enemyMeshes[e.id];if(!m)return;
    const t=Math.min(e.t,1);
    const p=pathCurve.getPointAt(t);
    const depth=e.splitDepth||0;
    const bobAmp=depth>=2?.03:depth>=1?.05:.1;
    m.position.set(p.x,p.y+.3+Math.sin(Date.now()*.003+e.id)*bobAmp,p.z);
    m.rotation.y+=depth>=2?.06:depth>=1?.04:.02;
    if(e.id===G.selectedId){
      const selC=depth>=2?0xcc88ff:depth>=1?0x88bbff:AMB.white;
      m.material.color.setHex(selC);m.material.emissive.setHex(depth>=2?0xaa44ff:depth>=1?0x4488ff:AMB.glow);m.material.emissiveIntensity=.5+Math.sin(Date.now()*.005)*.2;
    }else{
      const baseC=depth>=2?0xaa44ff:depth>=1?0x4488ff:AMB.hot;
      const emC=depth>=2?0x6622aa:depth>=1?0x2255aa:AMB.bright;
      m.material.color.setHex(baseC);m.material.emissive.setHex(emC);m.material.emissiveIntensity=depth>=2?.35:depth>=1?.3:.2;
    }
  });
}

let lastInputState='';
function updateInput(){
  const panel=document.getElementById('input-panel');
  if(G.waveComplete){
    if(lastInputState==='wave-clear')return;
    lastInputState='wave-clear';
    panel.innerHTML='<div class="wave-clear">WAVE '+G.wave+' CLEARED</div><button class="btn" onclick="nextWave()" style="margin-top:10px;font-family:inherit;font-size:13px;padding:8px 24px;background:'+AMB.css.hot+';color:'+AMB.css.black+';border:none;cursor:pointer;letter-spacing:2px;font-weight:700">[ NEXT WAVE ]</button><button class="btn btn-secondary" onclick="returnToTitleFromRun()" style="margin-top:10px">[ SAVE + EXIT ]</button><div class="input-help" style="color:'+AMB.css.mid+';opacity:.5">Progress is checkpointed here. Press Escape to return to the main screen.</div>';
    return;
  }
  const sel=G.enemies.find(e=>e.id===G.selectedId);
  const mode=activeCartridge?activeCartridge.inputMode:'prefix-key';

  if(mode==='quiz'){
    // ── Quiz mode: identify (MC) or fill-blank ──
    const stateKey='quiz-'+(sel?sel.id:'none')+'-'+G.showHint;
    if(stateKey===lastInputState)return;
    lastInputState=stateKey;
    if(!sel||!sel.question){panel.innerHTML='<div class="prompt-text">Waiting for enemies...</div>';return}
    const q=sel.question;
    const speedInfo=sel.speedMult>1?' <span style="color:#ff4422;font-size:10px">\u26a1'+sel.speedMult.toFixed(1)+'x speed</span>':'';
    let html='';
    // 50/50 hint: when hint is shown, eliminate one wrong answer
    if(G.showHint&&q.eliminatedIdx==null){
      if(q.type==='identify'){
        const wrongIdxs=q.options.map((_,i)=>i).filter(i=>i!==q.correctIdx);
        q.eliminatedIdx=wrongIdxs[Math.floor(Math.random()*wrongIdxs.length)];
      }else if(q.type==='subconcept'){
        const wrongIdxs=q.options.map((_,i)=>i).filter(i=>i!==q.correctIdx);
        if(wrongIdxs.length>0)q.eliminatedIdx=wrongIdxs[Math.floor(Math.random()*wrongIdxs.length)];
      }else{
        const correctAnswer=q.answer;
        const wrongIdxs=q.choices.map((_,i)=>i).filter(i=>!activeCartridge.validateBlank(q.choices[i],correctAnswer));
        if(wrongIdxs.length>0)q.eliminatedIdx=wrongIdxs[Math.floor(Math.random()*wrongIdxs.length)];
      }
    }
    const eliminated=q.eliminatedIdx;

    if(q.type==='identify'){
      html+='<div class="q-type-badge">IDENTIFY</div>'+speedInfo;
      html+='<div class="latex-display" id="quiz-latex"></div>';
      html+='<div style="font-size:11px;color:'+AMB.css.mid+';margin-bottom:2px">What does this formula calculate?</div>';
      html+='<div class="mc-grid">';
      const keys=['A','B','C','D'];
      q.options.forEach((opt,i)=>{
        const isElim=G.showHint&&eliminated===i;
        html+='<button class="mc-btn'+(isElim?' eliminated':'')+'" data-choice="'+keys[i].toLowerCase()+'"'+(isElim?' disabled style="opacity:0.2;pointer-events:none;text-decoration:line-through"':' onclick="handleQuizChoice(\''+keys[i].toLowerCase()+'\')"')+'><span class="mc-key">'+keys[i]+'</span><span class="mc-text">'+opt+'</span></button>';
      });
      html+='</div>';
      if(G.showHint&&sel.cmd.explain)html+='<div class="hint-text">\ud83d\udca1 '+sel.cmd.explain+'</div>';
      html+='<div class="input-help" style="color:'+AMB.css.mid+';opacity:.5">A/B/C/D = answer \u00b7 Tab = switch \u00b7 Alt+H = hint (half pts)</div>';
    }else if(q.type==='subconcept'){
      // Sub-concept / sub-sub-concept question (from hydra split)
      const scDepth=sel.splitDepth||1;
      const scColor=scDepth>=2?'#aa44ff':'#4488ff';
      const scBg=scDepth>=2?'#aa44ff18':'#4488ff18';

      html+='<div style="font-size:14px;color:'+scColor+';margin:4px 0;font-weight:700">'+q.text+'</div>';
      html+='<div class="mc-grid">';
      const scKeys=q.options.length<=2?['A','B']:['A','B','C'];
      q.options.forEach((opt,i)=>{
        const isElim=G.showHint&&eliminated===i;
        html+='<button class="mc-btn'+(isElim?' eliminated':'')+'" style="'+(isElim?'opacity:0.2;pointer-events:none;text-decoration:line-through':'border-color:'+scColor+'44')+'" data-choice="'+scKeys[i].toLowerCase()+'"'+(isElim?' disabled':' onclick="handleSubconceptChoice(\''+scKeys[i].toLowerCase()+'\')"')+'><span class="mc-key" style="background:'+scColor+'">'+scKeys[i]+'</span><span class="mc-text">'+opt+'</span></button>';
      });
      html+='</div>';
      if(G.showHint&&sel.cmd.explain)html+='<div class="hint-text" style="border-color:'+scColor+'33">\ud83d\udca1 '+sel.cmd.explain+'</div>';
      html+='<div class="input-help" style="color:'+AMB.css.mid+';opacity:.5">'+(q.options.length<=2?'A/B':'A/B/C')+' = answer \u00b7 Tab = switch</div>';
    }else{
      // fill-blank — always show A/B/C choices
      html+='<div class="q-type-badge">FILL THE BLANK</div>'+speedInfo;
      html+='<div class="latex-display" id="quiz-latex"></div>';
      html+='<div style="font-size:11px;color:'+AMB.css.mid+';margin-bottom:2px">What goes in the blank?</div>';

      q.choices.forEach((ch,i)=>{
        const isElim=G.showHint&&eliminated===i;
        html+='<button class="hint-mc-btn'+(isElim?' eliminated':'')+'" data-choice="'+keys2[i].toLowerCase()+'"'+(isElim?' disabled style="opacity:0.2;pointer-events:none;text-decoration:line-through"':' onclick="handleHintChoice(\''+keys2[i].toLowerCase()+'\')"')+'><span class="mc-key">'+keys2[i]+'</span> <span id="hint-ch-'+i+'"></span></button>';

    if(G.showHint)html+='<div class="hint-text">\ud83d\udca1 '+cmd.hint+' \u2014 Answer: <span style="color:'+AMB.css.white+'">'+prefix+' '+activeCartridge.formatAnswer(cmd)+'</span></div>';
    html+='<div class="input-help" style="color:'+AMB.css.mid+';opacity:.5">Tab = switch \u00b7 Alt+H = hint</div>';
    panel.innerHTML=html;
  }

// Quiz mode handlers (called from onclick in MC buttons)
function handleQuizChoice(key){
  if(G.screen!=='game')return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='identify')return;
  if(key===enemy.question.correctKey){
    handleHit(enemy);
  }else{
    handleMiss(enemy);
  }
}
function handleHintChoice(key){
  if(G.screen!=='game')return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='fillblank')return;
  const idx=['a','b','c'].indexOf(key);
  if(idx===-1)return;
  const chosen=enemy.question.choices[idx];
  if(activeCartridge.validateBlank(chosen,enemy.question.answer)){
    handleHit(enemy);
  }else{
    handleMiss(enemy);
  }
}
function handleSubconceptChoice(key){
  if(G.screen!=='game')return;
  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy||!enemy.question||enemy.question.type!=='subconcept')return;
  const idx=['a','b','c'].indexOf(key);
  if(idx===-1)return;
  // Block eliminated choice
  if(G.showHint&&enemy.question.eliminatedIdx===idx)return;
  if(key===enemy.question.correctKey){
    handleHit(enemy);
  }else{
    handleMiss(enemy);
  }
}

function updateQueue(){
  const bar=document.getElementById('queue-bar');
  if(G.waveComplete||G.waveCommands.length===0){bar.style.display='none';return}
  bar.style.display='block';
  let html='INCOMING: ';
  G.waveCommands.slice(G.spawnIdx).forEach(c=>{html+='<span class="q-dot" style="background:'+AMB.css.hot+'" title="'+c.action+'"></span>'});
  if(G.spawnIdx>=G.waveCommands.length)html+='<span style="opacity:.4">all spawned</span>';
  bar.innerHTML=html;
}
function updateTierBar(){
  const tiers=['core','regular','power','support'];
  const bar=document.getElementById('tier-bar');
  bar.innerHTML=tiers.map(t=>'<span style="color:'+(G.unlockedTiers.includes(t)?AMB.css.hot:AMB.css.dark)+';margin:0 6px">\u25a0 '+t.toUpperCase()+(G.unlockedTiers.includes(t)?'':' \ud83d\udd12')+'</span>').join('');
}

function toggleDomain(dom){
  SFX.click();
  const idx=G.domainFilter.indexOf(dom);
  if(idx>=0){
    // Don't allow deselecting the last domain
    if(G.domainFilter.length<=1)return;
    G.domainFilter.splice(idx,1);
  }else{
    G.domainFilter.push(dom);
  }
  // Update pill states
  document.querySelectorAll('.domain-pill[data-domain]').forEach(btn=>{
    btn.classList.toggle('active',G.domainFilter.includes(btn.dataset.domain));
  });
  updateDomainAllBtn();
}

function toggleAllDomains(){
  SFX.click();
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  const allSelected=G.domainFilter.length===allDomains.length;
  if(allSelected){
    // Can't deselect all — do nothing
    return;
  }
  G.domainFilter=[...allDomains];
  document.querySelectorAll('.domain-pill[data-domain]').forEach(btn=>btn.classList.add('active'));
  updateDomainAllBtn();
}

function updateDomainAllBtn(){
  const allBtn=document.getElementById('domain-all');
  if(!allBtn)return;
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  allBtn.classList.toggle('active',G.domainFilter.length===allDomains.length);
}

function setDifficulty(diff){
  SFX.click();
  G.difficulty=diff;
  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.textContent.trim().toLowerCase().startsWith(diff));
  });
}

function resetProgress(){
  if(!activeCartridge)return;
  if(confirm('Reset all progress for '+activeCartridge.name+'? This cannot be undone.')){
    localStorage.removeItem('td-srs-'+activeCartridge.id);
    clearRunState();
    SFX.click();
    showTitleScreen('title');
  }
}

function getUnlockedTiersForWave(n){
  return n>=7?['core','regular','power','support']:n>=4?['core','regular','support']:['core'];
}
function genWave(n){
  const tiers=getUnlockedTiersForWave(n);
  G.unlockedTiers=tiers;
  let pool=COMMANDS.filter(c=>tiers.includes(c.tier));
  // Filter by selected domains
  if(G.domainFilter&&G.domainFilter.length>0){
    const filtered=pool.filter(c=>G.domainFilter.includes(c.dom));
    if(filtered.length>0)pool=filtered;
  }
  return pickCommands(pool,G.srs,Math.min(4+n,16),n);
}
let bgmLaunchTimer=null;
function cancelQueuedBGMStart(){
  if(bgmLaunchTimer){clearTimeout(bgmLaunchTimer);bgmLaunchTimer=null}
}
function queueBGMStart(delay=180){
  cancelQueuedBGMStart();
  bgmLaunchTimer=setTimeout(()=>{
    bgmLaunchTimer=null;
    SFX.startBGM();
  },delay);
}

  clearRunState();
  SFX.stopMusicPreview();

  queueBGMStart();
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  Object.assign(G,{screen:'game',wave:1,score:0,lives:BASE_LIVES,streak:0,maxStreak:0,
    srs:loadSRS(activeCartridge),enemies:[],selectedId:null,inputState:'idle',hintUsed:false,showHint:false,
    spawnIdx:0,waveComplete:false,totalCorrect:0,totalWrong:0,combo:1,
    unlockedTiers:['core'],attemptsOnCurrent:0,commandStartTime:0,typedBuffer:'',paused:false});
  G.waveCommands=genWave(1);
  lastSpawnTime=performance.now();
  lastInputState='';

function continueGame(){
  const snapshot=loadRunState();
  if(!snapshot){startGame();return}
  cancelQueuedBGMStart();
  SFX.stopMusicPreview();
  SFX.stopBGM();
  SFX.click();
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  const allDomains=[...new Set(activeCartridge.commands.map(c=>c.dom).filter(Boolean))];
  const mergedSrs=loadSRS(activeCartridge);
  if(snapshot.srs&&typeof snapshot.srs==='object'){
    for(const id of Object.keys(mergedSrs)){
      if(snapshot.srs[id])mergedSrs[id]={...mergedSrs[id],...snapshot.srs[id]};
    }
  }
  const wave=Math.max(1,Math.min(12,Math.round(Number(snapshot.wave)||1)));
  const restoredDomains=(Array.isArray(snapshot.domainFilter)?snapshot.domainFilter:[]).filter(dom=>allDomains.includes(dom));
  const safeDomains=restoredDomains.length?restoredDomains:[...allDomains];
  const safeDifficulty=['learn','practice','challenge'].includes(snapshot.difficulty)?snapshot.difficulty:'learn';
  G.domainFilter=safeDomains.slice();
  G.difficulty=safeDifficulty;
  G.srs=mergedSrs;
  const fallbackWaveCommands=genWave(wave);
  const restoredEnemies=Array.isArray(snapshot.enemies)?snapshot.enemies:[];
  const maxEnemyId=restoredEnemies.reduce((max,e)=>Math.max(max,Math.round(Number(e&&e.id)||0)),0);
  const restoredWaveCommands=Array.isArray(snapshot.waveCommands)&&snapshot.waveCommands.length?snapshot.waveCommands:fallbackWaveCommands;
  Object.assign(G,{screen:'game',wave:wave,score:Math.max(0,Math.round(Number(snapshot.score)||0)),
    lives:Math.max(0,Math.min(BASE_LIVES,Math.round(Number(snapshot.lives)||BASE_LIVES))),
    streak:Math.max(0,Math.round(Number(snapshot.streak)||0)),
    maxStreak:Math.max(0,Math.round(Number(snapshot.maxStreak)||0)),
    srs:mergedSrs,enemies:restoredEnemies,selectedId:snapshot.selectedId||null,
    inputState:snapshot.inputState||'idle',hintUsed:!!snapshot.hintUsed,showHint:!!snapshot.showHint,
    waveCommands:restoredWaveCommands,spawnIdx:Math.max(0,Math.min(Math.round(Number(snapshot.spawnIdx)||0),restoredWaveCommands.length)),
    waveComplete:!!snapshot.waveComplete,totalCorrect:Math.max(0,Math.round(Number(snapshot.totalCorrect)||0)),
    totalWrong:Math.max(0,Math.round(Number(snapshot.totalWrong)||0)),combo:Math.max(1,Number(snapshot.combo)||1),
    unlockedTiers:Array.isArray(snapshot.unlockedTiers)&&snapshot.unlockedTiers.length?snapshot.unlockedTiers.slice():getUnlockedTiersForWave(wave),
    nextEnemyId:Math.max(Math.round(Number(snapshot.nextEnemyId)||0),maxEnemyId),
    attemptsOnCurrent:Math.max(0,Math.round(Number(snapshot.attemptsOnCurrent)||0)),
    commandStartTime:Date.now(),typedBuffer:typeof snapshot.typedBuffer==='string'?snapshot.typedBuffer:'',
    domainFilter:safeDomains.slice(),difficulty:safeDifficulty,paused:false});
  if(!G.enemies.find(e=>e.id===G.selectedId)){G.selectedId=null}
  G.enemies.forEach((enemy,idx)=>{
    if((enemy.splitDepth||0)>=1)addChildEnemyMesh(enemy,idx);
    else addEnemyMesh(enemy);
  });
  lastSpawnTime=performance.now();
  lastInputState='';
  showGameUI();
  updateLabels();
  SFX.setKey(G.wave);
  queueBGMStart();
}
function nextWave(){
  SFX.click();
  const nw=G.wave+1;
  if(nw>12){SFX.stopBGM();SFX.victory();showEndScreen(true);return}
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  Object.assign(G,{wave:nw,enemies:[],selectedId:null,inputState:'idle',spawnIdx:0,
    waveComplete:false,hintUsed:false,showHint:false,attemptsOnCurrent:0,typedBuffer:''});
  G.waveCommands=genWave(nw);
  lastSpawnTime=performance.now();
  lastInputState='';
  updateTierBar();
  syncRunCheckpoint();
}
function showEndScreen(victory){
  G.screen=victory?'victory':'gameover';
  const recordState=syncRunCheckpoint();
  clearRunState();
  cancelQueuedBGMStart();
  // Clean up surviving enemies
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  G.enemies=[];G.selectedId=null;
  document.getElementById('hud').style.display='none';
  document.getElementById('tier-bar').style.display='none';
  document.getElementById('input-panel').style.display='none';
  document.getElementById('queue-bar').style.display='none';
  labelsDiv.innerHTML='';
  const ov=document.getElementById('overlay');ov.classList.remove('hidden');
  const acc=G.totalCorrect+G.totalWrong>0?Math.round(G.totalCorrect/(G.totalCorrect+G.totalWrong)*100):0;
  const seen=Object.entries(G.srs).filter(([,v])=>v.correct+v.wrong>0);
  const mc=[0,0,0,0,0,0];seen.forEach(([,v])=>mc[v.mastery]++);
  const weak=seen.sort(([,a],[,b])=>(a.mastery-b.mastery)||(b.wrong-a.wrong)).slice(0,4).filter(([,v])=>v.mastery<4).map(([id])=>COMMANDS.find(c=>c.id===id));
  const isPrefix=activeCartridge&&activeCartridge.inputMode==='prefix-key';
  // High score tracking
  const isNewHigh=recordState.isNewHigh;
  const highScore=recordState.highScore;

  let html='<h1 style="font-size:32px;color:'+(victory?AMB.css.hot:'#ff4422')+'">'+(victory?'SERVER SECURED':'SERVER BREACHED')+'</h1>';
  if(isNewHigh&&G.score>0)html+='<div style="color:#44ff88;font-size:14px;font-weight:700;letter-spacing:3px;margin-bottom:8px">\u2605 NEW HIGH SCORE! \u2605</div>';
  html+='<div class="stats-grid">'+[['SCORE',G.score.toLocaleString()+(isNewHigh?' \u2605':'')],['HIGH SCORE',highScore.toLocaleString()],['WAVE',G.wave+'/12'],['ACCURACY',acc+'%'],['STREAK',G.maxStreak]].map(([l,v])=>'<div class="stat-box"><div class="sl">'+l+'</div><div class="sv">'+v+'</div></div>').join('')+'</div>';
  if(seen.length>0){
    html+='<div style="width:100%;max-width:360px"><div class="sl" style="text-align:center;margin-bottom:4px">MASTERY</div><div class="mastery-bar">'+mc.map((n,i)=>n>0?'<div style="flex:'+n+';background:'+MASTERY_COLORS[i]+';opacity:'+(0.5+i*0.1)+'"></div>':'').join('')+'</div><div class="mastery-legend">'+MASTERY_LABELS.map((l,i)=>mc[i]>0?'<span style="color:'+MASTERY_COLORS[i]+'">'+'\u25a0 '+l+' ('+mc[i]+')</span>':'').join('')+'</div></div>';
  }
  if(weak.length>0){
    html+='<div style="width:100%;max-width:360px;margin-bottom:12px"><div class="sl" style="text-align:center;color:#ff6b35;margin-bottom:4px">FOCUS NEXT SESSION</div>'+weak.map(c=>{
      if(!c)return'';
      const answerDisplay=isPrefix?(activeCartridge.prefixLabel+' '+activeCartridge.formatAnswer(c)):activeCartridge.formatAnswer(c);
      const promptDisplay=activeCartridge.formatPrompt(c);
      return'<div class="weak-item"><span><span style="color:#ff6b35;font-weight:700">'+answerDisplay+'</span> \u2192 '+promptDisplay+'</span><span style="font-size:9px;color:'+MASTERY_COLORS[G.srs[c.id].mastery]+'">'+MASTERY_LABELS[G.srs[c.id].mastery]+(G.srs[c.id].avgTimeMs>0?' \u00b7 '+Math.round(G.srs[c.id].avgTimeMs/1000*10)/10+'s':'')+'</span></div>';
    }).join('')+'</div>';
  }
  html+='<button class="btn" onclick="startGame()">[ REDEPLOY ]</button>';
  html+='<div class="sub" style="margin-top:8px"><a href="#" onclick="event.preventDefault();showTitleScreen(\'game\')" style="color:#5a3800;text-decoration:none;font-size:10px;letter-spacing:2px">\u2190 BACK TO MENU</a></div>';
  ov.innerHTML=html;
}

// ── Spawning ──
let lastSpawnTime=0;
function trySpawn(now){
  if(G.screen!=='game'||G.waveComplete||G.spawnIdx>=G.waveCommands.length)return;
  const delay=G.spawnIdx===0?1500:Math.max(SPAWN_DELAY_BASE-G.wave*150,2500);
  if(now-lastSpawnTime<delay)return;
  const cmd=G.waveCommands[G.spawnIdx];
  const enemy={id:++G.nextEnemyId,cmd,t:0,spawned:Date.now(),speedMult:1};
  // Generate question + cache label for quiz-mode cartridges
  if(activeCartridge&&activeCartridge.inputMode==='quiz'){
    if(activeCartridge.generateQuestion)enemy.question=activeCartridge.generateQuestion(cmd,COMMANDS);
    enemy.label=getEnemyLabel(cmd);
  }
  G.enemies.push(enemy);
  addEnemyMesh(enemy);
  G.spawnIdx++;lastSpawnTime=now;
  SFX.spawn();
}

// ── Movement — adaptive speed ──
function moveEnemies(){
  const avgMastery=getAverageMastery(G.srs);
  // Base speed depends on difficulty
  const diffBase=G.difficulty==='learn'?0.3:G.difficulty==='challenge'?0.6:0.4;
  const waveMult=diffBase+(G.wave-1)*0.08;
  // Higher mastery = faster enemies (1.0x at mastery 0, up to 1.5x at mastery 5)
  const masteryMult=1.0+(avgMastery/5)*0.5;
  // Streak slowmo: time slows during hot streaks (reward for flow state)
  const streakSlow=G.streak>=10?0.5:G.streak>=5?0.7:G.streak>=3?0.85:1.0;
  const speed=MOVE_SPEED_BASE*waveMult*masteryMult*streakSlow;
  G.enemies.forEach(e=>{e.t+=speed*(e.speedMult||1)});
}

// ── Breach ──
function checkBreach(){
  const reached=G.enemies.filter(e=>e.t>=1);
  if(reached.length===0)return;
  SFX.breach();
  reached.forEach(e=>{
    spawnExplosion(enemyMeshes[e.id]?.position||pathPts[pathPts.length-1],20,0xff2200);
    removeEnemyMesh(e.id);
    G.srs[e.cmd.id]=srsMiss(G.srs[e.cmd.id],G.wave);
  });
  G.enemies=G.enemies.filter(e=>e.t<1);
  G.lives-=reached.length;G.streak=0;G.combo=1;
  if(G.lives<=0){G.lives=0;SFX.gameOver();showEndScreen(false)}
}

// ── Wave complete ──
function checkWaveComplete(){
  if(G.spawnIdx>=G.waveCommands.length&&G.enemies.length===0&&!G.waveComplete&&G.waveCommands.length>0){
    G.waveComplete=true;SFX.waveClear();syncRunCheckpoint();
  }
}

// ── Auto-select ──
function autoSelect(){
  if(G.enemies.length>0&&(!G.selectedId||!G.enemies.find(e=>e.id===G.selectedId))){
    // Prioritize deepest split level, then closest to breach
    const deep=G.enemies.filter(en=>en.splitDepth>=2);
    const subs=G.enemies.filter(en=>en.splitDepth===1);
    const pool=deep.length>0?deep:subs.length>0?subs:G.enemies;
    const sorted=[...pool].sort((a,b)=>b.t-a.t);
    G.selectedId=sorted[0].id;
    const im=activeCartridge?activeCartridge.inputMode:'prefix-key';
    G.inputState=im==='prefix-key'?'await_prefix':im==='quiz'?'quiz':'typing';
    G.showHint=false;G.hintUsed=false;G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    if(im!=='quiz')focusTypedInput();else setTimeout(()=>focusBlankInput(),50);
  }else if(G.enemies.length===0){G.selectedId=null;G.inputState='idle'}
}

// ── Flash ──
function flash(msg,color){
  const d=document.createElement('div');d.className='flash-msg';d.style.color=color||AMB.css.white;
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(()=>d.remove(),900);
}

// ═══════════════════════════════════════════════
//  HIT / MISS — shared logic (with anti-spam cooldown)
// ═══════════════════════════════════════════════
let lastAnswerTime=0;
function handleHit(enemy){
  const now=Date.now();if(now-lastAnswerTime<300)return;lastAnswerTime=now;
  const responseTime=Date.now()-G.commandStartTime;
  const attempts=G.attemptsOnCurrent+1;
  let speedMult=1;
  if(responseTime<1500)speedMult=2;else if(responseTime<3000)speedMult=1.5;else if(responseTime<5000)speedMult=1.2;
  const totalMult=G.combo*speedMult;
  const hintPenalty=G.hintUsed&&!(enemy.question&&enemy.question.type==='fillblank')?(activeCartridge&&activeCartridge.inputMode==='quiz'?0.5:0.7):1;
  const childPenalty=enemy.isChild?0.5:1;
  const pts=Math.floor((100+Math.max(0,50-Math.floor(responseTime/200)))*totalMult*hintPenalty*childPenalty);
  const intensity=Math.min(1,speedMult/2);
  SFX.hit(intensity);
  const ePos=enemyMeshes[enemy.id]?.position.clone()||new THREE.Vector3();
  spawnExplosion(ePos,12+Math.floor(intensity*20),AMB.glow,true);
  spawnBeam(serverGrp.position.clone().add(new THREE.Vector3(0,3,0)),ePos);
  G.score+=pts;G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);
  if(G.streak===5||G.streak===10||G.streak===15)SFX.combo();
  G.combo=Math.min(G.combo+.25,3);G.totalCorrect++;
  SFX.advanceChord(); // Progress the chord on each correct answer
  G.srs[enemy.cmd.id]=srsHit(G.srs[enemy.cmd.id],G.wave,responseTime,G.hintUsed,attempts);
  removeEnemyMesh(enemy.id);
  G.enemies=G.enemies.filter(en=>en.id!==enemy.id);
  G.selectedId=null;G.inputState='idle';G.attemptsOnCurrent=0;G.typedBuffer='';
  flash('+'+pts+(speedMult>=1.5?' \u26a1':''),speedMult>=2?AMB.css.white:AMB.css.glow);
}

function handleMiss(enemy){
  const now=Date.now();if(now-lastAnswerTime<300)return;lastAnswerTime=now;
  SFX.miss();
  G.streak=0;G.combo=1;G.totalWrong++;
  G.attemptsOnCurrent++;
  G.srs[enemy.cmd.id]=srsMiss(G.srs[enemy.cmd.id],G.wave);
  G.typedBuffer='';

  const isQuizMode=activeCartridge&&activeCartridge.inputMode==='quiz';
  const depth=enemy.splitDepth||0;
  // Hydra split: depth 0 → subconcepts (depth 1), depth 1 → sub-subconcepts (depth 2)
  if(isQuizMode&&depth<2){
    const didSplit=spawnHydraChildren(enemy);
    if(didSplit){SFX.split();flash(depth===0?'SPLIT! \u26a1':'FRACTURE! \u26a1\u26a1',depth===0?'#4488ff':'#aa44ff');return}
  }
  // Fallback: speed up (depth 2 grandchildren, non-quiz, or split failed)
  enemy.speedMult=(enemy.speedMult||1)*1.5;
  if(activeCartridge&&activeCartridge.inputMode==='prefix-key')G.inputState='await_prefix';
  flash('MISS! \u26a1FASTER','#ff4422');
  setTimeout(focusTypedInput,50);
}

// ═══════════════════════════════════════════════
//  HYDRA SPLIT
// ═══════════════════════════════════════════════
function spawnHydraChildren(parentEnemy){
  const cmd=parentEnemy.cmd;
  const depth=(parentEnemy.splitDepth||0)+1;
  if(G.enemies.length>20)return false;

  const parentPos=enemyMeshes[parentEnemy.id]?.position.clone();
  const explColor=depth>=2?0xaa44ff:0x4488ff;
  spawnExplosion(parentPos||pathPts[0],depth>=2?10:15,explColor);
  removeEnemyMesh(parentEnemy.id);
  G.enemies=G.enemies.filter(e=>e.id!==parentEnemy.id);

  if(depth===1){
    // Depth 1: subconcept children (blue)
    const subs=cmd.subconcepts;
    if(!subs||subs.length===0)return false;
    const count=Math.min(3,subs.length);
    const picked=shuffleArr(subs).slice(0,count);
    picked.forEach((sc,i)=>{
      const childT=Math.max(0,parentEnemy.t-0.03*(i+1));
      const options=shuffleArr([sc.correct,...sc.wrong]);
      const correctIdx=options.indexOf(sc.correct);
      const child={
        id:++G.nextEnemyId,cmd:cmd,t:childT,spawned:Date.now(),
        speedMult:.75,isChild:true,splitDepth:1,
        subconcept:sc,
        question:{type:'subconcept',text:sc.q,options:options,correctIdx:correctIdx,correctKey:['a','b','c'][correctIdx]},
        label:'\u26a1 Sub-concept'
      };
      G.enemies.push(child);
      addChildEnemyMesh(child,i);
    });
  }else if(depth===2){
    // Depth 2: sub-subconcept grandchildren (purple) — binary A/B choice
    // Auto-generated from the parent subconcept's correct answer
    const sc=parentEnemy.subconcept;
    if(!sc)return false;
    const count=2;
    for(let i=0;i<count;i++){
      const childT=Math.max(0,parentEnemy.t-0.02*(i+1));
      // Binary question: "Is this true about [topic]?"
      const wrongPick=sc.wrong[i%sc.wrong.length];
      const statements=shuffleArr([sc.correct,wrongPick]);
      const correctIdx=statements.indexOf(sc.correct);
      const child={
        id:++G.nextEnemyId,cmd:cmd,t:childT,spawned:Date.now(),
        speedMult:.5,isChild:true,splitDepth:2,
        subconcept:sc,
        question:{type:'subconcept',text:sc.q+' (True or false?)',options:statements,correctIdx:correctIdx,correctKey:['a','b'][correctIdx]},
        label:'\u26a1\u26a1 Deep concept'
      };
      G.enemies.push(child);
      addChildEnemyMesh(child,i);
    }
  }
  if(G.selectedId===parentEnemy.id){G.selectedId=null;G.inputState='idle'}
  return true;
}

// ═══════════════════════════════════════════════
//  INPUT HANDLER
// ═══════════════════════════════════════════════
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&MUSIC_EDITOR.open){
    e.preventDefault();
    closeMusicEditor();
    return;
  }
  if(e.key==='Escape'&&G.screen==='game'){
    e.preventDefault();
    G.paused=false;
    returnToTitleFromRun();
    return;
  }
  // P to pause/unpause during gameplay
  if((e.key==='p'||e.key==='P')&&G.screen==='game'&&!G.waveComplete){
    e.preventDefault();
    G.paused=!G.paused;
    if(G.paused)showPauseScreen();
    else resumeFromPause();
    return;
  }
  // Block all input while paused
  if(G.paused)return;

  // Spacebar universal advance on non-game screens + wave-clear
  if(!MUSIC_EDITOR.open&&e.key===' '&&(G.screen!=='game'||G.waveComplete)){
    const btn=document.querySelector('#overlay .btn')||document.querySelector('#input-panel .btn');
    if(btn){e.preventDefault();btn.click();return}
  }

  if(MODKEYS.has(e.key))return;
  if(G.screen!=='game')return;

  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;

  // Tab: deep concepts → only deep. subconcepts → only subconcepts. else → parents only.
  if(e.key==='Tab'&&enemy){
    e.preventDefault();
    const deep=G.enemies.filter(en=>en.splitDepth>=2);
    const subs=G.enemies.filter(en=>en.splitDepth===1);
    const pool=deep.length>0?deep.sort((a,b)=>b.t-a.t):subs.length>0?subs.sort((a,b)=>b.t-a.t):[...G.enemies].sort((a,b)=>b.t-a.t);
    const idx=pool.findIndex(en=>en.id===G.selectedId);
    G.selectedId=pool[(idx+1)%pool.length].id;
    const im2=activeCartridge?activeCartridge.inputMode:'prefix-key';
    G.inputState=im2==='prefix-key'?'await_prefix':im2==='quiz'?'quiz':'typing';
    G.showHint=false;G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    SFX.select();
    setTimeout(()=>{if(im2==='quiz')focusBlankInput();else focusTypedInput()},50);
    return;
  }
  // Alt+H hint — works in all modes
  if(e.key==='h'&&e.altKey){e.preventDefault();G.showHint=true;G.hintUsed=true;return}

  if(!enemy)return;

  const mode=activeCartridge?activeCartridge.inputMode:'prefix-key';

  if(mode==='quiz'){
    // Quiz mode keyboard handling
    const q=enemy.question;
    if(!q)return;

    if(q.type==='identify'){
      const k=e.key.toLowerCase();
      if(['a','b','c','d'].includes(k)){
        // Block eliminated choice
        const idx=['a','b','c','d'].indexOf(k);
        if(G.showHint&&q.eliminatedIdx===idx)return;
        e.preventDefault();
        handleQuizChoice(k);
      }
    }else if(q.type==='fillblank'){
      const k=e.key.toLowerCase();
      if(['a','b','c'].includes(k)){
        const idx=['a','b','c'].indexOf(k);
        if(G.showHint&&q.eliminatedIdx===idx)return;
        e.preventDefault();
        handleHintChoice(k);
      }
    }else if(q.type==='subconcept'){
      const k=e.key.toLowerCase();
      if(['a','b','c'].includes(k)){
        const idx=['a','b','c'].indexOf(k);
        if(G.showHint&&q.eliminatedIdx===idx)return;
        e.preventDefault();
        handleSubconceptChoice(k);
      }
    }
  }else if(mode==='prefix-key'){
    e.preventDefault();
    if(G.inputState==='await_prefix'){
      if(e.ctrlKey&&e.key==='b'){G.inputState='await_command';SFX.prefix()}
      return;
    }
    if(G.inputState==='await_command'){
      if(e.key===enemy.cmd.key){
        handleHit(enemy);
      }else{
        handleMiss(enemy);
      }
    }
  }else if(mode==='typed'){
    // If input exists but isn't focused, redirect focus and replay the keystroke
    const inp=document.getElementById('typed-input');
    if(inp&&document.activeElement!==inp){
      inp.focus();
      if(e.key.length===1&&!e.ctrlKey&&!e.altKey&&!e.metaKey){
        e.preventDefault();
        inp.value+=e.key;
        G.typedBuffer=inp.value;
      }
    }
    if(e.key==='Enter'){
      e.preventDefault();
      const val=inp?inp.value:G.typedBuffer;
      if(val.trim()==='')return;
      if(activeCartridge.validate(val,enemy.cmd.key,enemy.cmd).correct){
        handleHit(enemy);
      }else{
        handleMiss(enemy);
        if(inp)inp.value='';
      }
      return;
    }
    if(inp&&e.target===inp){
      requestAnimationFrame(()=>{
        if(document.getElementById('typed-input'))G.typedBuffer=document.getElementById('typed-input').value;
      });
    }
  }
});

//  TOUCH SUPPORT

document.addEventListener('touchmove',function(e){if(e.touches.length>1)e.preventDefault()},{passive:false});
let lastTouchEnd=0;
document.addEventListener('touchend',function(e){const now=Date.now();if(now-lastTouchEnd<300)e.preventDefault();lastTouchEnd=now},{passive:false});
// Swipe to cycle enemies
let touchStartX=0,touchStartTime=0;
canvas.addEventListener('touchstart',function(e){if(G.screen!=='game'||G.paused)return;touchStartX=e.touches[0].clientX;touchStartTime=Date.now()},{passive:true});
canvas.addEventListener('touchend',function(e){
  if(G.screen!=='game'||G.paused||G.enemies.length<2)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dt=Date.now()-touchStartTime;
  if(Math.abs(dx)>50&&dt<400){
    const deep=G.enemies.filter(en=>en.splitDepth>=2);
    const subs=G.enemies.filter(en=>en.splitDepth===1);
    const pool=deep.length>0?deep.sort((a,b)=>b.t-a.t):subs.length>0?subs.sort((a,b)=>b.t-a.t):[...G.enemies].sort((a,b)=>b.t-a.t);
    const idx=pool.findIndex(en=>en.id===G.selectedId);
    const dir=dx>0?1:-1;
    G.selectedId=pool[((idx+dir)%pool.length+pool.length)%pool.length].id;
    G.inputState='quiz';G.showHint=false;G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    SFX.select();lastInputState='';
  }
},{passive:true});

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
let lastTime=0;
function animate(time){
  requestAnimationFrame(animate);
  const dt=time-lastTime;lastTime=time;

  // Camera: follow selected enemy with smooth lerp
  const selEnemy=G.selectedId?enemyMeshes[G.selectedId]:null;
  const selEnemyObj=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(selEnemy&&G.screen==='game'){
    const sd=selEnemyObj?.splitDepth||0;
    const port=isPortrait();
    const pY=port?1.4:1,pZ=port?1.3:1,pT=port?.6:1;
    const zoomY=(sd>=2?7:sd>=1?9:11)*pY;
    const zoomZ=(sd>=2?8:sd>=1?10:12)*pZ;
    const trackX=(sd>=2?.6:sd>=1?.5:.4)*pT;
    const trackZ=(sd>=2?.5:sd>=1?.4:.3)*pT;
    const tx=selEnemy.position.x*trackX+Math.sin(time*.0002)*.1;
    const tz=selEnemy.position.z*trackZ+zoomZ;
    const ty=zoomY+Math.sin(time*.0003)*.1;
    camera.position.x+=(tx-camera.position.x)*.04;
    camera.position.y+=(ty-camera.position.y)*.04;
    camera.position.z+=(tz-camera.position.z)*.04;
    const lx=selEnemy.position.x*(trackX+.1);
    const lz=selEnemy.position.z*(trackZ+.1)-1;
    camera.lookAt(lx,0,lz);
  }else{
    // Default orbit
    const orbY=isPortrait()?22:18;
    const orbZ=isPortrait()?18:14;
    camera.position.x+=(Math.sin(time*.0002)*.3-camera.position.x)*.05;
    camera.position.y+=(orbY+Math.sin(time*.0003)*.2-camera.position.y)*.05;
    camera.position.z+=(orbZ-camera.position.z)*.05;
    camera.lookAt(0,0,-1);
  }

  serverLight.intensity=1.5+Math.sin(time*.003)*.3;
  sTop.rotation.y=time*.001;
  ant.material.color.setHex(Math.sin(time*.005)>.3?AMB.glow:AMB.mid);

  spawnMark.material.opacity=.2+Math.sin(time*.004)*.2;
  spawnMark.rotation.y=time*.002;

  if(G.screen==='game'&&!G.paused){
    trySpawn(time);moveEnemies();checkBreach();checkWaveComplete();autoSelect();
    updateEnemyMeshes();updateLabels();updateHUD();updateInput();updateQueue();
    SFX.setKey(G.wave);
    // Evolve pad: only count main formula enemies (not sub/deep children)
    if(G.waveCommands.length>0){
      const mainEnemies=G.enemies.filter(e=>!e.splitDepth||e.splitDepth===0).length;
      const unspawned=G.waveCommands.length-G.spawnIdx;
      const mainRemaining=mainEnemies+unspawned;
      SFX.setProgress(Math.max(0,1-mainRemaining/G.waveCommands.length));
    }
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.add(p.vel);
    p.vel.y-=.005;
    p.life-=p.decay;
    p.mesh.material.opacity=p.life;
    p.mesh.scale.setScalar(p.life);
    if(p.life<=0){scene.remove(p.mesh);p.mesh.material.dispose();particles.splice(i,1)}
  }
  for(let i=beams.length-1;i>=0;i--){
    const b=beams[i];b.life-=b.decay;b.line.material.opacity=b.life;
    if(b.life<=0){scene.remove(b.line);b.line.material.dispose();b.line.geometry.dispose();beams.splice(i,1)}
  }

  renderer.render(scene,camera);
}
requestAnimationFrame(animate);

// ═══════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════
function isPortrait(){return window.innerHeight>window.innerWidth}
function handleResize(){
  const w=window.innerWidth,h=window.visualViewport?window.visualViewport.height:window.innerHeight;
  camera.aspect=w/h;
  camera.fov=isPortrait()?65:50;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize',handleResize);
window.addEventListener('orientationchange',()=>setTimeout(handleResize,150));
if(window.visualViewport)window.visualViewport.addEventListener('resize',handleResize);
