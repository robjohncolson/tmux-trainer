const AMB={
  black:0x0d0500, darkest:0x1a0800, dark:0x2d1200, mid:0x5a2800,
  bright:0xcc6600, hot:0xff8c00, glow:0xffaa22, white:0xffcc66,

// ═══════════════════════════════════════════════
//  SOUND ENGINE
// ═══════════════════════════════════════════════
const SFX=(()=>{
  let ctx=null,muted=false,masterGain=null,bgmPlaying=false,bgmNodes=null;
  function getCtx(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();masterGain=ctx.createGain();masterGain.gain.value=1;masterGain.connect(ctx.destination)}if(ctx.state==='suspended')ctx.resume();return ctx}
  function out(){getCtx();return masterGain}
  function makeDistCurve(a=50){const n=256,c=new Float32Array(n);for(let i=0;i<n;i++){const x=(i*2)/n-1;c[i]=((3+a)*x*20*(Math.PI/180))/(Math.PI+a*Math.abs(x))}return c}
  function tone(f,d,type='square',v=.12,del=0,ff=0){if(muted)return;const c=getCtx(),t=c.currentTime+del,o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);if(ff>0){const fl=c.createBiquadFilter();fl.type='lowpass';fl.frequency.value=ff;fl.Q.value=2;g.connect(fl);fl.connect(out())}else g.connect(out());o.start(t);o.stop(t+d)}
  function sweep(sf,ef,d,type='sawtooth',v=.15,del=0){if(muted)return;const c=getCtx(),t=c.currentTime+del,o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(sf,t);o.frequency.exponentialRampToValueAtTime(Math.max(ef,1),t+d);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(out());o.start(t);o.stop(t+d)}
  function noiseBurst(d,v=.12,del=0,hi=3000,lo=200){if(muted)return;const c=getCtx(),t=c.currentTime+del,len=Math.floor(c.sampleRate*d),buf=c.createBuffer(1,len,c.sampleRate),da=buf.getChannelData(0);for(let i=0;i<len;i++)da[i]=Math.random()*2-1;const s=c.createBufferSource();s.buffer=buf;const g=c.createGain();g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=hi;const eq=c.createBiquadFilter();eq.type='peaking';eq.frequency.value=lo;eq.gain.value=12;eq.Q.value=.7;s.connect(g);g.connect(lp);lp.connect(eq);eq.connect(out());s.start(t)}
  function crunch(f,d,v=.1,del=0){if(muted)return;const c=getCtx(),t=c.currentTime+del,o=c.createOscillator(),g=c.createGain(),ws=c.createWaveShaper();ws.curve=makeDistCurve(80);ws.oversample='4x';o.type='sawtooth';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(Math.max(f*.3,20),t+d);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(ws);ws.connect(g);g.connect(out());o.start(t);o.stop(t+d)}
  function subBass(f,d,v=.2,del=0){if(muted)return;const c=getCtx(),t=c.currentTime+del,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(20,t+d);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=150;o.connect(g);g.connect(lp);lp.connect(out());o.start(t);o.stop(t+d)}
  function startBGM(){if(bgmPlaying||muted)return;const c=getCtx();bgmPlaying=true;const bm=c.createGain();bm.gain.value=.06;bm.connect(out());const bg=c.createGain();bg.gain.value=.6;bg.connect(bm);const bo=c.createOscillator();bo.type='sawtooth';const bf=c.createBiquadFilter();bf.type='lowpass';bf.frequency.value=350;bf.Q.value=4;bo.connect(bf);bf.connect(bg);const notes=[55,55,65.41,73.42,55,55,82.41,73.42],st=.25,ll=notes.length*st;function sched(base){notes.forEach((f,i)=>bo.frequency.setValueAtTime(f,base+i*st))}const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=.3;const lg=c.createGain();lg.gain.value=120;lfo.connect(lg);lg.connect(bf.frequency);lfo.start();const pg=c.createGain();pg.gain.value=.25;pg.connect(bm);const pf=c.createBiquadFilter();pf.type='lowpass';pf.frequency.value=700;const po=[220,261.63,329.63].map(f=>{const o=c.createOscillator();o.type='triangle';o.frequency.value=f;o.detune.value=(Math.random()-.5)*10;o.connect(pf);return o});pf.connect(pg);const pl=c.createOscillator();pl.type='sine';pl.frequency.value=.08;const plg=c.createGain();plg.gain.value=350;pl.connect(plg);plg.connect(pf.frequency);pl.start();const hg=c.createGain();hg.gain.value=0;hg.connect(bm);const hl=Math.floor(c.sampleRate*2),hb=c.createBuffer(1,hl,c.sampleRate),hd=hb.getChannelData(0);for(let i=0;i<hl;i++)hd[i]=Math.random()*2-1;const hs=c.createBufferSource();hs.buffer=hb;hs.loop=true;const hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;hs.connect(hp);hp.connect(hg);const now=c.currentTime;bo.start(now);po.forEach(o=>o.start(now));hs.start(now);let lc=0;function loop(){if(!bgmPlaying)return;const b=now+lc*ll;sched(b);for(let i=0;i<notes.length;i++){if(i%2===0){const ht=b+i*st;hg.gain.setValueAtTime(.4,ht);hg.gain.exponentialRampToValueAtTime(.01,ht+.05)}}lc++;if(lc<600)setTimeout(loop,ll*1000*.8)}loop();bgmNodes={bm,bo,po,hs,lfo,pl}}
  function stopBGM(){if(!bgmNodes)return;bgmPlaying=false;try{bgmNodes.bm.gain.setValueAtTime(bgmNodes.bm.gain.value,ctx.currentTime);bgmNodes.bm.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);setTimeout(()=>{try{bgmNodes.bo.stop();bgmNodes.po.forEach(o=>o.stop());bgmNodes.hs.stop();bgmNodes.lfo.stop();bgmNodes.pl.stop()}catch(e){}bgmNodes=null},600)}catch(e){bgmNodes=null}}
  return{
    toggleMute(){muted=!muted;if(muted)stopBGM();return muted},isMuted(){return muted},startBGM,stopBGM,
    prefix(){tone(1100,.04,'square',.08);tone(1650,.06,'square',.06,.03)},
    hit(intensity=1){const v=.1+intensity*.08;subBass(80,.4,v);noiseBurst(.25,.1+intensity*.06,0,2000,120);crunch(300,.15,.06+intensity*.04,.02);sweep(800,100,.2,'sawtooth',.05+intensity*.03,.01);for(let i=0;i<2+Math.floor(intensity*3);i++)tone(1200+Math.random()*1200,.04+Math.random()*.04,'square',.03,.06+i*.04)},
    miss(){crunch(120,.3,.12);sweep(300,60,.25,'sawtooth',.1,.02);noiseBurst(.1,.06,.05,800,80)},
    breach(){subBass(60,.6,.25);noiseBurst(.5,.2,0,1500,80);crunch(200,.35,.15,.05);sweep(500,30,.5,'sawtooth',.12);tone(600,.12,'square',.06,.1);tone(400,.15,'square',.06,.2)},
    waveClear(){subBass(55,.3,.1);[523,659,784,1047,1318].forEach((f,i)=>{tone(f,.18,'square',.08,i*.07);tone(f*1.005,.18,'sawtooth',.03,i*.07)});sweep(200,2000,.4,'sawtooth',.04,.1)},
    victory(){subBass(55,.5,.12);[523,659,784,1047,1318,1568,2093].forEach((f,i)=>{tone(f,.25,'square',.07,i*.09);tone(f*.995,.25,'triangle',.04,i*.09)});sweep(300,3000,.6,'sawtooth',.04,.2)},
    gameOver(){stopBGM();subBass(50,.8,.2);[400,320,250,160,100].forEach((f,i)=>{crunch(f,.35,.08,i*.14);tone(f,.3,'sawtooth',.06,i*.14)});noiseBurst(1,.08,.6,1000,50)},
    spawn(){tone(165,.1,'triangle',.04);sweep(400,165,.08,'square',.02)},
    select(){tone(1400,.03,'square',.06);noiseBurst(.02,.03,0,8000,2000)},
    click(){tone(1000,.04,'square',.06);tone(1500,.03,'square',.04,.02)},
    combo(){sweep(600,1600,.15,'square',.06);tone(1600,.1,'triangle',.04,.08)}
  }
})();

// --- Multiplication cartridge (generated, typed) ---
function mulTier(a,b){
  if(a===b)return'core';
  if([1,2,5,10].includes(a)||[1,2,5,10].includes(b))return'core';
  if(a>=10||b>=10)return'power';
  return'regular';
}
function mulHint(a,b){
  if(a===b)return a+' squared';
  if(b===9)return a+'\u00d710 = '+(a*10)+', minus '+a;
  if(b===11)return a+'\u00d710 = '+(a*10)+', plus '+a;
  return a+'\u00d7'+(b-1)+' = '+(a*(b-1))+', plus '+a;
}
function genMultiplicationPool(){
  const items=[];
  for(let a=1;a<=12;a++){
    for(let b=a;b<=12;b++){
      items.push({
        id:'mul-'+a+'x'+b,
        action:a+' \u00d7 '+b,
        key:String(a*b),
        tier:mulTier(a,b),
        dom:a+'s',
        hint:mulHint(a,b),
      });
    }
  }
  return items;
}

const multiplicationCartridge={

// ═══════════════════════════════════════════════
//  SRS — Enhanced with time + attempts
// ═══════════════════════════════════════════════
function initSRS(cmds){const s={};(cmds||COMMANDS).forEach(c=>{s[c.id]={ease:2.5,interval:0,streak:0,correct:0,wrong:0,lastSeen:0,mastery:0,avgTimeMs:0,totalAttempts:0}});return s}
function srsHit(card,wave,timeMs,usedHint,attempts){
  const c={...card};c.correct++;c.streak++;c.lastSeen=wave;
  c.avgTimeMs=c.totalAttempts>0?(c.avgTimeMs*c.totalAttempts+timeMs)/(c.totalAttempts+1):timeMs;
  c.totalAttempts++;
  let q=5;
  if(timeMs>6000)q-=2;else if(timeMs>4000)q-=1.5;else if(timeMs>2500)q-=0.5;
  if(timeMs<1500)q=Math.min(5,q+0.5);
  if(usedHint)q-=2;
  if(attempts>1)q-=Math.min(2,attempts-1);
  q=Math.max(0,Math.min(5,q));
  c.ease=Math.max(1.3,card.ease+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  if(card.interval===0)c.interval=1;
  else if(card.interval===1)c.interval=3;
  else c.interval=Math.round(card.interval*c.ease);
  c.interval=Math.min(c.interval,20);
  const fastEnough=c.avgTimeMs<3000;
  const veryFast=c.avgTimeMs<1800;
  if(c.streak>=8&&c.ease>=2.2&&veryFast)c.mastery=5;
  else if(c.streak>=5&&c.ease>=2.0&&fastEnough)c.mastery=4;
  else if(c.streak>=3&&c.ease>=1.8)c.mastery=3;
  else if(c.streak>=2)c.mastery=2;
  else if(c.streak>=1)c.mastery=Math.max(c.mastery,1);
  return c;
}
function srsMiss(card,wave){
  const c={...card};c.wrong++;c.streak=0;c.lastSeen=wave;c.interval=0;
  c.ease=Math.max(1.3,card.ease-.2);c.mastery=Math.max(0,card.mastery-1);
  c.totalAttempts++;return c;
}
function pickCommands(pool,srs,count,wave){
  const due=[],overdue=[],fresh=[],notDue=[];
  pool.forEach(cmd=>{const s=srs[cmd.id],ws=wave-s.lastSeen;
    if(s.lastSeen===0&&s.correct===0)fresh.push(cmd);
    else if(ws>=s.interval+2)overdue.push(cmd);
    else if(ws>=s.interval)due.push(cmd);
    else notDue.push(cmd)});
  const picked=[],used=new Set();
  function add(c){if(used.has(c.id))return false;picked.push(c);used.add(c.id);return true}
  overdue.sort((a,b)=>srs[a.id].mastery-srs[b.id].mastery);overdue.forEach(c=>{if(picked.length<count)add(c)});
  due.sort((a,b)=>srs[a.id].mastery-srs[b.id].mastery);due.forEach(c=>{if(picked.length<count)add(c)});
  const maxNew=Math.min(3,Math.max(1,Math.floor(count*.3)));let na=0;
  for(const c of fresh){if(picked.length>=count||na>=maxNew)break;if(add(c))na++}
  notDue.sort((a,b)=>srs[a.id].mastery-srs[b.id].mastery);notDue.forEach(c=>{if(picked.length<count)add(c)});
  pool.forEach(c=>{if(picked.length<count)add(c)});
  for(let i=picked.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[picked[i],picked[j]]=[picked[j],picked[i]]}
  return picked.slice(0,count);
}

function saveSRS(){
  if(!activeCartridge)return;
  try{localStorage.setItem('td-srs-'+activeCartridge.id,JSON.stringify(G.srs))}catch(e){}
}
function loadSRS(cartridge){
  const saved=localStorage.getItem('td-srs-'+cartridge.id);
  const fresh=initSRS(cartridge.commands);
  if(!saved)return fresh;
  try{
    const parsed=JSON.parse(saved);
    for(const id of Object.keys(fresh)){
      if(parsed[id])fresh[id]={...fresh[id],...parsed[id]};
    }
    return fresh;
  }catch(e){return fresh}
}
function getCartridgeProgress(cartridgeId){
  const saved=localStorage.getItem('td-srs-'+cartridgeId);
  if(!saved)return{total:0,seen:0,mastered:0};
  try{
    const srs=JSON.parse(saved);
    const entries=Object.values(srs);
    return{
      total:entries.length,
      seen:entries.filter(s=>s.totalAttempts>0).length,
      mastered:entries.filter(s=>s.mastery>=4).length,
    };
  }catch(e){return{total:0,seen:0,mastered:0}}
}

    const prefix=activeCartridge?activeCartridge.prefixLabel:'C-b';
    let html='<div class="prompt-label">TARGET COMMAND:</div><div class="prompt-text">'+cmd.action+'</div>';
    html+='<div class="input-boxes"><div class="input-box '+(isPre?'active':isCmd?'done':'')+'">'+(isCmd?prefix+' \u2713':prefix)+'</div><span style="color:'+AMB.css.mid+';font-size:16px">\u2192</span><div class="input-box '+(isCmd?'active':'')+'\">'+(isCmd?'?':'\u00b7\u00b7\u00b7')+'</div></div>';
    if(G.showHint)html+='<div class="hint-text">\ud83d\udca1 '+cmd.hint+' \u2014 Answer: <span style="color:'+AMB.css.white+'">'+prefix+' '+activeCartridge.formatAnswer(cmd)+'</span></div>';
    html+='<div class="input-help" style="color:'+AMB.css.mid+';opacity:.5">Tab = switch \u00b7 Alt+H = hint</div>';
    panel.innerHTML=html;
  }
}

function focusTypedInput(){
  const inp=document.getElementById('typed-input');
  if(inp)inp.focus();
}

function updateQueue(){
  const bar=document.getElementById('queue-bar');
  if(G.waveComplete||G.waveCommands.length===0){bar.style.display='none';return}
  bar.style.display='block';
  let html='INCOMING: ';
  G.waveCommands.slice(G.spawnIdx).forEach(c=>{html+='<span class="q-dot" style="background:'+AMB.css.hot+'" title="'+c.action+'"></span>'});
  if(G.spawnIdx>=G.waveCommands.length)html+='<span style="opacity:.4">all spawned</span>';
  bar.innerHTML=html;
}
function updateTierBar(){
  const tiers=['core','regular','power'];
  const bar=document.getElementById('tier-bar');
  bar.innerHTML=tiers.map(t=>'<span style="color:'+(G.unlockedTiers.includes(t)?AMB.css.hot:AMB.css.dark)+';margin:0 6px">\u25a0 '+t.toUpperCase()+(G.unlockedTiers.includes(t)?'':' \ud83d\udd12')+'</span>').join('');
}

// ═══════════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════════
function showSelectScreen(){
  G.screen='select';
  // Clean up any lingering enemy meshes
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  G.enemies=[];G.selectedId=null;
  SFX.stopBGM();
  document.getElementById('hud').style.display='none';
  document.getElementById('tier-bar').style.display='none';
  document.getElementById('input-panel').style.display='none';
  document.getElementById('queue-bar').style.display='none';
  labelsDiv.innerHTML='';
  const ov=document.getElementById('overlay');ov.classList.remove('hidden');
  let html='<h1 style="font-size:36px;letter-spacing:8px">TOWER DEFENSE</h1><h2 style="letter-spacing:6px">TRAINER</h2>';
  html+='<div class="cart-grid">';
  CARTRIDGES.forEach(c=>{
    const prog=getCartridgeProgress(c.id);
    const totalItems=c.commands.length;
    const dots=5;
    const filledDots=totalItems>0?Math.round((prog.mastered/totalItems)*dots):0;
    html+='<div class="cart-card" onclick="selectCartridge(\''+c.id+'\')">';
    html+='<div class="cart-icon">'+c.icon+'</div>';
    html+='<div class="cart-name">'+c.name+'</div>';
    html+='<div class="cart-desc">'+c.description+'</div>';
    html+='<div class="cart-progress">';
    for(let i=0;i<dots;i++){
      html+='<div class="cart-dot'+(i<filledDots?' filled':'')+'"></div>';
    }
    html+='</div>';
    if(prog.seen>0)html+='<div style="font-size:8px;color:#5a3800;margin-top:4px">'+prog.seen+'/'+totalItems+' seen</div>';
    html+='</div>';
  });
  html+='</div>';
  ov.innerHTML=html;
}

function selectCartridge(id){
  SFX.click();
  activeCartridge=CARTRIDGES.find(c=>c.id===id);
  COMMANDS=activeCartridge.commands;
  showTitleScreen();
}

function showTitleScreen(){
  G.screen='title';
  const ov=document.getElementById('overlay');ov.classList.remove('hidden');
  let html='<h1>'+activeCartridge.title+'</h1>';
  html+='<h2>'+activeCartridge.subtitle+'</h2>';
  html+='<p class="desc">'+activeCartridge.instructions+'</p>';
  if(activeCartridge.instructionsSub)html+='<p class="desc" style="font-size:10px;color:#5a3800">'+activeCartridge.instructionsSub+'</p>';
  html+='<button class="btn" id="btn-start">'+activeCartridge.startButton+'</button>';
  html+='<div class="sub" style="margin-top:16px"><a href="#" onclick="event.preventDefault();showSelectScreen()" style="color:#5a3800;text-decoration:none;font-size:10px;letter-spacing:2px">\u2190 BACK TO MENU</a></div>';
  // Reset progress link
  const prog=getCartridgeProgress(activeCartridge.id);
  if(prog.seen>0){
    html+='<div style="margin-top:12px"><a href="#" onclick="event.preventDefault();resetProgress()" style="color:#3d1f00;text-decoration:none;font-size:9px;letter-spacing:1px">Reset Progress</a></div>';
  }
  ov.innerHTML=html;
  document.getElementById('btn-start').onclick=startGame;
}

function resetProgress(){
  if(!activeCartridge)return;
  if(confirm('Reset all progress for '+activeCartridge.name+'? This cannot be undone.')){
    localStorage.removeItem('td-srs-'+activeCartridge.id);
    SFX.click();
    showTitleScreen();
  }
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function genWave(n){
  const tiers=n>=7?['core','regular','power']:n>=4?['core','regular']:['core'];
  G.unlockedTiers=tiers;
  const pool=COMMANDS.filter(c=>tiers.includes(c.tier));
  return pickCommands(pool,G.srs,Math.min(4+n,16),n);
}
function startGame(){
  SFX.stopBGM();SFX.click();setTimeout(()=>SFX.startBGM(),300);
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  Object.assign(G,{screen:'game',wave:1,score:0,lives:BASE_LIVES,streak:0,maxStreak:0,
    srs:loadSRS(activeCartridge),enemies:[],selectedId:null,inputState:'idle',hintUsed:false,showHint:false,
    spawnIdx:0,waveComplete:false,totalCorrect:0,totalWrong:0,combo:1,
    unlockedTiers:['core'],attemptsOnCurrent:0,commandStartTime:0,typedBuffer:''});
  G.waveCommands=genWave(1);
  lastSpawnTime=0;
  lastInputState='';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').style.display='flex';
  document.getElementById('tier-bar').style.display='block';
  document.getElementById('input-panel').style.display='block';
  document.getElementById('queue-bar').style.display='block';
  updateTierBar();
}
function nextWave(){
  SFX.click();
  saveSRS();
  const nw=G.wave+1;
  if(nw>12){SFX.stopBGM();SFX.victory();showEndScreen(true);return}
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  Object.assign(G,{wave:nw,enemies:[],selectedId:null,inputState:'idle',spawnIdx:0,
    waveComplete:false,hintUsed:false,showHint:false,attemptsOnCurrent:0,typedBuffer:''});
  G.waveCommands=genWave(nw);
  lastSpawnTime=0;
  lastInputState='';
  updateTierBar();
}
function showEndScreen(victory){
  G.screen=victory?'victory':'gameover';
  saveSRS();
  // Clean up surviving enemies
  G.enemies.forEach(e=>removeEnemyMesh(e.id));
  G.enemies=[];G.selectedId=null;
  document.getElementById('hud').style.display='none';
  document.getElementById('tier-bar').style.display='none';
  document.getElementById('input-panel').style.display='none';
  document.getElementById('queue-bar').style.display='none';
  labelsDiv.innerHTML='';
  const ov=document.getElementById('overlay');ov.classList.remove('hidden');
  const acc=G.totalCorrect+G.totalWrong>0?Math.round(G.totalCorrect/(G.totalCorrect+G.totalWrong)*100):0;
  const seen=Object.entries(G.srs).filter(([,v])=>v.correct+v.wrong>0);
  const mc=[0,0,0,0,0,0];seen.forEach(([,v])=>mc[v.mastery]++);
  const weak=seen.sort(([,a],[,b])=>(a.mastery-b.mastery)||(b.wrong-a.wrong)).slice(0,4).filter(([,v])=>v.mastery<4).map(([id])=>COMMANDS.find(c=>c.id===id));
  const isPrefix=activeCartridge&&activeCartridge.inputMode==='prefix-key';
  let html='<h1 style="font-size:32px;color:'+(victory?AMB.css.hot:'#ff4422')+'">'+(victory?'SERVER SECURED':'SERVER BREACHED')+'</h1>';
  html+='<div class="stats-grid">'+[['SCORE',G.score.toLocaleString()],['WAVE',G.wave+'/12'],['ACCURACY',acc+'%'],['STREAK',G.maxStreak]].map(([l,v])=>'<div class="stat-box"><div class="sl">'+l+'</div><div class="sv">'+v+'</div></div>').join('')+'</div>';
  if(seen.length>0){
    html+='<div style="width:100%;max-width:360px"><div class="sl" style="text-align:center;margin-bottom:4px">MASTERY</div><div class="mastery-bar">'+mc.map((n,i)=>n>0?'<div style="flex:'+n+';background:'+MASTERY_COLORS[i]+';opacity:'+(0.5+i*0.1)+'"></div>':'').join('')+'</div><div class="mastery-legend">'+MASTERY_LABELS.map((l,i)=>mc[i]>0?'<span style="color:'+MASTERY_COLORS[i]+'">'+'\u25a0 '+l+' ('+mc[i]+')</span>':'').join('')+'</div></div>';
  }
  if(weak.length>0){
    html+='<div style="width:100%;max-width:360px;margin-bottom:12px"><div class="sl" style="text-align:center;color:#ff6b35;margin-bottom:4px">FOCUS NEXT SESSION</div>'+weak.map(c=>{
      if(!c)return'';
      const answerDisplay=isPrefix?(activeCartridge.prefixLabel+' '+activeCartridge.formatAnswer(c)):activeCartridge.formatAnswer(c);
      const promptDisplay=activeCartridge.formatPrompt(c);
      return'<div class="weak-item"><span><span style="color:#ff6b35;font-weight:700">'+answerDisplay+'</span> \u2192 '+promptDisplay+'</span><span style="font-size:9px;color:'+MASTERY_COLORS[G.srs[c.id].mastery]+'">'+MASTERY_LABELS[G.srs[c.id].mastery]+(G.srs[c.id].avgTimeMs>0?' \u00b7 '+Math.round(G.srs[c.id].avgTimeMs/1000*10)/10+'s':'')+'</span></div>';
    }).join('')+'</div>';
  }
  html+='<button class="btn" onclick="startGame()">[ REDEPLOY ]</button>';
  html+='<div class="sub" style="margin-top:8px"><a href="#" onclick="event.preventDefault();showSelectScreen()" style="color:#5a3800;text-decoration:none;font-size:10px;letter-spacing:2px">\u2190 BACK TO MENU</a></div>';
  ov.innerHTML=html;
}

// ── Spawning ──
let lastSpawnTime=0;
function trySpawn(now){
  if(G.screen!=='game'||G.waveComplete||G.spawnIdx>=G.waveCommands.length)return;
  const delay=G.spawnIdx===0?1500:Math.max(SPAWN_DELAY_BASE-G.wave*150,2500);
  if(now-lastSpawnTime<delay)return;
  const cmd=G.waveCommands[G.spawnIdx];
  const enemy={id:++G.nextEnemyId,cmd,t:0,spawned:Date.now()};
  G.enemies.push(enemy);
  addEnemyMesh(enemy);
  G.spawnIdx++;lastSpawnTime=now;
  SFX.spawn();
}

// ── Movement ──
function moveEnemies(){
  const speed=MOVE_SPEED_BASE+G.wave*.00015;
  G.enemies.forEach(e=>{e.t+=speed});
}

// ── Breach ──
function checkBreach(){
  const reached=G.enemies.filter(e=>e.t>=1);
  if(reached.length===0)return;
  SFX.breach();
  reached.forEach(e=>{
    spawnExplosion(enemyMeshes[e.id]?.position||pathPts[pathPts.length-1],20,0xff2200);
    removeEnemyMesh(e.id);
    G.srs[e.cmd.id]=srsMiss(G.srs[e.cmd.id],G.wave);
  });
  G.enemies=G.enemies.filter(e=>e.t<1);
  G.lives-=reached.length;G.streak=0;G.combo=1;
  if(G.lives<=0){G.lives=0;SFX.gameOver();showEndScreen(false)}
}

// ── Wave complete ──
function checkWaveComplete(){
  if(G.spawnIdx>=G.waveCommands.length&&G.enemies.length===0&&!G.waveComplete&&G.waveCommands.length>0){
    G.waveComplete=true;SFX.waveClear();
  }
}

// ── Auto-select ──
function autoSelect(){
  if(G.enemies.length>0&&(!G.selectedId||!G.enemies.find(e=>e.id===G.selectedId))){
    const sorted=[...G.enemies].sort((a,b)=>b.t-a.t);
    G.selectedId=sorted[0].id;
    G.inputState=activeCartridge&&activeCartridge.inputMode==='prefix-key'?'await_prefix':'typing';
    G.showHint=false;G.hintUsed=false;G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    focusTypedInput();
  }else if(G.enemies.length===0){G.selectedId=null;G.inputState='idle'}
}

// ── Flash ──
function flash(msg,color){
  const d=document.createElement('div');d.className='flash-msg';d.style.color=color||AMB.css.white;
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(()=>d.remove(),900);
}

// ═══════════════════════════════════════════════
//  HIT / MISS — shared logic
// ═══════════════════════════════════════════════
function handleHit(enemy){
  const responseTime=Date.now()-G.commandStartTime;
  const attempts=G.attemptsOnCurrent+1;
  let speedMult=1;
  if(responseTime<1500)speedMult=2;else if(responseTime<3000)speedMult=1.5;else if(responseTime<5000)speedMult=1.2;
  const totalMult=G.combo*speedMult;
  const pts=Math.floor((100+Math.max(0,50-Math.floor(responseTime/200))-(G.hintUsed?30:0))*totalMult);
  const intensity=Math.min(1,speedMult/2);
  SFX.hit(intensity);
  const ePos=enemyMeshes[enemy.id]?.position.clone()||new THREE.Vector3();
  spawnExplosion(ePos,8+Math.floor(intensity*20),AMB.glow);
  spawnBeam(serverGrp.position.clone().add(new THREE.Vector3(0,3,0)),ePos);
  G.score+=pts;G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);
  if(G.streak===5||G.streak===10||G.streak===15)SFX.combo();
  G.combo=Math.min(G.combo+.25,3);G.totalCorrect++;
  G.srs[enemy.cmd.id]=srsHit(G.srs[enemy.cmd.id],G.wave,responseTime,G.hintUsed,attempts);
  removeEnemyMesh(enemy.id);
  G.enemies=G.enemies.filter(en=>en.id!==enemy.id);
  G.selectedId=null;G.inputState='idle';G.attemptsOnCurrent=0;G.typedBuffer='';
  flash('+'+pts+(speedMult>=1.5?' \u26a1':''),speedMult>=2?AMB.css.white:AMB.css.glow);
}

function handleMiss(enemy){
  SFX.miss();
  G.streak=0;G.combo=1;G.totalWrong++;
  G.attemptsOnCurrent++;
  G.srs[enemy.cmd.id]=srsMiss(G.srs[enemy.cmd.id],G.wave);
  G.typedBuffer='';
  if(activeCartridge&&activeCartridge.inputMode==='prefix-key')G.inputState='await_prefix';
  flash('MISS!','#ff4422');
  // Re-focus typed input after miss
  setTimeout(focusTypedInput,50);
}

// ═══════════════════════════════════════════════
//  INPUT HANDLER
// ═══════════════════════════════════════════════
window.addEventListener('keydown',e=>{
  // Spacebar universal advance on non-game screens + wave-clear
  if(e.key===' '&&(G.screen!=='game'||G.waveComplete)){
    const btn=document.querySelector('#overlay .btn')||document.querySelector('#input-panel .btn');
    if(btn){e.preventDefault();btn.click();return}
  }

  if(MODKEYS.has(e.key))return;
  if(G.screen!=='game')return;

  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;

  // Tab to cycle — works in all modes
  if(e.key==='Tab'&&enemy){
    e.preventDefault();
    const sorted=[...G.enemies].sort((a,b)=>b.t-a.t);
    const idx=sorted.findIndex(en=>en.id===G.selectedId);
    G.selectedId=sorted[(idx+1)%sorted.length].id;
    G.inputState=activeCartridge&&activeCartridge.inputMode==='prefix-key'?'await_prefix':'typing';
    G.showHint=false;G.attemptsOnCurrent=0;G.commandStartTime=Date.now();G.typedBuffer='';
    SFX.select();
    setTimeout(focusTypedInput,50);
    return;
  }
  // Alt+H hint — works in all modes
  if(e.key==='h'&&e.altKey){e.preventDefault();G.showHint=true;G.hintUsed=true;return}

  if(!enemy)return;

  const mode=activeCartridge?activeCartridge.inputMode:'prefix-key';

  if(mode==='prefix-key'){
    e.preventDefault();
    if(G.inputState==='await_prefix'){
      if(e.ctrlKey&&e.key==='b'){G.inputState='await_command';SFX.prefix()}
      return;
    }
    if(G.inputState==='await_command'){
      if(e.key===enemy.cmd.key){
        handleHit(enemy);
      }else{
        handleMiss(enemy);
      }
    }
  }else if(mode==='typed'){
    // If input exists but isn't focused, redirect focus and replay the keystroke
    const inp=document.getElementById('typed-input');
    if(inp&&document.activeElement!==inp){
      inp.focus();
      // Replay printable character into the input
      if(e.key.length===1&&!e.ctrlKey&&!e.altKey&&!e.metaKey){
        e.preventDefault();
        inp.value+=e.key;
        G.typedBuffer=inp.value;
      }
    }
  }
});

// Typed input handler — delegated to the input element
document.addEventListener('keydown',function(e){
  if(G.screen!=='game')return;
  const mode=activeCartridge?activeCartridge.inputMode:'prefix-key';
  if(mode!=='typed')return;

  const enemy=G.selectedId?G.enemies.find(en=>en.id===G.selectedId):null;
  if(!enemy)return;

  const inp=document.getElementById('typed-input');

  if(e.key==='Enter'){
    e.preventDefault();
    const val=inp?inp.value:G.typedBuffer;
    if(val.trim()==='')return;
    const result=activeCartridge.validate(val,enemy.cmd.key);
    if(result.correct){
      handleHit(enemy);
    }else{
      handleMiss(enemy);
      if(inp)inp.value='';
    }
    return;
  }

  // Sync buffer from input element
  if(inp&&e.target===inp){
    // Let the input handle its own character entry naturally
    // We just sync the buffer on next frame
    requestAnimationFrame(()=>{
      if(document.getElementById('typed-input')){
        G.typedBuffer=document.getElementById('typed-input').value;
      }
    });
  }
});

// ═══════════════════════════════════════════════
//  MUTE BUTTON
// ═══════════════════════════════════════════════
document.getElementById('mute-btn').onclick=()=>{
  const m=SFX.toggleMute();
  document.getElementById('mute-btn').textContent=m?'\ud83d\udd07':'\ud83d\udd0a';
  document.getElementById('mute-btn').style.color=m?'#ff4422':AMB.css.hot;
};

// ═══════════════════════════════════════════════
//  SAVE ON UNLOAD
// ═══════════════════════════════════════════════
window.addEventListener('beforeunload',()=>{
  if(G.screen==='game')saveSRS();
});

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
let lastTime=0;
function animate(time){
  requestAnimationFrame(animate);
  const dt=time-lastTime;lastTime=time;

  camera.position.x=Math.sin(time*.0002)*.3;
  camera.position.y=18+Math.sin(time*.0003)*.2;
  camera.lookAt(0,0,-1);

  serverLight.intensity=1.5+Math.sin(time*.003)*.3;
  sTop.rotation.y=time*.001;
  ant.material.color.setHex(Math.sin(time*.005)>.3?AMB.glow:AMB.mid);

  spawnMark.material.opacity=.2+Math.sin(time*.004)*.2;
  spawnMark.rotation.y=time*.002;

  if(G.screen==='game'){
    trySpawn(time);moveEnemies();checkBreach();checkWaveComplete();autoSelect();
    updateEnemyMeshes();updateLabels();updateHUD();updateInput();updateQueue();
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.add(p.vel);
    p.vel.y-=.005;
    p.life-=p.decay;
    p.mesh.material.opacity=p.life;
    p.mesh.scale.setScalar(p.life);
    if(p.life<=0){scene.remove(p.mesh);p.mesh.material.dispose();particles.splice(i,1)}
  }
  for(let i=beams.length-1;i>=0;i--){
    const b=beams[i];b.life-=b.decay;b.line.material.opacity=b.life;
    if(b.life<=0){scene.remove(b.line);b.line.material.dispose();b.line.geometry.dispose();beams.splice(i,1)}
  }

  renderer.render(scene,camera);
}
requestAnimationFrame(animate);

// ═══════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ═══════════════════════════════════════════════
//  INIT — show cartridge select
// ═══════════════════════════════════════════════
showSelectScreen();
