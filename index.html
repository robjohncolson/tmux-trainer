<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>AP Stats Formula Defense</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0500;font-family:'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace}
canvas{position:fixed;top:0;left:0;z-index:0;touch-action:none}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;padding:10px 16px;pointer-events:none}
.hud-item{text-align:center;pointer-events:none}
#h-pause-btn{display:none}
.hud-label{font-size:9px;letter-spacing:2px;color:#5a3800;font-weight:600}
.hud-val{font-size:18px;font-weight:700;color:#ff8c00;text-shadow:0 0 8px #ff8c0066}
.hud-val.score-pop{animation:score-pop .28s ease-out}
#tier-bar{position:fixed;top:52px;left:0;right:0;z-index:10;text-align:center;pointer-events:none;font-size:10px}
#input-panel{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:6px 12px;text-align:center;pointer-events:none;display:flex;flex-direction:column;justify-content:flex-end;isolation:isolate;max-height:55vh}
#input-panel::before{content:'';position:absolute;left:0;right:0;bottom:0;top:-18vh;z-index:-1;pointer-events:none;background:linear-gradient(to bottom,rgba(13,5,0,0.15) 0%,rgba(13,5,0,0.65) 30%,rgba(13,5,0,0.82) 100%)}
#input-panel *{pointer-events:auto}
#ip-header,#ip-body{width:min(760px,100%);margin:0 auto;background:rgba(13,5,0,0.8);border:1px solid #ff8c0018;box-shadow:0 10px 24px #00000033}
#ip-header{flex:0 0 auto;max-height:40%;overflow:hidden;border-bottom:none;border-radius:12px 12px 0 0;padding:8px 10px 8px}
#ip-body{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;border-top:none;border-radius:0 0 12px 12px;padding:6px 10px 8px;scrollbar-width:thin;scrollbar-color:#ff8c0044 transparent}
#ip-body::-webkit-scrollbar{display:block;width:6px}
#ip-body::-webkit-scrollbar-thumb{background:#ff8c0044;border-radius:4px}
#ip-header:empty,#ip-body:empty{display:none}
#ip-header:empty+#ip-body{border-top:1px solid #ff8c0018;border-radius:12px;padding-top:10px}
.prompt-label{font-size:9px;letter-spacing:3px;color:#5a3800;font-weight:600}
.prompt-text{font-size:18px;font-weight:700;color:#ffcc66;margin:4px 0;text-shadow:0 0 10px #ff8c0044}
.input-boxes{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px}
.input-box{padding:6px 16px;border:1.5px solid #3d1f00;border-radius:4px;font-size:16px;font-weight:600;color:#5a3800;background:#0d0500;min-width:64px;text-align:center;transition:all .2s}
.input-box.active{border-color:#ff8c00;color:#ff8c00;box-shadow:0 0 10px #ff8c0044}
.input-box.done{border-color:#ff8c0088;color:#ff8c00;background:#ff8c0011}
.input-help{font-size:10px;color:#3d1f00;margin-top:8px;display:none;line-height:1.4}
.shortcut-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.shortcut-badge{font-family:inherit;font-size:10px;color:#7799aa;background:transparent;border:1px solid #58C4DD33;border-radius:6px;padding:4px 10px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.shortcut-badge:hover{border-color:#58C4DD;color:#58C4DD}
.shortcut-badge:active{transform:scale(.96)}
.shortcut-badge kbd{font-family:inherit;font-size:9px;font-weight:700;color:#58C4DD;background:#58C4DD11;border:1px solid #58C4DD44;border-radius:3px;padding:1px 5px}
.explain-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center}
.explain-label{font-size:9px;letter-spacing:2px;color:#996622;font-weight:700}
.explain-chip{font-family:inherit;font-size:10px;font-weight:700;color:#ffcc66;background:#1a0800;border:1px solid #5a2800;border-radius:999px;padding:5px 10px;cursor:pointer;transition:all .15s}
.explain-chip:hover{border-color:#ff8c00;color:#ff8c00;background:#2d1200}
.menu-tabs{display:flex;gap:0;margin:12px 0 8px;border-bottom:2px solid #3d1f0044;max-width:360px}
.menu-tab{flex:1;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:2px;color:#5a3800;background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 8px;cursor:pointer;transition:all .15s;margin-bottom:-2px}
.menu-tab:hover{color:#ff8c00}
.menu-tab.active{color:#ff8c00;border-bottom-color:#ff8c00}
.login-box{margin-top:12px;background:#0d050088;border:1px solid #3d1f0044;border-radius:10px;padding:12px 14px;max-width:320px;text-align:center}
.login-box input{font-family:inherit;font-size:13px;color:#ffcc66;background:#0d0500;border:1.5px solid #3d1f00;border-radius:8px;padding:8px 12px;width:100%;box-sizing:border-box;margin-bottom:8px;outline:none}
.login-box input:focus{border-color:#ff8c00}
.login-box .login-actions{display:flex;gap:8px;margin-top:4px}
.login-box .login-actions .btn{flex:1;font-size:11px;padding:8px 12px;margin-top:0}
.login-status{font-size:10px;margin-top:10px;letter-spacing:1px}
.touch-actions{display:flex;gap:6px;margin-top:6px}
.touch-btn{flex:1;font-family:inherit;font-size:11px;font-weight:700;color:#ffcc66;background:#1a0800;border:1px solid #5a2800;border-radius:8px;padding:10px 8px;cursor:pointer;text-align:center;min-height:44px;transition:all .15s}
.touch-btn:active{transform:scale(.95);background:#2d1200}
.explain-panel{margin-top:10px;padding:10px 12px;border:1px solid #58C4DD33;border-radius:10px;background:#58C4DD0a;text-align:left}
.explain-panel-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.explain-title{font-size:11px;letter-spacing:2px;color:#58C4DD;font-weight:700}
.explain-close{font-family:inherit;font-size:10px;font-weight:700;color:#58C4DD;background:transparent;border:1px solid #3388aa;border-radius:999px;padding:4px 9px;cursor:pointer}
.explain-close:hover{border-color:#66ccff;color:#66ccff}
.explain-line{font-size:11px;line-height:1.55;color:#99bbcc;margin-top:4px}
.explain-watch{font-family:inherit;font-size:10px;font-weight:700;color:#66ccff;background:transparent;border:1px solid #2266aa;border-radius:999px;padding:4px 9px;cursor:pointer;margin-left:auto}
.explain-watch:hover{border-color:#66ccff}
.explain-video-wrap{position:relative;margin-top:8px;margin-bottom:8px;border-radius:8px;overflow:hidden;background:#000;animation:explain-fade-in .3s ease-out}
@keyframes explain-fade-in{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.explain-video{width:100%;display:block;border-radius:8px}
.explain-video-loading{font-size:10px;color:#66ccff88;padding:12px;text-align:center}
.explain-video-error{font-size:10px;color:#99666688;padding:6px;text-align:center}
.wave-clear{font-size:22px;font-weight:900;color:#ff8c00;letter-spacing:4px;text-shadow:0 0 14px #ff8c0066}
#labels{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;overflow:hidden}
.enemy-label{position:absolute;pointer-events:auto;cursor:pointer;text-align:center;transform:translate(-50%,-100%);opacity:.55;filter:saturate(.82);transition:opacity .18s,filter .18s}
.enemy-label.selected{opacity:1;filter:none}
.enemy-label-shell{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:4px 8px}
.enemy-label-inner{background:#0d0500d6;border:1px solid transparent;border-radius:4px;padding:3px 6px;font-size:9px;font-weight:700;line-height:1.2;max-width:140px;word-break:break-word;white-space:normal;transition:border-color .18s,background .18s,box-shadow .18s}
.enemy-label.selected .enemy-label-inner{background:#120800f1;border-color:currentColor;box-shadow:0 0 18px #00000066,0 0 10px currentColor}
@keyframes bkt-pulse{0%,100%{opacity:1}50%{opacity:.7}}
.bkt-uncertain .enemy-label-inner{animation:bkt-pulse 2s ease-in-out infinite}
.enemy-label .dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.sel-arrow{text-align:center;color:inherit;font-size:9px;margin-top:1px;animation:blink 1s step-end infinite;text-shadow:0 0 10px currentColor}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0500ee;transition:opacity .3s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:56px;font-weight:900;letter-spacing:14px;color:#ff8c00;text-shadow:0 0 20px #ff8c00,0 0 40px #ff8c0044;margin-bottom:4px}
#overlay h2{font-size:16px;font-weight:400;letter-spacing:8px;color:#cc6600;margin-bottom:20px}
.btn{font-family:inherit;font-size:15px;font-weight:700;color:#0d0500;background:#ff8c00;border:none;padding:12px 36px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;box-shadow:0 0 20px #ff8c0066;margin-top:16px}
.btn:hover{background:#ffaa22}
#overlay .desc{font-size:12px;line-height:1.7;color:#996622;max-width:380px;text-align:center;margin-bottom:12px}
#overlay .sub{font-size:11px;color:#5a3800;margin-top:12px;text-align:center}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;width:100%;max-width:320px}
.stat-box{background:#1a0800;border:1px solid #ff8c0022;border-radius:4px;padding:10px 6px;text-align:center}
.stat-box .sl{font-size:9px;letter-spacing:2px;color:#5a3800;font-weight:600;margin-bottom:3px}
.stat-box .sv{font-size:20px;font-weight:700;color:#ff8c00}
.mastery-bar{display:flex;height:14px;border-radius:3px;overflow:hidden;border:1px solid #ff8c0022;margin:4px 0}
.mastery-legend{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;font-size:9px;margin-bottom:10px}
.weak-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#996622;margin-bottom:3px;padding:3px 8px;background:#1a0800;border-radius:3px;border:1px solid #ffffff08}
#mute-btn{position:fixed;top:10px;right:12px;z-index:30;font-size:18px;background:transparent;border:1px solid #ff8c0033;border-radius:4px;color:#ff8c00;cursor:pointer;padding:3px 7px;opacity:.7}
#queue-bar{position:fixed;bottom:80px;left:0;right:0;z-index:9;text-align:center;pointer-events:none;font-size:9px;letter-spacing:2px;color:#5a3800}
.q-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin:0 2px;opacity:.7}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes score-pop{
0%{transform:scale(1);color:#ff8c00;text-shadow:0 0 8px #ff8c0066}
35%{transform:scale(1.16);color:#fff1bf;text-shadow:0 0 18px #ffcc66aa}
100%{transform:scale(1);color:#ff8c00;text-shadow:0 0 8px #ff8c0066}
}
.latex-shell{position:relative;max-width:100%}
.latex-scroll{max-width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.latex-shell.scrollable::after{content:'';position:absolute;top:0;right:0;bottom:0;width:18px;background:linear-gradient(90deg,rgba(13,5,0,0),rgba(13,5,0,0.92));pointer-events:none}
.latex-display{margin:2px auto;min-height:24px;display:flex;align-items:center;justify-content:center;width:max-content;min-width:100%}
.latex-display .katex{font-size:1.15em;color:#ffcc66}
.latex-display .katex-display{margin:0}
.latex-display .katex,.latex-display .katex-display{white-space:nowrap}
.mc-grid{display:flex;flex-wrap:wrap;gap:4px;max-width:600px;margin:4px auto 0;justify-content:center}
.mc-btn{font-family:inherit;font-size:11px;font-weight:600;color:#ff8c00;background:#1a0800;border:1.5px solid #3d1f00;border-radius:4px;padding:5px 8px;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:4px}
.mc-btn:hover{border-color:#ff8c00;background:#2d1200;box-shadow:0 0 8px #ff8c0033}
.mc-btn .mc-key{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:#ff8c00;color:#0d0500;font-weight:900;font-size:10px;flex-shrink:0}
.mc-btn.correct{border-color:#44ff88;background:#44ff8822;color:#44ff88}
.mc-btn.wrong{border-color:#ff4422;background:#ff442222;color:#ff4422}
.wrong-feedback{background:#ff442218;border:1px solid #ff442244;border-radius:8px;padding:8px 12px;margin-top:8px;animation:fade-in .2s ease-out}
.wrong-feedback .wf-wrong{color:#ff6644;font-size:11px;line-height:1.4}
.wrong-feedback .wf-correct{color:#44ff88;font-size:12px;font-weight:700;line-height:1.4;margin-top:4px}
.wrong-feedback .wf-explain{color:#d8943d;font-size:11px;line-height:1.4;margin-top:4px;font-style:italic}
@keyframes fade-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.mc-btn .mc-text{line-height:1.1;font-size:11px}
.blank-input{font-family:inherit;font-size:15px;font-weight:700;color:#ff8c00;background:#0d0500;border:2px solid #ff8c00;border-radius:6px;padding:5px 12px;text-align:center;min-width:100px;max-width:200px;outline:none}
.blank-input:focus{box-shadow:0 0 12px #ff8c0044}
.hint-mc-grid{display:flex;gap:4px;justify-content:center;margin-top:4px}
.hint-mc-btn{font-family:inherit;font-size:12px;font-weight:600;color:#ff8c00;background:#1a0800;border:1.5px solid #3d1f00;border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s}
.hint-mc-btn:hover{border-color:#ff8c00;background:#2d1200}
.hint-mc-btn.correct{border-color:#44ff88;background:#44ff8822;color:#44ff88}
.hint-mc-btn.wrong{border-color:#ff4422;background:#ff442222;color:#ff4422}
.hint-mc-btn .mc-key{display:inline;font-weight:900;color:#ffcc66;margin-right:4px}
.mc-grid.answer-pending,.hint-mc-grid.answer-pending{pointer-events:none}
.q-type-badge{font-size:8px;letter-spacing:2px;color:#996622;background:#ff8c0011;border:1px solid #ff8c0022;border-radius:3px;padding:1px 4px;display:inline-block;margin-bottom:2px}
@keyframes float-up{0%{transform:translateY(0) translateX(-50%);opacity:1}100%{transform:translateY(-50px) translateX(-50%);opacity:0}}
.flash-msg{position:fixed;top:35%;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;z-index:15;pointer-events:none;animation:float-up .8s ease-out forwards;text-shadow:0 0 20px currentColor}
/* Typed input */
.typed-input{padding:8px 16px;border:1.5px solid #ff8c00;border-radius:4px;font-size:18px;font-weight:700;color:#ff8c00;background:#0d0500;min-width:280px;text-align:center;font-family:inherit;outline:none;box-shadow:0 0 10px #ff8c0044;caret-color:#ffcc66}
.typed-input::placeholder{color:#3d1f00}
/* Domain pills */
.domain-pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:420px;margin:10px auto}
.domain-pill{font-family:inherit;font-size:10px;font-weight:600;color:#5a3800;background:transparent;border:1.5px solid #3d1f00;border-radius:12px;padding:3px 10px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.domain-pill.active{color:#ff8c00;border-color:#ff8c00;background:#ff8c0018;box-shadow:0 0 6px #ff8c0022}
.domain-pill:hover{border-color:#ff8c00}
/* Difficulty radios */
.diff-group{display:flex;gap:8px;justify-content:center;margin:10px auto}
.diff-btn{font-family:inherit;font-size:11px;font-weight:600;color:#5a3800;background:transparent;border:1.5px solid #3d1f00;border-radius:6px;padding:6px 14px;cursor:pointer;transition:all .15s;text-align:center}
.diff-btn.active{color:#ff8c00;border-color:#ff8c00;background:#ff8c0018;box-shadow:0 0 8px #ff8c0022}
.diff-btn:hover{border-color:#ff8c00}
.btn:active,.mc-btn:active,.hint-mc-btn:active,.domain-pill:active,.diff-btn:active,.touch-btn:active{transform:scale(.96);transition:transform .05s}
.diff-btn .diff-label{font-size:11px;font-weight:700;letter-spacing:1px}
.diff-btn .diff-desc{font-size:8px;color:#5a3800;margin-top:2px}
.btn.btn-secondary{color:#ff8c00;background:transparent;border:1.5px solid #ff8c0033;box-shadow:none}
.btn.btn-secondary:hover{background:#ff8c0018}
.menu-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.menu-actions .btn{margin-top:0}
.music-editor{width:min(960px,92vw);max-height:min(86vh,820px);overflow-y:auto;padding:22px 24px 24px;border-radius:16px;border:1px solid #ff8c0033;background:linear-gradient(180deg,#1a0800f5,#100600f7);box-shadow:0 22px 70px #00000099,0 0 30px #ff8c0018}
.music-editor-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
.title-shell{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:min(92vw,560px)}
.music-meta{display:flex;flex-direction:column;gap:6px}
.music-status{font-size:10px;letter-spacing:2px;color:#cc6600;min-height:12px}
.dvd-score-stage{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.dvd-score-badge{--dvd-w:280px;--dvd-h:92px;position:absolute;left:16px;top:92px;width:var(--dvd-w);min-height:var(--dvd-h);padding:12px 18px;border:1.5px solid #44ff8866;border-radius:14px;background:linear-gradient(135deg,#10210ff2,#0d0500f2 55%,#1d0b00f0);box-shadow:0 0 18px #44ff8833,0 0 34px #ff8c0022;animation:dvd-x 17s linear infinite alternate,dvd-y 11s linear infinite alternate}
.dvd-score-kicker{font-size:9px;letter-spacing:3px;color:#44ff88;margin-bottom:6px}
.dvd-score-value{font-size:28px;font-weight:900;letter-spacing:2px;color:#ffcc66;text-shadow:0 0 16px #ff8c0066}
.dvd-score-note{font-size:10px;letter-spacing:2px;color:#996622;margin-top:6px}
.wave-selector{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 18px}
.wave-btn{font-family:inherit;font-size:11px;font-weight:700;color:#5a3800;background:transparent;border:1.5px solid #3d1f00;border-radius:999px;padding:7px 12px;cursor:pointer;transition:all .15s}
.wave-btn.active,.wave-btn:hover{color:#ff8c00;border-color:#ff8c00;background:#ff8c0018}
.music-layout{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(260px,.85fr);gap:16px;align-items:start}
.music-card{background:#130700;border:1px solid #ff8c0022;border-radius:12px;padding:14px}
.music-card-title{font-size:10px;letter-spacing:2px;color:#5a3800;font-weight:700;margin-bottom:10px}
.music-card-subtitle{font-size:11px;color:#996622;line-height:1.5;margin-bottom:10px}
.chord-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.music-field{display:flex;flex-direction:column;gap:6px}
.music-field-label{font-size:10px;letter-spacing:1px;color:#996622;font-weight:700}
.music-select{width:100%;font-family:inherit;font-size:13px;color:#ffcc66;background:#0d0500;border:1.5px solid #3d1f00;border-radius:8px;padding:10px 12px;outline:none}
.music-select:focus{border-color:#ff8c00;box-shadow:0 0 0 1px #ff8c0033}
.bass-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.bass-step{display:flex;flex-direction:column;gap:5px}
.bass-step-num{font-size:10px;letter-spacing:1px;color:#996622;font-weight:700}
.tempo-shell{display:flex;align-items:center;gap:12px}
.tempo-shell input[type=range]{flex:1;accent-color:#ff8c00}
.tempo-value{font-size:18px;font-weight:700;color:#ffcc66;min-width:74px;text-align:right}
.editor-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.editor-actions .btn{margin-top:0;flex:1 1 180px}
.music-editor-note{font-size:11px;line-height:1.6;color:#996622;margin-top:12px}
.seq-grid{display:flex;flex-direction:column;gap:6px}
.seq-row{display:flex;align-items:center;gap:0}
.seq-label{width:56px;flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:1.5px;text-align:right;padding-right:10px}
.seq-cells{display:flex;gap:3px;flex:1}
.seq-cell{flex:1;min-width:0;aspect-ratio:1;min-height:36px;border-radius:6px;cursor:pointer;position:relative;display:flex;align-items:flex-end;justify-content:center;border:1.5px solid #3d1f0044;background:#0d0500;transition:all .12s;user-select:none;-webkit-user-select:none;overflow:hidden}
.seq-cell:hover{filter:brightness(1.25);border-color:#5a380066}
.seq-cell:active{transform:scale(.92)}

    const modGain=ctx.createGain();
    modGain.gain.value=0;
    const outputGain=ctx.createGain();
    outputGain.gain.value=0;
    // FM: modulator → modGain → carrier.frequency
    modulator.connect(modGain);
    modGain.connect(carrier.frequency);
    carrier.connect(outputGain);
    outputGain.connect(dest);
    carrier.start();
    modulator.start();
    return{carrier,modulator,modGain,outputGain,active:false};
  }
  function createSimpleVoice(carrierType,dest){
    // For kick: no modulator needed, just carrier + output gain
    const carrier=ctx.createOscillator();
    carrier.type=carrierType||'sine';
    const outputGain=ctx.createGain();
    outputGain.gain.value=0;
    carrier.connect(outputGain);
    outputGain.connect(dest);
    carrier.start();
    return{carrier,modulator:null,modGain:null,outputGain,active:false};
  }

  function init(){
    if(ctx)return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=ctx.createGain();masterGain.gain.value=1;masterGain.connect(ctx.destination);
    // Four buses
    padBus=ctx.createGain();padBus.gain.value=0;padBus.connect(masterGain);
    bassBus=ctx.createGain();bassBus.gain.value=0;bassBus.connect(masterGain);
    sfxBus=ctx.createGain();sfxBus.gain.value=.8;sfxBus.connect(masterGain);
    drumBus=ctx.createGain();drumBus.gain.value=.7;drumBus.connect(masterGain);
    // Pad filter with shimmer LFO
    const padF=ctx.createBiquadFilter();padF.type='lowpass';padF.frequency.value=900;
    padF.connect(padBus);
    const padLFO=ctx.createOscillator();padLFO.type='sine';padLFO.frequency.value=.08;
    const padLG=ctx.createGain();padLG.gain.value=400;padLFO.connect(padLG);padLG.connect(padF.frequency);padLFO.start();
    // Bass filter
    const bassF=ctx.createBiquadFilter();bassF.type='lowpass';bassF.frequency.value=350;bassF.Q.value=4;
    bassF.connect(bassBus);
    const bassLFO=ctx.createOscillator();bassLFO.type='sine';bassLFO.frequency.value=.3;
    const bassLG=ctx.createGain();bassLG.gain.value=120;bassLFO.connect(bassLG);bassLG.connect(bassF.frequency);bassLFO.start();

    // ── Voices 0-2: FM pad (carrier sine + modulator sine, ratio 2, low depth = bell/e-piano) ──
    for(let i=0;i<3;i++){
      const v=createFmVoice('sine',padF);
      const freq=DEFAULT_MUSIC_CONFIG[0].chords[0][i];
      v.carrier.frequency.value=freq;
      v.modulator.frequency.value=freq*2; // ratio 2
      v.modGain.gain.value=freq*0.5; // modIndex 0.5 → gentle bell
      voices.push(v);
    }
    // ── Voice 3: FM bass (carrier sine + modulator sine, ratio 1, modIndex ~2) ──
    {
      const v=createFmVoice('sine',bassF);
      v.carrier.frequency.value=55;
      v.modulator.frequency.value=55; // ratio 1
      v.modGain.gain.value=55*2; // modIndex 2 → warm fat bass
      voices.push(v);
    }
    // ── Voice 4: FM kick (carrier sine, pitch envelope, no modulator) ──
    {
      const v=createSimpleVoice('sine',drumBus);
      v.carrier.frequency.value=55;
      voices.push(v);
    }
    // ── Voice 5: FM snare (carrier + modulator ratio 2.3, inharmonic) ──
    {
      const v=createFmVoice('sine',drumBus);
      v.carrier.frequency.value=200;
      v.modulator.frequency.value=200*2.3;
      v.modGain.gain.value=200*3; // modIndex 3
      voices.push(v);
    }
    // ── Voice 6: FM hihat (carrier ~400Hz + modulator ratio sqrt(2), high depth = metallic) ──
    {
      const v=createFmVoice('sine',drumBus);
      v.carrier.frequency.value=400;
      v.modulator.frequency.value=400*1.414; // sqrt(2) ratio
      v.modGain.gain.value=400*8; // modIndex 8 → metallic
      voices.push(v);
    }
    // ── Voices 7-13: FM SFX pool ──
    for(let i=7;i<14;i++){
      const v=createFmVoice('sine',sfxBus);
      v.carrier.frequency.value=440;
      v.modulator.frequency.value=440*2;
      v.modGain.gain.value=0;
      voices.push(v);
    }

    // Persistent noise source (used for hihat mix-in and snare burst)
    const nBuf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);
    const nData=nBuf.getChannelData(0);for(let i=0;i<nData.length;i++)nData[i]=Math.random()*2-1;
    const nSrc=ctx.createBufferSource();nSrc.buffer=nBuf;nSrc.loop=true;
    noiseLP=ctx.createBiquadFilter();noiseLP.type='lowpass';noiseLP.frequency.value=3000;
    noiseGate=ctx.createGain();noiseGate.gain.value=0;
    nSrc.connect(noiseLP);noiseLP.connect(noiseGate);noiseGate.connect(sfxBus);
    // Second noise path: bandpass for snare burst, routed through drumBus
    noiseBP=ctx.createBiquadFilter();noiseBP.type='bandpass';noiseBP.frequency.value=2000;noiseBP.Q.value=1.5;
    const noiseBPGate=ctx.createGain();noiseBPGate.gain.value=0;
    nSrc.connect(noiseBP);noiseBP.connect(noiseBPGate);noiseBPGate.connect(drumBus);
    nSrc.start();
    // Store bandpass gate for snare scheduling
    voices._noiseBPGate=noiseBPGate;
  }
  function ensure(){if(!ctx)init();if(ctx.state==='suspended')ctx.resume()}

  // ── FM drum scheduling ──
  function scheduleFmKick(time,vol){
    if(!ctx||!voices[4])return;
    const v=voices[4],t=Math.max(time,ctx.currentTime);
    // Pitch envelope: 150Hz → 55Hz in 60ms
    v.carrier.frequency.cancelScheduledValues(t);
    v.carrier.frequency.setValueAtTime(150,t);
    v.carrier.frequency.exponentialRampToValueAtTime(55,t+0.06);
    // Amplitude: attack 2ms, hold 120ms, decay 80ms
    v.outputGain.gain.cancelScheduledValues(t);
    v.outputGain.gain.setValueAtTime(0,t);
    v.outputGain.gain.linearRampToValueAtTime(vol,t+0.002);
    v.outputGain.gain.setValueAtTime(vol,t+0.122);
    v.outputGain.gain.linearRampToValueAtTime(0,t+0.202);
  }
  function scheduleFmSnare(time,vol){
    if(!ctx||!voices[5])return;
    const v=voices[5],t=Math.max(time,ctx.currentTime);
    // Carrier pitch: 200Hz → 120Hz in 30ms
    v.carrier.frequency.cancelScheduledValues(t);
    v.carrier.frequency.setValueAtTime(200,t);
    v.carrier.frequency.exponentialRampToValueAtTime(120,t+0.03);
    // Modulator: ratio 2.3, modIndex 3, depth decays to 0 in 60ms
    v.modulator.frequency.cancelScheduledValues(t);
    v.modulator.frequency.setValueAtTime(200*2.3,t);
    v.modGain.gain.cancelScheduledValues(t);
    v.modGain.gain.setValueAtTime(200*3,t); // depth = modIndex * carrierFreq
    v.modGain.gain.linearRampToValueAtTime(0,t+0.06);
    // Amplitude: 5ms attack, 100ms decay
    v.outputGain.gain.cancelScheduledValues(t);
    v.outputGain.gain.setValueAtTime(0,t);
    v.outputGain.gain.linearRampToValueAtTime(vol,t+0.005);
    v.outputGain.gain.exponentialRampToValueAtTime(0.001,t+0.105);
    v.outputGain.gain.setValueAtTime(0,t+0.106);
    // Noise burst via bandpass
    if(voices._noiseBPGate){
      const ng=voices._noiseBPGate;
      ng.gain.cancelScheduledValues(t);
      ng.gain.setValueAtTime(vol*0.6,t);
      ng.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      ng.gain.setValueAtTime(0,t+0.101);
    }
  }
  function scheduleFmHihat(time,vol,closed){
    if(!ctx||!voices[6])return;
    const v=voices[6],t=Math.max(time,ctx.currentTime);
    const decay=closed?0.025:0.12;
    // Carrier 400Hz, modulator ratio 1.414, modIndex 8
    v.carrier.frequency.cancelScheduledValues(t);
    v.carrier.frequency.setValueAtTime(400,t);
    v.modulator.frequency.cancelScheduledValues(t);
    v.modulator.frequency.setValueAtTime(400*1.414,t);
    v.modGain.gain.cancelScheduledValues(t);
    v.modGain.gain.setValueAtTime(400*8,t);
    v.modGain.gain.linearRampToValueAtTime(400*2,t+decay);
    // Amplitude
    v.outputGain.gain.cancelScheduledValues(t);
    v.outputGain.gain.setValueAtTime(vol,t);
    v.outputGain.gain.exponentialRampToValueAtTime(0.001,t+decay);
    v.outputGain.gain.setValueAtTime(0,t+decay+0.001);
    // Mix in a little noise (reduced level)
    if(noiseGate&&noiseLP){
      noiseLP.frequency.setValueAtTime(8000,t);
      noiseGate.gain.cancelScheduledValues(t);
      noiseGate.gain.setValueAtTime(vol*0.15,t);
      noiseGate.gain.exponentialRampToValueAtTime(0.001,t+decay);
      noiseGate.gain.setValueAtTime(0,t+decay+0.001);
    }
  }

  function clearBgmAutomation(time){
    if(!ctx)return;
    const t=Math.max(time||ctx.currentTime,ctx.currentTime);
    if(noiseGate){
      noiseGate.gain.cancelScheduledValues(t);
      noiseGate.gain.setValueAtTime(0,t);
    }
    if(noiseLP){
      noiseLP.frequency.cancelScheduledValues(t);
      noiseLP.frequency.setValueAtTime(3000,t);
    }
    if(padBus){
      padBus.gain.cancelScheduledValues(t);
      padBus.gain.setValueAtTime(0,t);
    }
    if(bassBus){
      bassBus.gain.cancelScheduledValues(t);
      bassBus.gain.setValueAtTime(0,t);
    }
    // Clear pad voices (0-2), bass voice (3), kick (4), snare (5), hihat (6)
    for(let i=0;i<7;i++){
      if(!voices[i])continue;
      voices[i].outputGain.gain.cancelScheduledValues(t);
      voices[i].outputGain.gain.setValueAtTime(0,t);
      voices[i].carrier.frequency.cancelScheduledValues(t);
      if(voices[i].modulator){
        voices[i].modulator.frequency.cancelScheduledValues(t);
        voices[i].modGain.gain.cancelScheduledValues(t);
      }
    }
    // Clear noise bandpass gate
    if(voices._noiseBPGate){
      voices._noiseBPGate.gain.cancelScheduledValues(t);
      voices._noiseBPGate.gain.setValueAtTime(0,t);
    }
  }
  function syncCurrentVoicing(restartBgm){
    if(!ctx)return;
    const cfg=getWaveConfig(currentWaveIdx);
    const ch=cfg.chords[currentProgIdx%cfg.chords.length];
    const t=ctx.currentTime;
    for(let i=0;i<3;i++){
      voices[i].carrier.frequency.setTargetAtTime(ch[i],t,.12);
      voices[i].modulator.frequency.setTargetAtTime(ch[i]*2,t,.12); // ratio 2
      voices[i].modGain.gain.setTargetAtTime(ch[i]*0.5,t,.12); // modIndex 0.5
    }
    voices[3].carrier.frequency.setTargetAtTime(ch[0]/4,t,.12);
    voices[3].modulator.frequency.setTargetAtTime(ch[0]/4,t,.12); // ratio 1
    voices[3].modGain.gain.setTargetAtTime((ch[0]/4)*2,t,.12); // modIndex 2
    if(restartBgm&&bgmPlaying){
      stopBGM();
      startBGM();
    }
  }
  function schedulePadStep(level,time,stepDur){
    const t=Math.max(time,ctx.currentTime);
    for(let i=0;i<3;i++){
      if(level<=0){
        voices[i].outputGain.gain.setTargetAtTime(0,t,.02);
        // Settle mod depth low when silent
        voices[i].modGain.gain.setTargetAtTime(0,t,.02);
        continue;
      }
      const peak=level*.75;
      const sustain=Math.max(.02,level*.2);
      const freq=voices[i].carrier.frequency.value||220;
      // Amplitude envelope
      voices[i].outputGain.gain.cancelScheduledValues(t);
      voices[i].outputGain.gain.setValueAtTime(0,t);
      voices[i].outputGain.gain.linearRampToValueAtTime(peak,t+Math.min(stepDur*.18,.05));
      voices[i].outputGain.gain.linearRampToValueAtTime(sustain,t+Math.max(stepDur*.72,.12));
      // FM mod depth envelope: bell attack, softer sustain
      voices[i].modGain.gain.cancelScheduledValues(t);
      voices[i].modGain.gain.setValueAtTime(freq*1.5,t); // high modIndex on attack (bell)
      voices[i].modGain.gain.linearRampToValueAtTime(freq*0.3,t+Math.min(stepDur*.25,.06)); // settle low
    }
  }
  function getPreviewDurationMs(cfg){
    const stepCount=Math.max((cfg.bass||[]).length,(cfg.pad||[]).length,1);
    const stepDur=60/(cfg.tempo||80)/2;
    return Math.ceil(stepCount*stepDur*cfg.chords.length*1000+400);
  }
  function stopPreview(resumeAfter){
    if(previewTimer){clearTimeout(previewTimer);previewTimer=null}
    if(!previewConfig)return;
    const restore=previewConfig;
    previewConfig=null;
    stopBGM();
    currentWaveIdx=restore.previousWaveIdx;
    currentProgIdx=0;
    if(ctx)syncCurrentVoicing(false);
    if(resumeAfter&&restore.resumeAfter&&!muted)startBGM();
  }
  function previewMusicConfig(wave,config){
    if(muted)return false;
    const waveIdx=clampWaveIdx(wave);
    const draft=sanitizeWaveConfig(config||getWaveConfig(waveIdx),DEFAULT_MUSIC_CONFIG[waveIdx]);
    stopPreview(false);
    ensure();
    const resumeAfter=bgmPlaying;
    if(resumeAfter)stopBGM();
    previewConfig={waveIdx:waveIdx,config:draft,previousWaveIdx:currentWaveIdx,resumeAfter:resumeAfter};
    currentWaveIdx=waveIdx;
    currentProgIdx=0;
    syncCurrentVoicing(false);
    startBGM();
    previewTimer=setTimeout(()=>stopPreview(true),getPreviewDurationMs(draft));
    return true;
  }
  function applyMusicConfig(nextConfig,persist){
    const sanitized=sanitizeMusicConfig(nextConfig);
    if(!sanitized)return false;
    stopPreview(false);
    MUSIC_CONFIG=sanitized;
    if(persist){
      try{localStorage.setItem(MUSIC_STORAGE_KEY,JSON.stringify(MUSIC_CONFIG))}catch(e){return false}
    }
    syncCurrentVoicing(true);
    return true;
  }

  // ── FM voice helpers ──
  function playFmNote(freq,dur,ratio,modIndex,vol,del){
    if(muted)return;ensure();
    for(let i=7;i<14;i++){
      if(!voices[i].active){
        const v=voices[i],t=ctx.currentTime+(del||0);
        v.active=true;
        v.carrier.frequency.setValueAtTime(freq,t);
        v.modulator.frequency.setValueAtTime(freq*(ratio||2),t);
        v.modGain.gain.setValueAtTime((modIndex||1)*freq,t);
        // Brief mod depth decay for natural timbre
        v.modGain.gain.setTargetAtTime((modIndex||1)*freq*0.3,t+dur*0.3,.02);
        v.outputGain.gain.setTargetAtTime(vol||.08,t,.005);
        v.outputGain.gain.setTargetAtTime(0,t+dur,.03);
        setTimeout(()=>{v.active=false},((del||0)+dur+.15)*1000);
        return v;
      }
    }
  }
  // Backward-compatible wrapper
  function playNote(freq,dur,type,vol,del){
    // Map old oscillator types to FM ratios/modIndex
    const ratioMap={sine:2,triangle:2,sawtooth:3,square:2};
    const modMap={sine:0.5,triangle:1,sawtooth:2.5,square:2};
    const r=ratioMap[type]||2;
    const mi=modMap[type]||1;
    return playFmNote(freq,dur,r,mi,vol,del);
  }
  function noise(dur,vol,del){
    if(muted||!noiseGate)return;ensure();
    const t=ctx.currentTime+(del||0);
    noiseGate.gain.setTargetAtTime(vol||.1,t,.003);
    noiseGate.gain.setTargetAtTime(0,t+dur,.02);
  }
  // ── Key / chord control ──
  function setKey(wave){
    if(!ctx)return;
    const wIdx=clampWaveIdx((wave||1)-1);
    if(wIdx===currentWaveIdx&&voices[0].outputGain.gain.value>0)return;
    const oldIdx=currentWaveIdx;
    currentWaveIdx=wIdx;
    currentProgIdx=0;
    const ch=getWaveConfig(wIdx).chords[0],t=ctx.currentTime;
    for(let i=0;i<3;i++){
      voices[i].carrier.frequency.setTargetAtTime(ch[i],t,.15);
      voices[i].modulator.frequency.setTargetAtTime(ch[i]*2,t,.15);
      voices[i].modGain.gain.setTargetAtTime(ch[i]*0.5,t,.15);
    }
    voices[3].carrier.frequency.setTargetAtTime(ch[0]/4,t,.15);
    voices[3].modulator.frequency.setTargetAtTime(ch[0]/4,t,.15);
    voices[3].modGain.gain.setTargetAtTime((ch[0]/4)*2,t,.15);
    if(bgmPlaying&&oldIdx!==wIdx){
      const kpv=(getWaveConfig(wIdx).padVol!=null?getWaveConfig(wIdx).padVol:.05)*.5;
      padBus.gain.setTargetAtTime(Math.min(.5,kpv*1.6),t,.05);
      padBus.gain.setTargetAtTime(kpv,t+.4,.3);
      playFmNote(ch[2]*2,.3,2,0.8,.06);
    }
  }
  // Musical hit — health +1, kill melody on current chord
  function musicalHit(){
    if(!ctx||!bgmPlaying)return;
    musicalHealth=Math.min(5,musicalHealth+1);
    const prog=getWaveConfig(currentWaveIdx).chords;
    const ch=prog[currentProgIdx%prog.length];
    playFmNote(ch[2]*2,.4,3,1,.05);
    playFmNote(ch[0]*2,.3,2,0.8,.04,.12);
  }
  function musicalMiss(){musicalHealth=Math.max(0,musicalHealth-1);}
  function musicalBreach(){musicalHealth=Math.max(0,musicalHealth-2);}
  function setStreak(n){currentStreak=Math.max(0,n|0);}

  // Opens the filter and shifts voicing as the student progresses

  // ── BGM ──
  function startBGM(){
    if(bgmPlaying||muted)return;ensure();
    if(bgmSeqTimer){clearTimeout(bgmSeqTimer);bgmSeqTimer=null}
    const t=ctx.currentTime;
    clearBgmAutomation(t);
    bgmPlaying=true;
    currentProgIdx=0;
    musicalHealth=5;
    const waveCfg=getWaveConfig(currentWaveIdx);
    const pv=(waveCfg.padVol!=null?waveCfg.padVol:.05)*.5;
    const bv=(waveCfg.bassVol!=null?waveCfg.bassVol:.6)*.35;
    padBus.gain.setTargetAtTime(pv,t,.3);
    bassBus.gain.setTargetAtTime(bv,t,.3);
    for(let i=0;i<3;i++)voices[i].outputGain.gain.setTargetAtTime(0,t,.05);
    voices[3].outputGain.gain.setTargetAtTime(.6,t,.3);
    let st=60/(getWaveConfig(currentWaveIdx).tempo||80)/2;
    let startT=t;
    function seq(){
      if(!bgmPlaying)return;
      const cfg=getWaveConfig(currentWaveIdx);
      st=60/(cfg.tempo||80)/2;
      const prog=cfg.chords;
      const ch=prog[currentProgIdx%prog.length];
      const h=previewConfig?5:musicalHealth; // preview ignores health
      // Glide pads to current chord (audible if health >= 5)
      for(let i=0;i<3;i++){
        voices[i].carrier.frequency.setTargetAtTime(ch[i],startT,.15);
        voices[i].modulator.frequency.setTargetAtTime(ch[i]*2,startT,.15);
        voices[i].modGain.gain.setTargetAtTime(ch[i]*0.5,startT,.15);
      }
      // Health-gated layer volumes
      const pv=(cfg.padVol!=null?cfg.padVol:.05)*.5;
      const bv=(cfg.bassVol!=null?cfg.bassVol:.6)*.35;
      padBus.gain.setTargetAtTime(h>=5?pv:0,startT,.3);
      bassBus.gain.setTargetAtTime(h>=4?bv:0,startT,.3);
      const bp=cfg.bass||DEFAULT_MUSIC_CONFIG[0].bass;
      const padPattern=cfg.pad||DEFAULT_MUSIC_CONFIG[0].pad;
      const stepCount=Math.max(bp.length,padPattern.length);
      const ll=stepCount*st;
      const now=ctx.currentTime;
      const root=ch[0]/4;
      // Schedule bass notes with FM tracking
      bp.forEach((r,i)=>{
        const nt=startT+i*st;
        if(nt>now-.01){
          const ht=Math.max(nt,now);
          if(r===0){
            voices[3].outputGain.gain.setValueAtTime(0,ht);
          }else{
            const bassFreq=root*r;
            voices[3].outputGain.gain.setValueAtTime(.6,ht);
            voices[3].carrier.frequency.setValueAtTime(bassFreq,ht);
            // Track modulator: ratio 1, modIndex 2 for warmth
            voices[3].modulator.frequency.setValueAtTime(bassFreq,ht);
            // Brief mod depth attack for pluck, then settle
            voices[3].modGain.gain.setValueAtTime(bassFreq*3.5,ht); // high attack
            voices[3].modGain.gain.setTargetAtTime(bassFreq*2,ht+0.02,.01); // settle
          }
        }
      });
      // Step-gate the pads with FM mod depth envelope
      padPattern.forEach((level,i)=>{
        const pt=startT+i*st;
        if(pt>now-.01)schedulePadStep(Math.max(0,Number(level)||0),pt,st);
      });
      // Health-gated drums
      const kickPattern=cfg.kick||[1,0,0,0,1,0,0,0];
      const kickPeak=(cfg.kickVol!=null?cfg.kickVol:.30);
      const snarePattern=cfg.snare||[0,0,0,0,0,0,1,0];
      const snarePeak=(cfg.snareVol!=null?cfg.snareVol:.25);
      const hhPeak=(cfg.hihatVol!=null?cfg.hihatVol:.11)*.25;
      const hhPattern=Array.isArray(cfg.hihat)&&cfg.hihat.length===8?cfg.hihat:[1,0,1,0,1,0,1,0];
      if(h>=3){for(let i=0;i<bp.length;i++){if(!kickPattern[i])continue;const kt=startT+i*st;if(kt>now-.01)scheduleFmKick(kt,kickPeak);}}
      if(h>=2){for(let i=0;i<bp.length;i++){if(!snarePattern[i])continue;const snt=startT+i*st;if(snt>now-.01)scheduleFmSnare(snt,snarePeak);}}
      if(h>=1){for(let i=0;i<bp.length;i++){if(!hhPattern[i])continue;const ht=startT+i*st;if(ht>now-.01)scheduleFmHihat(ht,hhPeak,true);}}
      // Streak groove embellishments (only at full health, skip during preview)
      if(!previewConfig&&h>=5&&currentStreak>=3){
        // Streak 3+: ghost hihats on odd steps (offbeats)
        for(let i=1;i<8;i+=2){
          if(hhPattern[i])continue;
          const ght=startT+i*st;
          if(ght>now-.01)scheduleFmHihat(ght,hhPeak*0.3,true);
        }
      }
      if(!previewConfig&&h>=5&&currentStreak>=5){
        // Streak 5+: ghost snare fill on step 7 (last offbeat before downbeat)
        const fillT=startT+7*st;
        if(fillT>now-.01)scheduleFmSnare(fillT,snarePeak*0.4);
      }
      if(!previewConfig&&h>=5&&currentStreak>=8){
        // Streak 8+: syncopated kicks on steps 3 and 5
        [3,5].forEach(i=>{
          if(kickPattern[i])return;
          const kt=startT+i*st;
          if(kt>now-.01)scheduleFmKick(kt,kickPeak*0.5);
        });
      }
      if(!previewConfig&&h>=5&&currentStreak>=10){
        // Streak 10+: bass passing tones (geometric mean for correct pitch)
        bp.forEach((r,i)=>{
          if(r===0||i>=bp.length-1)return;
          const nextR=bp[(i+1)%bp.length];
          if(nextR===0)return;
          const passFreq=root*Math.sqrt(r*nextR);
          const passT=startT+i*st+st*0.75;
          if(passT>now-.01){
            const pt=Math.max(passT,now);
            voices[3].carrier.frequency.setValueAtTime(passFreq,pt);
            voices[3].modulator.frequency.setValueAtTime(passFreq,pt);
            voices[3].outputGain.gain.setValueAtTime(.3,pt);
          }
        });
      }
      startT+=ll;
      // Auto-advance chord for next bar (song plays itself)
      currentProgIdx=(currentProgIdx+1)%prog.length;
      bgmSeqTimer=setTimeout(seq,ll*1000*.8);
    }
    seq();
  }
  function stopBGM(){
    if(!ctx)return;bgmPlaying=false;
    if(bgmSeqTimer){clearTimeout(bgmSeqTimer);bgmSeqTimer=null}
    const t=ctx.currentTime;
    clearBgmAutomation(t);
  }

  // ── Public API ──
  return{
    toggleMute(){muted=!muted;if(muted)stopBGM();return muted},
    isMuted(){return muted},startBGM,stopBGM,setKey,musicalHit,musicalMiss,musicalBreach,setStreak,
    getMusicConfig(wave){return cloneWaveConfig(getWaveConfig(typeof wave==='number'?wave:currentWaveIdx))},

    getDefaultMusicConfig(){return cloneMusicConfig(DEFAULT_MUSIC_CONFIG)},
    getMusicalHealth(){return musicalHealth},
    getStreak(){return currentStreak},
    getWaveIndex(){return currentWaveIdx},
    previewMusicConfig,
    stopMusicPreview(){stopPreview(false)},
    saveMusicConfig(nextConfig){return applyMusicConfig(nextConfig,true)},

      stopPreview(false);
      MUSIC_CONFIG=cloneMusicConfig(DEFAULT_MUSIC_CONFIG);
      try{localStorage.removeItem(MUSIC_STORAGE_KEY)}catch(e){}
      syncCurrentVoicing(true);
      return cloneMusicConfig(MUSIC_CONFIG);
    },
    prefix(){playFmNote(1100,.04,2,0.3,.06);playFmNote(1650,.06,2,0.2,.04,.03)},
    hit(intensity=1){
      if(muted)return;ensure();
      const ch=wc();
      // FM bell: carrier at chord freq x2, ratio 3, modIndex 1.5, quick decay
      ch.forEach((f,i)=>{playFmNote(f*2,.2,3,1.5,.07+intensity*.02,i*.06);playFmNote(f*4,.12,3,0.8,.03,i*.06+.03)});
      playFmNote(ch[0]/2,.3,2,0.5,.1+intensity*.05);
    },
    miss(){
      if(muted)return;ensure();
      const ch=wc();
      // FM metallic dissonance: detuned carriers, high modIndex, harsh burst
      ch.forEach(f=>{playFmNote(f*1.03,.2,1.03,4,.06);playFmNote(f*.97,.2,0.97,4,.05,.02)});
      noise(.15,.08,.05);
    },
    breach(){
      if(muted)return;ensure();
      const ch=wc();
      // Low FM growl: carrier at root/2, ratio 7, modIndex 2, 500ms decay
      playFmNote(ch[0]/2,.5,7,2,.15);
      ch.forEach((f,i)=>playFmNote(f*.7,.35,3,2.5,.07,i*.05));
      noise(.3,.1,.1);
    },
    waveClear(){
      if(muted)return;ensure();
      const nw=clampWaveIdx(currentWaveIdx+1);
      const nc=getWaveConfig(nw).chords[0];
      // FM arpeggio: ascending chord tones with ratio 3, modIndex 1, like bells
      nc.forEach((f,i)=>{playFmNote(f*2,.25,3,1,.08,i*.1);playFmNote(f*4,.15,3,0.5,.04,i*.1+.05)});
      // Full chord shimmer
      setTimeout(()=>nc.forEach(f=>playFmNote(f*2,.3,3,0.8,.04)),350);
    },
    victory(){
      if(muted)return;ensure();stopBGM();
      // Full ascending FM arpeggio with longer sustain
      [262,330,392,494,523,659,784].forEach((f,i)=>{
        playFmNote(f,.4,3,1.2,.06,i*.07);playFmNote(f*1.25,.35,2,0.8,.03,i*.07);playFmNote(f*1.5,.35,2,0.6,.03,i*.07);
      });
    },
    gameOver(){
      if(muted)return;ensure();stopBGM();
      [400,340,280,220,160].forEach((f,i)=>{
        playFmNote(f,.35,3,3,.06,i*.14);playFmNote(f*1.2,.35,1.5,2,.04,i*.14);
      });
      noise(.8,.06,.6);
    },
    spawn(){playFmNote(165,.1,2,0.8,.05);playFmNote(220,.08,2,0.5,.03,.02)},
    select(){playFmNote(880,.05,2,0.3,.06);playFmNote(1320,.04,2,0.2,.04,.02)},
    click(){const ch=wc();ch.forEach(f=>playFmNote(f*2,.06,2,0.5,.04))},
    combo(){
      if(muted)return;ensure();
      const ch=wc();
      // Quick bright FM chirp
      ch.forEach((f,i)=>playFmNote(f*2,.15,3,1.5,.06,i*.04));
      playFmNote(ch[2]*4,.1,3,1,.04,.15);
    },
    split(){
      if(muted)return;ensure();
      const ch=wc();
      ch.forEach(f=>playFmNote(f*1.414,.2,2.5,3,.06));
      noise(.12,.07,.03);
    }
  };
})();

  // Generate a question for an enemy at spawn time
  generateQuestion(cmd, allCommands){
    const diff=G.difficulty||'learn';
    const fillChance=diff==='learn'?0.25:diff==='practice'?0.65:0.85;
    const type=Math.random()<fillChance?'fillblank':'identify';
    if(type==='identify'){
      // Pick 3 distractors from other commands, prefer same domain
      const sameDom=allCommands.filter(c=>c.id!==cmd.id&&c.dom===cmd.dom);
      const diffDom=allCommands.filter(c=>c.id!==cmd.id&&c.dom!==cmd.dom);
      const pool=[...sameDom,...shuffleArr(diffDom)];
      // Strip parenthetical notation from answers so formulas don't give away the answer
      function stripNot(s){return s.replace(/\s*\([^)]*\)\s*$/,'').trim()}
      const correctLabel=stripNot(cmd.action);
      // Dedup: skip distractors whose stripped text matches correct or an already-picked distractor
      const picks=[];const usedTexts=new Set([correctLabel.toLowerCase()]);
      for(const c of shuffleArr(pool)){
        if(picks.length>=3)break;
        const text=stripNot(c.action);
        if(!usedTexts.has(text.toLowerCase())){picks.push(text);usedTexts.add(text.toLowerCase())}
      }
      // Fallback if not enough unique distractors
      for(const c of shuffleArr(allCommands)){
        if(picks.length>=3)break;
        const text=stripNot(c.action);
        if(!usedTexts.has(text.toLowerCase())){picks.push(text);usedTexts.add(text.toLowerCase())}
      }
      const options=shuffleArr([correctLabel,...picks]);
      const correctIdx=options.indexOf(correctLabel);
      return{type:'identify',latex:cmd.latex,options,correctIdx,correctKey:['a','b','c','d'][correctIdx]};
    }else{
      const blank=cmd.blanks[Math.floor(Math.random()*cmd.blanks.length)];
      const shuffledChoices=shuffleArr([...blank.choices]);
      return{type:'fillblank',latex:blank.latex,answer:blank.answer,choices:shuffledChoices,fullLatex:cmd.latex};
    }
  },

  formatPrompt(cmd){return cmd.action},
  formatAnswer(cmd){return cmd.latex?'(formula)':cmd.action},

  // Validate fill-blank answers
  validateBlank(input,answer){
    function norm(s){return s.trim().toLowerCase().replace(/\s+/g,'').replace(/\u03c3/g,'sigma').replace(/\u03bc/g,'mu').replace(/\u03b2/g,'beta').replace(/\u03c7/g,'chi').replace(/\\hat\{p\}/g,'phat').replace(/\\bar\{x\}/g,'xbar').replace(/p\u0302/g,'phat').replace(/x\u0304/g,'xbar')}
    const ni=norm(input),na=norm(answer);
    if(ni===na)return true;
    // Common aliases
    const aliases={'p0':'p0','p_0':'p0','phat':'phat','p-hat':'phat','phat1':'phat1','p-hat1':'phat1',
      'pc':'pc','p_c':'pc','phatc':'pc','mu0':'mu0','mu_0':'mu0','beta0':'beta0','beta_0':'beta0',
      'sx':'sx','s_x':'sx','sigma_x':'sigma_x','σx':'sigma_x','σ_x':'sigma_x','sy':'sy','s_y':'sy','s1^2':'s1^2','s1²':'s1^2','sigma1^2':'sigma1^2',
      'σ1^2':'sigma1^2','σ1²':'sigma1^2','n2':'n2','n_2':'n2','p(xi)':'p(xi)','p(x_i)':'p(xi)',
      'p(a∩b)':'p(a∩b)','p(anb)':'p(a∩b)','p(a and b)':'p(a∩b)','p(b)':'p(b)'};
    const ai=aliases[ni]||ni, aa=aliases[na]||na;
    return ai===aa;
  },
};

function replaceFirstLiteral(text,needle,replacement){
  const idx=text.indexOf(needle);
  if(idx===-1)return null;
  return text.slice(0,idx)+replacement+text.slice(idx+needle.length);
}
function replaceFirstRegexMatch(text,regex,replacement){
  const match=text.match(regex);
  if(!match||match.index==null)return null;
  return text.slice(0,match.index)+replacement+text.slice(match.index+match[0].length);
}
function normalizeBlankConcept(value){
  return normalizeExplanationLookup(formatExplanationLabel(String(value||'')));
}
function buildAutoBlankVariants(cmd){
  if(!cmd||!cmd.latex)return[];
  const seenConcepts=new Set((cmd.blanks||[]).map(blank=>normalizeBlankConcept(blank.answer)));
  const seenLatex=new Set((cmd.blanks||[]).map(blank=>blank.latex));
  const variants=[];
  for(const spec of AUTO_BLANK_SPECS){
    const answer=spec.answer||spec.match;
    const conceptKey=normalizeBlankConcept(answer);
    if(seenConcepts.has(conceptKey))continue;
    const blankLatex=spec.match
      ?replaceFirstLiteral(cmd.latex,spec.match,'\\boxed{\\,?\\,}')
      :replaceFirstRegexMatch(cmd.latex,spec.regex,'\\boxed{\\,?\\,}');
    if(!blankLatex||blankLatex===cmd.latex||seenLatex.has(blankLatex))continue;
    variants.push({latex:blankLatex,answer:answer,choices:spec.choices.slice(0,3)});
    seenConcepts.add(conceptKey);
    seenLatex.add(blankLatex);
    if(variants.length>=3)break;
  }
  return variants;
}
function expandFormulaBlankCoverage(cartridge){
  cartridge.commands.forEach(cmd=>{
    if(!Array.isArray(cmd.blanks))cmd.blanks=[];
    cmd.blanks=cmd.blanks.concat(buildAutoBlankVariants(cmd));
  });
}

function ensureSentence(text){

function formatExplanationLabel(label){
  return String(label||'')
    .replace(/\\text\{([^}]*)\}/g,'$1')
    .replace(/\\sqrt\{([^}]*)\}/g,'sqrt($1)')
    .replace(/\\hat\{p_1\}/g,'p-hat1')
    .replace(/\\hat\{p\}/g,'p-hat')
    .replace(/\\bar\{x\}/g,'x-bar')
    .replace(/\\beta/g,'beta')
    .replace(/\\mu/g,'mu')
    .replace(/\\sigma/g,'sigma')
    .replace(/\\chi/g,'chi')
    .replace(/\\cdot/g,' ')
    .replace(/\^\*/g,'*')
    .replace(/[{}]/g,'')
    .replace(/\s+/g,' ')

}

function buildExplanationBank(commands){
  const byId={},byLabel={};
  commands.forEach(cmd=>{
    const label=stripAnswerLabel(cmd.action);
    const entry={
      id:cmd.id,
      title:label,
      lines:[
        ensureSentence(cmd.explain||(`${label} is an AP Statistics idea from this deck`)),
        ensureSentence('Use it when the question is asking for the '+label.toLowerCase()),
        ensureSentence('Spot it by remembering: '+cmd.hint)
      ]
    };
    byId[cmd.id]=entry;
    byLabel[normalizeExplanationLookup(label)]=entry;
  });
  EXPLANATION_GLOSSARY.forEach(spec=>{
    const entry=buildGlossaryEntry(spec);
    spec.keys.forEach(key=>{byLabel[normalizeExplanationLookup(key)]=entry});
  });

    }else if(isLoading){
      html+='<div class="explain-video-loading">Loading animation\u2026</div>';
    }else if(EXPLAINER_STATE.videoError){
      html+='<div class="explain-video-error">Animation not available yet</div>';
    }
    // Text lines
    EXPLAINER_STATE.lines.forEach(line=>{html+='<div class="explain-line">'+line+'</div>'});
    html+='</div>';
  }
  return html;
}

// ── Animation video helpers ──
function getAnimationAvailability(cmdId){
  if(!cmdId)return 'unavailable';
  if(animationManifest===null)return 'unknown';
  return animationManifest.has(cmdId)?'available':'unavailable';
}
function fetchAnimationManifest(){
  if(animationManifestLoading||animationManifest!==null)return;
  animationManifestLoading=true;
  fetch(ANIMATION_BASE+'/manifest.json').then(r=>r.ok?r.json():null).then(data=>{
    if(data&&Array.isArray(data.animations)){
      animationManifest=new Set(data.animations);
    }else{
      animationManifest=new Set();
    }
    animationManifestLoading=false;
    // If explainer is open, re-render to show/hide WATCH button
    if(EXPLAINER_STATE.open){lastInputState='';updateInput();}
  }).catch(()=>{
    // Keep null so availability stays 'unknown' and try-on-click fallback works
    animationManifestLoading=false;
  });
}
function loadAnimation(cmdId){
  if(!cmdId)return;
  const nonce=++EXPLAINER_STATE.videoNonce;
  const avail=getAnimationAvailability(cmdId);
  if(avail==='unavailable')return;
  EXPLAINER_STATE.videoLoading=true;
  EXPLAINER_STATE.videoError=false;
  EXPLAINER_STATE.videoUrl=null;
  lastInputState='';updateInput();
  const url=ANIMATION_BASE+'/'+encodeURIComponent(cmdId)+'.mp4';
  // HEAD check for unknown availability, direct play for known
  const check=avail==='unknown'?fetch(url,{method:'HEAD'}).then(r=>{if(!r.ok)throw new Error('not found');return url}):Promise.resolve(url);
  check.then(videoUrl=>{
    if(EXPLAINER_STATE.videoNonce!==nonce)return;
    EXPLAINER_STATE.videoUrl=videoUrl;
    EXPLAINER_STATE.videoLoading=false;
    lastInputState='';updateInput();
    syncInputPanelScroll('bottom');
  }).catch(()=>{
    if(EXPLAINER_STATE.videoNonce!==nonce)return;
    EXPLAINER_STATE.videoLoading=false;
    EXPLAINER_STATE.videoError=true;
    EXPLAINER_STATE.videoUrl=null;
    lastInputState='';updateInput();
  });
}


// Utility: shuffle an array (returns new array)
function shuffleArr(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// Render LaTeX safely into an element
function renderLatex(latex,el){
  try{katex.render(latex,el,{throwOnError:false,displayMode:true})}catch(e){el.textContent=latex}
  requestAnimationFrame(()=>{
    const wrap=el.closest('.latex-shell');
    if(!wrap)return;
    wrap.classList.toggle('scrollable',el.scrollWidth>wrap.clientWidth+8);
  });
}
function noteFreq(offset){return Number((220*Math.pow(2,offset/12)).toFixed(3))}
function triad(offset,quality){
  return[
    noteFreq(offset),
    noteFreq(offset+(quality==='maj'?4:3)),
    noteFreq(offset+7)
  ];
}
const CHORD_ROOTS=[
  {id:'C',label:'C',offset:-9},{id:'Db',label:'Db',offset:-8},{id:'D',label:'D',offset:-7},
  {id:'Eb',label:'Eb',offset:-6},{id:'E',label:'E',offset:-5},{id:'F',label:'F',offset:-4},
  {id:'Gb',label:'Gb',offset:-3},{id:'G',label:'G',offset:-2},{id:'Ab',label:'Ab',offset:-1},
  {id:'A',label:'A',offset:0},{id:'Bb',label:'Bb',offset:1},{id:'B',label:'B',offset:2}
];
const CHORD_OPTIONS=[];
const CHORD_OPTION_MAP={};
CHORD_ROOTS.forEach(root=>{
  [{suffix:'',name:'major',quality:'maj'},{suffix:'m',name:'minor',quality:'min'}].forEach(spec=>{
    const option={id:root.id+spec.suffix,label:root.label+' '+spec.name,freqs:triad(root.offset,spec.quality)};
    CHORD_OPTIONS.push(option);
    CHORD_OPTION_MAP[option.id]=option;
  });
});
const BASS_OPTIONS=[
  {value:0,label:'REST'},
  {value:.75,label:'LOW 5TH'},
  {value:1,label:'ROOT'},
  {value:1.189,label:'MIN 3RD'},
  {value:1.26,label:'MAJ 3RD'},
  {value:1.335,label:'4TH'},
  {value:1.5,label:'5TH'}
];
const PAD_OPTIONS=[
  {value:0,label:'REST'},
  {value:.25,label:'GHOST'},
  {value:.55,label:'FULL'},
  {value:.85,label:'ACCENT'}
];
const MUSIC_EDITOR={open:false,returnScreen:'title',selectedWave:0,draft:null,status:''};
function matchChordOption(chord){
  let best=CHORD_OPTIONS[0],bestDist=Infinity;
  CHORD_OPTIONS.forEach(opt=>{
    const dist=opt.freqs.reduce((sum,freq,idx)=>sum+Math.abs(freq-chord[idx]),0);
    if(dist<bestDist){best=opt;bestDist=dist}
  });
  return best.id;
}
function renderChordOptions(selectedId){
  return CHORD_OPTIONS.map(opt=>'<option value="'+opt.id+'"'+(opt.id===selectedId?' selected':'')+'>'+opt.label+'</option>').join('');
}
function renderBassOptions(selectedValue){

}
function renderPadOptions(selectedValue){

// Step sequencer cycle functions
const PAD_CYCLE=[0,.25,.55,.85]; // REST → GHOST → FULL → ACCENT
const BASS_CYCLE=[0,1,.75,1.189,1.26,1.335,1.5]; // REST → ROOT → LOW5 → m3 → M3 → 4 → 5
function cyclePadStep(step){
  SFX.stopMusicPreview();
  const cfg=currentMusicDraft();
  const cur=cfg.pad[step];
  const idx=PAD_CYCLE.indexOf(PAD_CYCLE.reduce((best,v)=>Math.abs(v-cur)<Math.abs(best-cur)?v:best,0));
  cfg.pad[step]=PAD_CYCLE[(idx+1)%PAD_CYCLE.length];
  setMusicStatus('Unsaved changes');
  renderMusicEditor();
}
function cyclePadStepBack(step){
  SFX.stopMusicPreview();
  const cfg=currentMusicDraft();
  const cur=cfg.pad[step];
  const idx=PAD_CYCLE.indexOf(PAD_CYCLE.reduce((best,v)=>Math.abs(v-cur)<Math.abs(best-cur)?v:best,0));
  cfg.pad[step]=PAD_CYCLE[(idx-1+PAD_CYCLE.length)%PAD_CYCLE.length];
  setMusicStatus('Unsaved changes');
  renderMusicEditor();
}
function cycleBassStep(step){
  SFX.stopMusicPreview();
  const cfg=currentMusicDraft();
  const cur=cfg.bass[step];
  const idx=BASS_CYCLE.indexOf(BASS_CYCLE.reduce((best,v)=>Math.abs(v-cur)<Math.abs(best-cur)?v:best,0));
  cfg.bass[step]=BASS_CYCLE[(idx+1)%BASS_CYCLE.length];
  setMusicStatus('Unsaved changes');
  renderMusicEditor();
}
function cycleBassStepBack(step){
  SFX.stopMusicPreview();
  const cfg=currentMusicDraft();
  const cur=cfg.bass[step];
  const idx=BASS_CYCLE.indexOf(BASS_CYCLE.reduce((best,v)=>Math.abs(v-cur)<Math.abs(best-cur)?v:best,0));
  cfg.bass[step]=BASS_CYCLE[(idx-1+BASS_CYCLE.length)%BASS_CYCLE.length];

}

// Calculate player's average mastery for adaptive speed
function getAverageMastery(srs){
  const entries=Object.values(srs).filter(s=>s.totalAttempts>0);
  if(entries.length===0)return 0;
  return entries.reduce((sum,s)=>sum+s.mastery,0)/entries.length;
}

function clampProb(v,min,max){min=min??0.001;max=max??0.999;return Math.min(max,Math.max(min,v))}
function bktBootstrapFromMastery(mastery){const map=[0.10,0.25,0.45,0.65,0.82,0.93];return map[Math.max(0,Math.min(5,mastery|0))]}
function bayesPosterior(pKnown,wasCorrect,pGuess,pSlip){
  const pk=clampProb(pKnown),pg=clampProb(pGuess,0.01,0.50),ps=clampProb(pSlip,0.01,0.30);
  if(wasCorrect)return(pk*(1-ps))/(pk*(1-ps)+(1-pk)*pg);
  return(pk*ps)/(pk*ps+(1-pk)*(1-pg));
}
function effectivePGuess(card,ctx){
  if(ctx.questionType==='typed'||ctx.questionType==='prefix-key')return 0.05;
  const choices=Math.max(1,Math.min(10,ctx.remainingChoices||4));
  return clampProb(1/choices,0.05,0.50);
}
function recomputeCompositePKnown(card){
  const childVals=Object.values(card.subPKnown||{});
  if(childVals.length===0){card.pKnown=card.pKnownDirect}
  else{const avg=childVals.reduce((s,v)=>s+v,0)/childVals.length;card.pKnown=clampProb(0.7*card.pKnownDirect+0.3*avg)}
}
function bktUpdate(card,outcome){
  const ctx={questionType:outcome.questionType||'identify',remainingChoices:outcome.remainingChoices||4};
  const epg=effectivePGuess(card,ctx);
  const pSlip=card.pSlip||0.1;
  const pTransit=card.pTransit||0.03;
  if(outcome.subconceptIndex!=null){
    if(!card.subPKnown)card.subPKnown={};
    const prev=card.subPKnown[outcome.subconceptIndex]??0.1;
    const post=bayesPosterior(prev,outcome.wasCorrect,epg,pSlip);
    card.subPKnown[outcome.subconceptIndex]=clampProb(post+(1-post)*pTransit);
  }else{
    const post=bayesPosterior(card.pKnownDirect||0.1,outcome.wasCorrect,epg,pSlip);
    card.pKnownDirect=clampProb(post+(1-post)*pTransit);
  }
  recomputeCompositePKnown(card);
}
function infoGain(pKnown){const p=clampProb(pKnown);return-p*Math.log2(p)-(1-p)*Math.log2(1-p)}
function pickScore(srsCard,wave){
  const entropy=infoGain(srsCard.pKnown||0.1);
  const overdueness=Math.max(0,wave-(srsCard.lastSeen||0)-(srsCard.interval||0))/10;
  const lowBoost=((srsCard.pKnown||0.1)<0.2)?0.3:0;
  return entropy+overdueness*0.4+lowBoost;
}

//  SRS — Enhanced with time + attempts
// ═══════════════════════════════════════════════
const EXAM_DATE=new Date('2026-05-07T23:59:59');
function initSRS(cmds){const s={};(cmds||COMMANDS).forEach(c=>{s[c.id]={ease:2.5,interval:0,streak:0,correct:0,wrong:0,lastSeen:0,mastery:0,avgTimeMs:0,totalAttempts:0,pKnownDirect:0.1,pKnown:0.1,pTransit:0.03,pGuess:0.25,pSlip:0.1,subPKnown:{},lastUpdated:0,rev:0}});return s}
// Time-based knowledge decay — mastery fades if not reviewed
function applyTimeDecay(srs){
  const now=Date.now();
  const HALF_LIVES=[2,2,3,5,7,10,14]; // days by mastery level 0-5 (index 6 = safety)
  const MASTERY_THRESHOLDS=[0,0.25,0.45,0.65,0.82,0.93]; // pKnown → mastery mapping
  let changed=false;
  for(const id of Object.keys(srs)){
    const c=srs[id];
    if(!c.lastUpdated||c.totalAttempts===0)continue; // never studied — no decay
    const daysSince=(now-c.lastUpdated)/86400000;
    if(daysSince<0.5)continue; // less than 12 hours — no decay
    const halfLife=HALF_LIVES[Math.min(c.mastery||0,5)];
    const decay=Math.pow(0.5,daysSince/halfLife);
    const decayedPK=Math.max(0.001,c.pKnown*decay);
    if(Math.abs(decayedPK-c.pKnown)<0.01)continue; // negligible change
    c.pKnown=decayedPK;
    c.pKnownDirect=Math.max(0.001,c.pKnownDirect*decay);
    // Recompute mastery from decayed pKnown
    let newMastery=0;
    for(let m=5;m>=1;m--){if(decayedPK>=MASTERY_THRESHOLDS[m]){newMastery=m;break}}
    if(newMastery<c.mastery){c.mastery=newMastery;changed=true}
  }
  return changed;
}
// Exam deadline urgency — modifies question selection pressure
function getExamUrgency(){
  const daysLeft=Math.max(0,(EXAM_DATE.getTime()-Date.now())/86400000);
  if(daysLeft>30)return{urgency:0,daysLeft:Math.round(daysLeft),mode:'normal'};
  if(daysLeft>14)return{urgency:0.3,daysLeft:Math.round(daysLeft),mode:'focused'};
  if(daysLeft>3)return{urgency:0.7,daysLeft:Math.round(daysLeft),mode:'intensive'};
  return{urgency:1.0,daysLeft:Math.round(daysLeft),mode:'cram'};
}
function sanitizeSrsCard(card,defaults){
  const d=defaults||{ease:2.5,interval:0,streak:0,correct:0,wrong:0,lastSeen:0,mastery:0,avgTimeMs:0,totalAttempts:0,pKnownDirect:0.1,pKnown:0.1,pTransit:0.03,pGuess:0.25,pSlip:0.1,subPKnown:{},lastUpdated:0,rev:0};
  const c={...d,...card};
  c.ease=Number.isFinite(c.ease)?Math.max(1.3,Math.min(5,c.ease)):d.ease;
  c.interval=Number.isFinite(c.interval)?Math.max(0,Math.min(20,Math.floor(c.interval))):d.interval;
  c.streak=Number.isFinite(c.streak)?Math.max(0,Math.floor(c.streak)):d.streak;
  c.correct=Number.isFinite(c.correct)?Math.max(0,Math.floor(c.correct)):d.correct;
  c.wrong=Number.isFinite(c.wrong)?Math.max(0,Math.floor(c.wrong)):d.wrong;
  c.lastSeen=Number.isFinite(c.lastSeen)?Math.max(0,Math.floor(c.lastSeen)):d.lastSeen;
  c.mastery=Number.isFinite(c.mastery)?Math.max(0,Math.min(5,Math.floor(c.mastery))):d.mastery;
  c.avgTimeMs=Number.isFinite(c.avgTimeMs)?Math.max(0,Math.min(60000,c.avgTimeMs)):d.avgTimeMs;
  c.totalAttempts=Number.isFinite(c.totalAttempts)?Math.max(c.correct+c.wrong,Math.floor(c.totalAttempts)):d.totalAttempts;
  c.pKnownDirect=Number.isFinite(c.pKnownDirect)?Math.max(.001,Math.min(.999,c.pKnownDirect)):d.pKnownDirect;
  c.pKnown=Number.isFinite(c.pKnown)?Math.max(.001,Math.min(.999,c.pKnown)):d.pKnown;
  // BKT v1: force fixed params
  c.pTransit=0.03;c.pGuess=0.25;c.pSlip=0.1;
  // Sanitize subPKnown
  if(c.subPKnown&&typeof c.subPKnown==='object'){
    const clean={};for(const k of Object.keys(c.subPKnown)){
      const v=Number(c.subPKnown[k]);
      if(Number.isFinite(v))clean[k]=Math.max(.001,Math.min(.999,v));
    }
    c.subPKnown=clean;
  }else c.subPKnown={};
  c.lastUpdated=Number.isFinite(c.lastUpdated)?Math.max(0,c.lastUpdated):0;
  c.rev=Number.isFinite(c.rev)?Math.max(0,Math.floor(c.rev)):0;
  return c;
}
function srsHit(card,wave,timeMs,attempts,bktOutcome){
  const c={...card,subPKnown:{...(card.subPKnown||{})}};c.correct++;c.streak++;c.lastSeen=wave;
  c.avgTimeMs=c.totalAttempts>0?(c.avgTimeMs*c.totalAttempts+timeMs)/(c.totalAttempts+1):timeMs;
  c.totalAttempts++;
  let q=5;
  if(timeMs>6000)q-=2;else if(timeMs>4000)q-=1.5;else if(timeMs>2500)q-=0.5;
  if(timeMs<1500)q=Math.min(5,q+0.5);
  if(attempts>1)q-=Math.min(2,attempts-1);
  q=Math.max(0,Math.min(5,q));
  c.ease=Math.max(1.3,card.ease+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  if(card.interval===0)c.interval=1;
  else if(card.interval===1)c.interval=3;
  else c.interval=Math.round(card.interval*c.ease);
  c.interval=Math.min(c.interval,20);
  const fastEnough=c.avgTimeMs<3000;
  const veryFast=c.avgTimeMs<1800;
  if(c.streak>=8&&c.ease>=2.2&&veryFast)c.mastery=5;
  else if(c.streak>=5&&c.ease>=2.0&&fastEnough)c.mastery=4;
  else if(c.streak>=3&&c.ease>=1.8)c.mastery=3;
  else if(c.streak>=2)c.mastery=2;
  else if(c.streak>=1)c.mastery=Math.max(c.mastery,1);
  if(bktOutcome)bktUpdate(c,bktOutcome);
  c.lastUpdated=Date.now();c.rev=(card.rev||0)+1;
  return c;
}
function srsMiss(card,wave,bktOutcome){
  const c={...card,subPKnown:{...(card.subPKnown||{})}};c.wrong++;c.streak=0;c.lastSeen=wave;c.interval=0;
  c.ease=Math.max(1.3,card.ease-.2);c.mastery=Math.max(0,card.mastery-1);
  c.totalAttempts++;if(bktOutcome)bktUpdate(c,bktOutcome);
  c.lastUpdated=Date.now();c.rev=(card.rev||0)+1;return c;
}
function pickCommands(pool,srs,count,wave){
  const exam=getExamUrgency();
  const due=[],overdue=[],fresh=[],notDue=[],decayed=[];
  pool.forEach(cmd=>{const s=srs[cmd.id],ws=wave-s.lastSeen;
    // Cards that were mastered but decayed below threshold
    if(s.totalAttempts>0&&s.pKnown<0.65&&s.correct>=3)decayed.push(cmd);
    if(s.lastSeen===0&&s.correct===0)fresh.push(cmd);
    else if(ws>=s.interval+2)overdue.push(cmd);
    else if(ws>=s.interval)due.push(cmd);
    else notDue.push(cmd)});
  const picked=[],used=new Set();
  function add(c){if(used.has(c.id))return false;picked.push(c);used.add(c.id);return true}
  // Near exam: prioritize decayed cards first (bring back forgotten material)
  if(exam.urgency>0.3){
    decayed.sort((a,b)=>(srs[a.id].pKnown||0)-(srs[b.id].pKnown||0)); // weakest first
    decayed.forEach(c=>{if(picked.length<Math.ceil(count*exam.urgency))add(c)});
  }
  overdue.sort((a,b)=>pickScore(srs[b.id],wave)-pickScore(srs[a.id],wave));overdue.forEach(c=>{if(picked.length<count)add(c)});
  due.sort((a,b)=>pickScore(srs[b.id],wave)-pickScore(srs[a.id],wave));due.forEach(c=>{if(picked.length<count)add(c)});
  // Near exam: reduce new card intake
  const maxNew=exam.urgency>0.7?1:Math.min(3,Math.max(1,Math.floor(count*.3)));let na=0;
  for(const c of fresh){if(picked.length>=count||na>=maxNew)break;if(add(c))na++}
  notDue.sort((a,b)=>pickScore(srs[b.id],wave)-pickScore(srs[a.id],wave));notDue.forEach(c=>{if(picked.length<count)add(c)});
  pool.forEach(c=>{if(picked.length<count)add(c)});
  for(let i=picked.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[picked[i],picked[j]]=[picked[j],picked[i]]}
  return picked.slice(0,count);
}

let _srsSaveTimer=null;
function saveSRS(immediate){
  if(!activeCartridge)return;
  if(!immediate){
    // Debounce per-answer saves (300ms); wave-clear/unload use immediate=true
    if(_srsSaveTimer)return;
    _srsSaveTimer=setTimeout(()=>{_srsSaveTimer=null;saveSRS(true)},300);
    return;
  }
  try{
    const key='td-srs-'+activeCartridge.id;
    // Read-modify-write: merge per-card by rev to avoid stale-tab overwrites
    const existing=localStorage.getItem(key);
    let merged=G.srs;
    if(existing){
      try{
        const persisted=JSON.parse(existing);
        merged={};
        for(const id of Object.keys(G.srs)){
          const mem=G.srs[id];
          const disk=persisted[id];
          if(!disk){merged[id]=mem;continue}
          // Compare rev first (monotonic), then lastUpdated as tiebreak
          const memRev=mem.rev||0,diskRev=disk.rev||0;
          if(memRev>diskRev){merged[id]=mem}
          else if(diskRev>memRev){merged[id]=disk}
          else{merged[id]=(mem.lastUpdated||0)>=(disk.lastUpdated||0)?mem:disk}
        }
        // Preserve any extra cards on disk (e.g. from another session adding commands)
        for(const id of Object.keys(persisted)){if(!merged[id])merged[id]=persisted[id]}
      }catch(e){merged=G.srs}
    }
    localStorage.setItem(key,JSON.stringify(merged));
    G.srs=merged; // sync in-memory with merged result
    G.srsError=false;
    // Cloud push on immediate saves (fire-and-forget)
    if(immediate&&getIdentity())syncToCloud();
  }catch(e){G.srsError=true}
}
function getRunStateKey(){
  return activeCartridge?'td-run-state-'+activeCartridge.id:'';
}
function clearRunState(){
  const key=getRunStateKey();
  if(!key)return;
  try{localStorage.removeItem(key)}catch(e){}

function buildRunStateSnapshot(){
  if(!activeCartridge||G.screen!=='game')return null;
  return{
    version:1,
    cartridgeId:activeCartridge.id,
    savedAt:Date.now(),
    wave:G.wave,
    score:G.score,
    lives:G.lives,
    streak:G.streak,
    maxStreak:G.maxStreak,
    srs:G.srs,

    waveCommands:G.waveCommands,

    waveComplete:G.waveComplete,
    totalCorrect:G.totalCorrect,

    combo:G.combo,

    nextEnemyId:G.nextEnemyId,
    attemptsOnCurrent:G.attemptsOnCurrent,
    typedBuffer:G.typedBuffer,
    domainFilter:G.domainFilter,
    difficulty:G.difficulty,
  };
}
function saveRunState(){
  const key=getRunStateKey();
  flushPendingScoreAwards();
  const snapshot=buildRunStateSnapshot();
  if(!key||!snapshot)return false;
  try{
    localStorage.setItem(key,JSON.stringify(snapshot));
    G.runStateError=false;
    return true;
  }catch(e){G.runStateError=true;return false}
}
function loadRunState(){
  const key=getRunStateKey();
  if(!key)return null;
  try{
    const saved=localStorage.getItem(key);
    if(!saved)return null;
    const parsed=JSON.parse(saved);
    if(!parsed||parsed.cartridgeId!==activeCartridge.id)return null;
    return parsed;
  }catch(e){return null}
}
function syncHighScore(){
  if(!activeCartridge)return{prevHigh:0,highScore:0,isNewHigh:false};
  flushPendingScoreAwards();
  const hsKey='td-highscore-'+activeCartridge.id;
  const prevHigh=parseInt(localStorage.getItem(hsKey)||'0',10);
  const currentScore=Math.max(0,Math.floor(Number(G.score)||0));
  const highScore=Math.max(prevHigh,currentScore);
  const isNewHigh=currentScore>prevHigh;
  if(highScore!==prevHigh){
    try{localStorage.setItem(hsKey,highScore.toString())}catch(e){}
  }
  return{prevHigh,highScore,isNewHigh};
}
function syncRunCheckpoint(){
  saveSRS(true); // immediate — hard checkpoint
  const recordState=syncHighScore();
  if(G.screen==='game')saveRunState();
  return recordState;
}
function loadSRS(cartridge){
  const saved=localStorage.getItem('td-srs-'+cartridge.id);
  const fresh=initSRS(cartridge.commands);
  if(!saved)return fresh;
  try{
    const parsed=JSON.parse(saved);
    for(const id of Object.keys(fresh)){
      if(parsed[id]){
        fresh[id]={...fresh[id],...parsed[id]};
        // Bootstrap BKT from mastery for legacy saves
        if(parsed[id].pKnownDirect==null){
          const boot=bktBootstrapFromMastery(fresh[id].mastery||0);
          fresh[id].pKnownDirect=boot;fresh[id].pKnown=boot;
        }
      }
      fresh[id]=sanitizeSrsCard(fresh[id]);
    }
    return fresh;
  }catch(e){return fresh}
}
function getCartridgeProgress(cartridgeId){
  const saved=localStorage.getItem('td-srs-'+cartridgeId);
  if(!saved)return{total:0,seen:0,mastered:0};
  try{
    const srs=JSON.parse(saved);
    const entries=Object.values(srs);
    return{
      total:entries.length,
      seen:entries.filter(s=>s.totalAttempts>0).length,
      mastered:entries.filter(s=>s.mastery>=4).length,
    };
  }catch(e){return{total:0,seen:0,mastered:0}}
}
function returnToTitleFromRun(){
  if(G.screen!=='game'&&G.screen!=='victory'&&G.screen!=='gameover')return;
  syncRunCheckpoint();
  showTitleScreen('game');
}

async function syncToCloud(){
  const id=getIdentity();
  if(!id||!id.username||!activeCartridge||!cloudSyncReady||cloudSyncInFlight)return;
  cloudSyncInFlight=true;
  updateSyncIndicator('syncing');
  try{

    const seen=entries.filter(s=>s.totalAttempts>0).length;

    await fetch(SYNC_SERVER+'/api/progress/cartridge-sync',{

        totalWeightedScore:hs,
        modeProgress:{schemaVersion:1,srs:G.srs,highScore:hs,resetRev:G.resetRev||0}
      })
    });
    updateSyncIndicator('synced');
  }catch(e){
    updateSyncIndicator('offline');
  }finally{cloudSyncInFlight=false}
}
async function pullFromCloud(){
  const id=getIdentity();
  if(!id||!id.username||!activeCartridge)return;
  updateSyncIndicator('syncing');
  try{
    const resp=await fetch(SYNC_SERVER+'/api/progress/cartridge/'+encodeURIComponent(id.username)+'/td-'+activeCartridge.id);
    const result=await resp.json();
    if(result.found&&result.data&&result.data.mode_progress&&result.data.mode_progress.srs){
      const remote=result.data.mode_progress.srs;
      const remoteResetRev=result.data.mode_progress.resetRev||0;
      const localResetRev=G.resetRev||0;
      // If remote was reset more recently, discard local cards older than reset
      const effectiveResetRev=Math.max(remoteResetRev,localResetRev);
      G.resetRev=effectiveResetRev;
      // Per-card merge: higher rev wins, then lastUpdated
      for(const cardId of Object.keys(G.srs)){
        const local=G.srs[cardId];
        const rem=remote[cardId];
        if(!rem)continue;
        if((rem.rev||0)<effectiveResetRev&&(local.rev||0)>=effectiveResetRev)continue;
        if((local.rev||0)<effectiveResetRev&&(rem.rev||0)>=effectiveResetRev){G.srs[cardId]=sanitizeSrsCard(rem);continue}
        const remRev=rem.rev||0,locRev=local.rev||0;
        if(remRev>locRev)G.srs[cardId]=sanitizeSrsCard(rem);
        else if(remRev===locRev&&(rem.lastUpdated||0)>(local.lastUpdated||0))G.srs[cardId]=sanitizeSrsCard(rem);
      }
      // Pick up remote-only cards not in local SRS
      for(const cardId of Object.keys(remote)){
        if(!G.srs[cardId]&&(remote[cardId].rev||0)>=effectiveResetRev)G.srs[cardId]=sanitizeSrsCard(remote[cardId]);
      }
      saveSRS(true);
    }
    cloudSyncReady=true;
    updateSyncIndicator('synced');
  }catch(e){
    cloudSyncReady=true; // allow pushes even if pull fails
    updateSyncIndicator('offline');
  }
}
function updateSyncIndicator(state){

    const id=getIdentity();
    el.textContent=id?'\u2601 '+id.username:'';

  }
}

  const pwEl=document.getElementById('login-pw');

  {x:0,y:-6,z:-6,scale:1.0,angle:0,branchAngle:Math.PI/6,lenScale:0.68,len:3.5},
  {x:-5,y:-6,z:-7,scale:0.7,angle:0.15,branchAngle:Math.PI/5.5,lenScale:0.65,len:2.8},
  {x:4.5,y:-6,z:-7.5,scale:0.65,angle:-0.1,branchAngle:Math.PI/6.5,lenScale:0.7,len:2.6},
];
function generateTree(ox,oy,len,angle,ba,ls,depth,levels,timeSec,omega,swayAmp,pos,col,idx){
  if(depth>=levels)return idx;
  const sway=Math.sin(timeSec*omega+depth*0.4)*swayAmp*(0.2+depth*0.8);
  // Deterministic jitter per depth for natural look
  const jitter=(depth%2===0?0.05:-0.04)*depth*0.3;
  const a=angle+sway+jitter;
  const ex=ox+Math.sin(a)*len;
  const ey=oy+Math.cos(a)*len;
  pos[idx*6]=ox;pos[idx*6+1]=oy;pos[idx*6+2]=0;
  pos[idx*6+3]=ex;pos[idx*6+4]=ey;pos[idx*6+5]=0;
  const t=depth/Math.max(levels-1,1);
  const r=0.24+t*0.76,g=0.12+t*0.22,b=0.0;
  col[idx*6]=r;col[idx*6+1]=g;col[idx*6+2]=b;
  col[idx*6+3]=r;col[idx*6+4]=g;col[idx*6+5]=b;
  idx++;
  const cl=len*ls;
  // Slightly unequal children for organic look
  idx=generateTree(ex,ey,cl*1.02,a+ba,ba,ls,depth+1,levels,timeSec,omega,swayAmp,pos,col,idx);
  idx=generateTree(ex,ey,cl*0.98,a-ba,ba,ls,depth+1,levels,timeSec,omega,swayAmp,pos,col,idx);
  return idx;
}

function buildScoreChunks(totalPts,desiredCount){
  const safeTotal=Math.max(0,Math.floor(Number(totalPts)||0));
  if(safeTotal<=0)return[];
  const requested=Math.max(1,Math.round(Number(desiredCount)||1));
  const chunkCount=Math.max(1,Math.min(safeTotal,requested));
  const base=Math.floor(safeTotal/chunkCount);
  let remainder=safeTotal-base*chunkCount;
  const chunks=[];
  for(let i=0;i<chunkCount;i++){
    const value=base+(remainder>0?1:0);
    if(remainder>0)remainder--;
    chunks.push(value);
  }
  return chunks.filter(v=>v>0);
}
function createScoreAward(totalPts,particleCount,color){
  const chunks=buildScoreChunks(totalPts,Math.max(4,Math.min(8,Math.round(particleCount/4))));

  const award={id:nextScoreAwardId++,totalPts:Math.max(0,Math.floor(Number(totalPts)||0)),color:color||AMB.glow,chunksRemaining:chunks,chunksDelivered:0};
  pendingScoreAwards.set(award.id,award);
  return award;
}

function purgeAwardParticles(awardIds){
  const idSet=Array.isArray(awardIds)?new Set(awardIds):null;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.awardId==null)continue;
    if(idSet&& !idSet.has(p.awardId))continue;
    scene.remove(p.mesh);
    p.mesh.material.dispose();
    particles.splice(i,1);
  }
  for(let i=trailGhosts.length-1;i>=0;i--){
    const ghost=trailGhosts[i];
    if(ghost.awardId==null)continue;
    if(idSet&& !idSet.has(ghost.awardId))continue;
    releaseTrailGhost(ghost);
    trailGhosts.splice(i,1);
  }
}
function releaseCompletedAwardParticles(awardId){
  if(awardId==null)return;
  particles.forEach(p=>{
    if(p.awardId!==awardId)return;
    p.awardId=null;
    p.funnelToScore=false;
    p.life=Math.min(p.life,.28);
    p.vel.multiplyScalar(.55);
  });
  trailGhosts.forEach(ghost=>{

    ghost.awardId=null;

  });

    flushedIds.push(id);
  });

  if(added>0)G.score+=added;
  purgeAwardParticles(flushedIds);
  return added;
}
function collectScoreAwardChunk(awardId,targetPos,color){
  if(awardId==null)return 0;
  const award=pendingScoreAwards.get(awardId);
  if(!award)return 0;
  if(award.chunksRemaining.length===0){
    pendingScoreAwards.delete(awardId);
    return 0;
  }
  const delta=award.chunksRemaining.shift()||0;
  award.chunksDelivered+=delta;
  if(delta>0){
    G.score+=delta;
    triggerScoreHudPop();
    spawnScoreImpactBurst(targetPos,color||award.color||AMB.glow);
  }
  if(award.chunksRemaining.length===0){
    pendingScoreAwards.delete(awardId);
    releaseCompletedAwardParticles(awardId);
  }
  return delta;
}
function getScoreFunnelTarget(sourcePos){
  const scoreEl=document.getElementById('h-score');
  if(!scoreEl){
    return camera.position.clone().add(new THREE.Vector3(0,2,-6));
  }
  const rect=scoreEl.getBoundingClientRect();
  const ndcX=((rect.left+rect.width*.5)/window.innerWidth)*2-1;
  const ndcY=-((rect.top+rect.height*.5)/window.innerHeight)*2+1;
  const worldPoint=new THREE.Vector3(ndcX,ndcY,0.12).unproject(camera);
  const rayDir=worldPoint.sub(camera.position).normalize();
  const scoreDistance=Math.max(5.5,Math.min(10.5,camera.position.distanceTo(sourcePos)*.55));
  return camera.position.clone().add(rayDir.multiplyScalar(scoreDistance));
}
